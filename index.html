<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика | Скрытый пульт</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }
        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }
        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .canvas-area {
            flex: 2;
            min-width: 280px;
        }
        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }
        .score-box, .lives-box, .level-box, .progress-box, .diff-box, .user-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child, .progress-box span:first-child, .diff-box span:first-child {
            color: #ffcd7e;
        }
        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }
        .restart-btn:active {
            transform: translateY(2px);
        }
        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }
        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }
        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }
        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }
        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }
        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }
        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ffdfa5;
            font-family: monospace;
            font-size: 1.5rem;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3a7a5a;
            border-top: 6px solid #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">Загрузка задач...</div>
                    <div class="question-text" id="questionDisplay">Пожалуйста, подождите</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Загрузка конфигурации с GitHub...
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="diff-box"><span>📊 СЛОЖНОСТЬ</span><span id="difficultyValue">0%</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <div class="user-box"><span>👤 ID</span><span id="userIdDisplay">Не авторизован</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
    let TASKS_LIBRARY = [];       // Массив задач с GitHub
    let gameReady = false;         // Флаг готовности игры (загружены задачи)
    let correctCount = 0;
    let difficulty = 0;
    let gameActive = true;
    let victoryFlag = false;
    let score = 0;
    let stability = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    const TARGET_CORRECT = 15;

    // DOM элементы
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 750;
    canvas.height = 420;
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const difficultySpan = document.getElementById('difficultyValue');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    const userIdSpan = document.getElementById('userIdDisplay');

    // ======================== ЗАГРУЗКА ЗАДАЧ С GITHUB (ТОЛЬКО ОТСЮДА) ========================
    const GITHUB_TASKS_URL = "https://raw.githubusercontent.com/mihail245/Electro-tetris/refs/heads/main/tasks.json";

    // Создаём и показываем оверлей загрузки
    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = `<div class="spinner"></div><div>Загрузка задач с GitHub...</div><div style="font-size: 0.8rem;">${GITHUB_TASKS_URL}</div>`;
    document.body.appendChild(loadingOverlay);

    async function fetchTasksFromGitHub() {
        try {
            console.log("Начинаем загрузку задач с GitHub...");
            const response = await fetch(GITHUB_TASKS_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            const data = await response.json();
            
            if (Array.isArray(data) && data.length > 0) {
                TASKS_LIBRARY = data;
                console.log(`✅ Успешно загружено ${TASKS_LIBRARY.length} задач с GitHub`);
                messageDiv.innerHTML = `✅ Загружено ${TASKS_LIBRARY.length} задач с GitHub. Секретный жест: 5 кликов по счёту.`;
                gameReady = true;
                // Плавно убираем оверлей
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    if(loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay);
                }, 500);
                // Запускаем игру
                startGameAfterLoad();
            } else {
                throw new Error("Файл не содержит массива задач");
            }
        } catch (error) {
            console.error("Критическая ошибка загрузки задач:", error);
            loadingOverlay.innerHTML = `<div style="color: #ff8866;">❌ ОШИБКА ЗАГРУЗКИ ЗАДАЧ</div>
                                        <div style="font-size: 1rem; margin-top: 10px;">${error.message}</div>
                                        <div style="font-size: 0.8rem; margin-top: 20px;">Проверьте ссылку: ${GITHUB_TASKS_URL}</div>
                                        <button id="reloadBtn" style="margin-top: 30px; padding: 10px 25px; background: #ffaa44; border: none; border-radius: 40px; font-weight: bold; cursor: pointer;">🔄 ПОВТОРИТЬ</button>`;
            const reloadBtn = document.getElementById('reloadBtn');
            if(reloadBtn) reloadBtn.onclick = () => location.reload();
            gameReady = false;
        }
    }

    // ======================== ИГРОВЫЕ ФУНКЦИИ (ЗАВИСЯТ ОТ TASKS_LIBRARY) ========================
    function getRandomProblem() {
        if (!TASKS_LIBRARY.length) {
            // Теоретически сюда не попадём, но на всякий случай
            return {
                title: "⚠️ ОШИБКА",
                equation: "Нет задач",
                question: "Перезагрузите страницу",
                correctAnswer: 1,
                hint: "Проверьте интернет"
            };
        }
        const base = { ...TASKS_LIBRARY[Math.floor(Math.random() * TASKS_LIBRARY.length)] };
        return {
            title: base.title || "ЭНЕРГОЗАДАЧА",
            equation: base.eq || base.equation || "данные",
            question: base.question || "Найдите значение",
            correctAnswer: Number(base.correct) || Number(base.answer) || 100,
            hint: base.hint || "Проверьте формулу"
        };
    }

    function generateOptions(correct) {
        let opts = new Set();
        opts.add(correct);
        let range = Math.max(2, Math.floor(correct * (0.15 + difficulty / 180)));
        range = Math.min(range, Math.floor(correct * 0.6) || 3);
        if(range < 1) range = 2;
        while(opts.size < 4) {
            let delta = Math.floor(Math.random() * (range * 2 + 1)) - range;
            let cand = correct + delta;
            if(cand < 1) cand = correct + Math.floor(Math.random() * 5) + 2;
            if(cand > 0 && cand < 50000) opts.add(cand);
            if(opts.size < 3) {
                let extra = correct + (Math.floor(Math.random() * 15) + 3);
                if(extra > 0 && extra !== correct) opts.add(extra);
            }
        }
        let arr = Array.from(opts);
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
        difficultySpan.innerText = `${Math.floor(difficulty)}%`;
    }

    // --- Админ-панель (секретный жест 5 кликов) ---
    let tapCount = 0;
    let tapTimer = null;
    let adminModal = null;
    let isAdminMode = false;
    const ALLOWED_ADMIN_UIDS = [
        "zUm98N8mzoN5oq4aeCZo6476lWJ2",
        "2uC9V5MBW0Sd00GYSmGVoIS4SWI3",
        "8QTK0kWzJwQjY2rEgAQFxQcJFdE2"
    ];

    function isAllowedAdmin(uid) {
        return ALLOWED_ADMIN_UIDS.includes(uid);
    }

    function createAdminModal() {
        if(document.getElementById('secretAdminPanel')) return;
        const div = document.createElement('div');
        div.id = 'secretAdminPanel';
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);z-index:10001;display:none;justify-content:center;align-items:center;font-family:monospace;';
        div.innerHTML = `
            <div style="background:#0e1a1f;border:2px solid #ffaa44;border-radius:48px;padding:25px 20px;width:340px;text-align:center;color:#eee;">
                <h3>⚡ СКРЫТАЯ АДМИН-ПАНЕЛЬ ⚡</h3>
                <input type="text" id="adminSecretUid" placeholder="Ваш Firebase UID" style="width:90%;padding:12px;margin:15px 0;background:#1f3a33;border:1px solid #8bc34a;border-radius:60px;color:#ffecb3;text-align:center">
                <div><button id="adminSecretAuthBtn" style="background:#3a7a5a;border:none;padding:10px 20px;margin:5px;border-radius:40px;color:white;font-weight:bold;cursor:pointer">🔑 Войти</button><button id="adminSecretCloseBtn" style="background:#aa3e2c;border:none;padding:10px 20px;margin:5px;border-radius:40px;cursor:pointer">✖️</button></div>
                <div id="adminSecretActions" style="display:none;margin-top:15px">
                    <button id="secretGiveCorrect">✅ ПРАВИЛЬНЫЙ ОТВЕТ</button><br>
                    <button id="secretInstantWin">🏆 МГНОВЕННАЯ ПОБЕДА</button><br>
                    <button id="secretAddLife">❤️ +1 СТАБИЛЬНОСТЬ</button><br>
                    <button id="secretAddPoints">🔋 +50 МВт</button>
                </div>
                <div id="adminSecretStatus" style="font-size:0.8rem;margin-top:12px;color:#ffaa66"></div>
            </div>
        `;
        document.body.appendChild(div);
        adminModal = div;

        document.getElementById('adminSecretAuthBtn').onclick = () => {
            const enteredUid = document.getElementById('adminSecretUid').value.trim();
            const currentUser = auth.currentUser;
            if(!currentUser) { adminSecretMsg("⏳ Ожидание Firebase..."); return; }
            if(currentUser.uid === enteredUid && isAllowedAdmin(currentUser.uid)) {
                isAdminMode = true;
                document.getElementById('adminSecretActions').style.display = 'block';
                adminSecretMsg("✅ ДОСТУП РАЗРЕШЁН!");
                messageDiv.innerHTML = "🔱 РЕЖИМ АДМИНИСТРАТОРА АКТИВЕН 🔱";
            } else {
                adminSecretMsg("❌ НЕВЕРНЫЙ UID ИЛИ НЕТ ПРАВ");
                isAdminMode = false;
            }
        };
        document.getElementById('adminSecretCloseBtn').onclick = () => { adminModal.style.display = 'none'; };
        document.getElementById('secretGiveCorrect').onclick = () => {
            if(!isAdminMode) { adminSecretMsg("Нет прав"); return; }
            if(!gameActive || victoryFlag || waitForAnswer || !currentProblem) { adminSecretMsg("Сейчас нельзя"); return; }
            handleAnswer(currentProblem.correctAnswer);
            adminSecretMsg("✅ Выдан правильный ответ");
        };
        document.getElementById('secretInstantWin').onclick = () => {
            if(!isAdminMode) { adminSecretMsg("Нет прав"); return; }
            if(victoryFlag) { adminSecretMsg("Уже победа"); return; }
            if(nextTimer) clearTimeout(nextTimer);
            waitForAnswer = false;
            while(correctCount < TARGET_CORRECT) {
                correctCount++;
                score += 10 + Math.floor(difficulty/5);
                difficulty = (correctCount / TARGET_CORRECT) * 100;
            }
            scoreSpan.innerText = score;
            updateUI();
            victoryGame();
            drawPowerSystem();
            adminSecretMsg("🌟 Мгновенная победа!");
        };
        document.getElementById('secretAddLife').onclick = () => {
            if(!isAdminMode) { adminSecretMsg("Нет прав"); return; }
            if(!gameActive || victoryFlag) { adminSecretMsg("Игра завершена"); return; }
            stability = Math.min(5, stability+1);
            livesSpan.innerText = stability;
            messageDiv.innerHTML = "❤️ Админ восстановил стабильность +1";
            drawPowerSystem();
            adminSecretMsg("❤️ +1 стабильность");
        };
        document.getElementById('secretAddPoints').onclick = () => {
            if(!isAdminMode) { adminSecretMsg("Нет прав"); return; }
            if(!gameActive || victoryFlag) { adminSecretMsg("Игра завершена"); return; }
            score += 50;
            scoreSpan.innerText = score;
            messageDiv.innerHTML = "🔋 Админ начислил +50 МВт";
            drawPowerSystem();
            adminSecretMsg("🔋 +50 МВт");
        };
    }

    function adminSecretMsg(msg) {
        let el = document.getElementById('adminSecretStatus');
        if(el) { el.innerHTML = msg; setTimeout(()=>{ if(el) el.innerHTML=''; }, 2000); }
    }

    function openSecretAdmin() {
        if(!adminModal) createAdminModal();
        adminModal.style.display = 'flex';
    }

    // Жест 5 тапов по счёту
    const scoreBoxElement = document.querySelector('.score-box');
    function onSecretTap() {
        if(tapTimer) clearTimeout(tapTimer);
        tapCount++;
        tapTimer = setTimeout(() => { tapCount = 0; tapTimer = null; }, 800);
        if(tapCount >= 5) {
            tapCount = 0;
            if(tapTimer) clearTimeout(tapTimer);
            openSecretAdmin();
        }
    }
    if(scoreBoxElement) {
        scoreBoxElement.addEventListener('click', onSecretTap);
        scoreBoxElement.addEventListener('touchstart', (e) => { e.preventDefault(); onSecretTap(); });
    }

    // --- Игровая логика ---
    function handleAnswer(selectedVal) {
        if(!gameActive || waitForAnswer || victoryFlag) return;
        const isCorrect = (selectedVal === currentProblem.correctAnswer);
        if(isCorrect) {
            let points = 10 + Math.floor(difficulty / 5);
            score += points; scoreSpan.innerText = score;
            correctCount++;
            let newDifficulty = (correctCount / TARGET_CORRECT) * 100;
            difficulty = Math.min(100, newDifficulty);
            updateUI();
            messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Сложность ↑ ${Math.floor(difficulty)}% | Мост ${correctCount}/${TARGET_CORRECT}`;
            drawCorrectFlashEffect();
            if(correctCount >= TARGET_CORRECT) { victoryGame(); drawPowerSystem(); return; }
        } else {
            stability--;
            livesSpan.innerText = stability;
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
            drawWrongFlashEffect();
            if(stability <= 0) { gameDefeat(); drawPowerSystem(); return; }
        }
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => { if(gameActive && !victoryFlag && stability > 0) loadNewChallenge(); nextTimer = null; }, 1300);
        drawPowerSystem();
    }

    function loadNewChallenge() {
        if(!gameActive || victoryFlag) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = getRandomProblem();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        let complexityBar = "▰".repeat(Math.floor(difficulty/10)) + "▱".repeat(10 - Math.floor(difficulty/10));
        messageDiv.innerHTML = `📈 Сложность: ${Math.floor(difficulty)}% ${complexityBar} | ${currentProblem.hint}`;
        drawPowerSystem();
    }

    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach((opt) => {
            const btn = document.createElement('div'); btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("ЦЕПЬ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suffix = " Дж";
            else if(currentProblem.title.includes("ЭНЕРГИЯ")) suffix = " кВт·ч";
            btn.innerText = `${opt}${suffix}`;
            btn.addEventListener('click', (e) => { e.stopPropagation(); if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); });
            answersContainer.appendChild(btn);
        });
    }

    function victoryGame() {
        if(victoryFlag) return;
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД СИЯЕТ! ✨🏆<br>Сложность покорена: ${Math.floor(difficulty)}% | Счёт: ${score} МВт.`;
        drawVictoryScene();
    }

    function gameDefeat() {
        if(victoryFlag) return;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост рухнул... Вы дошли до ${correctCount}/15. Перезапустите. 💥`;
        drawGameOverVisual();
    }

    function restart() {
        if(nextTimer) clearTimeout(nextTimer);
        score = 0; stability = 3; correctCount = 0; difficulty = 0;
        gameActive = true; victoryFlag = false; waitForAnswer = false;
        scoreSpan.innerText = "0"; livesSpan.innerText = "3";
        updateUI();
        loadNewChallenge();
        drawPowerSystem();
    }

    // Визуальные эффекты
    function drawPowerSystem() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#121f1c"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#3a6b55"; ctx.beginPath(); ctx.ellipse(100,200,50,70,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#d4c97a"; ctx.font="bold 24px monospace"; ctx.fillText("⚙️",82,215);
        ctx.fillStyle="#cfe6cf"; ctx.font="12px monospace"; ctx.fillText("ГЕНЕРАТОР",68,260);
        ctx.fillStyle="#f5cb5c"; ctx.beginPath(); ctx.arc(690,180,30,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#664d1a"; ctx.font="22px monospace"; ctx.fillText("🏙️",678,192);
        const waypoints = [{x:150,y:200},{x:280,y:180},{x:400,y:210},{x:550,y:170},{x:660,y:190},{x:690,y:180}];
        let totalLen=0; for(let i=0;i<waypoints.length-1;i++) totalLen+=Math.hypot(waypoints[i+1].x-waypoints[i].x, waypoints[i+1].y-waypoints[i].y);
        let targetProgress=Math.min(1,correctCount/TARGET_CORRECT), currentDist=totalLen*targetProgress;
        ctx.beginPath(); for(let i=0;i<waypoints.length-1;i++) { if(i===0) ctx.moveTo(waypoints[i].x,waypoints[i].y); ctx.lineTo(waypoints[i+1].x,waypoints[i+1].y); }
        ctx.strokeStyle="#4a5b55"; ctx.lineWidth=8; ctx.stroke();
        ctx.beginPath(); let acc=0,started=false;
        for(let i=0;i<waypoints.length-1;i++){ let p1=waypoints[i],p2=waypoints[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=currentDist){ if(!started){ctx.moveTo(p1.x,p1.y);started=true;} ctx.lineTo(p2.x,p2.y); acc+=seg;}
            else if(acc<currentDist && acc+seg>currentDist){ let t=(currentDist-acc)/seg, ix=p1.x+(p2.x-p1.x)*t, iy=p1.y+(p2.y-p1.y)*t; if(!started) ctx.moveTo(p1.x,p1.y); ctx.lineTo(ix,iy); break; } }
        ctx.strokeStyle="#f5d742"; ctx.lineWidth=6; ctx.stroke();
        for(let i=0;i<stability;i++){ ctx.fillStyle="#61dafb"; ctx.fillRect(30+i*35,290,25,15); }
        if(victoryFlag){ ctx.fillStyle="#ffdd88cc"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#2c5a2e"; ctx.font="bold 28px monospace"; ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!",canvas.width/2-170,canvas.height/2-20); }
        if(stability<=0 && !victoryFlag){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; ctx.font="bold 26px monospace"; ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА",canvas.width/2-150,canvas.height/2); }
    }
    function drawCorrectFlashEffect(){ ctx.fillStyle="#66ff99aa"; ctx.fillRect(0,0,canvas.width,canvas.height); setTimeout(()=>drawPowerSystem(),150); }
    function drawWrongFlashEffect(){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,canvas.width,canvas.height); setTimeout(()=>drawPowerSystem(),180); }
    function drawGameOverVisual(){ drawPowerSystem(); }
    function drawVictoryScene(){ drawPowerSystem(); }

    function startGameAfterLoad() {
        restart();
        // Подписываем кнопку перезапуска
        document.getElementById('restartGame').addEventListener('click', () => restart());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restart(); });
    }

    // ======================== ИНИЦИАЛИЗАЦИЯ ========================
    auth.signInAnonymously().catch(error => console.error("Ошибка анонимного входа:", error));
    auth.onAuthStateChanged(user => {
        if(user) userIdSpan.innerText = user.uid.substring(0, 12) + "...";
        else userIdSpan.innerText = "Не авторизован";
    });
    // Начинаем загрузку задач с GitHub
    fetchTasksFromGitHub();
</script>
</body>
</html>
