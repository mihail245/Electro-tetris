<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика</title>
    <!-- Firebase SDKs (только для простой анонимной авторизации) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* ===== Стили ===== */
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .progress-box, .user-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .score-box span:first-child, .lives-box span:first-child, .progress-box span:first-child, .user-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        
        /* Стили для админ-модалки */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .admin-card {
            background: #0e1a1f;
            border: 2px solid #ffaa44;
            border-radius: 48px;
            padding: 25px 20px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 40px black;
            color: #eee;
        }
        .admin-card button {
            background: #3a7a5a;
            border: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-card button:active { transform: scale(0.97); }
        .close-admin {
            background: #aa3e2c;
        }
        .admin-status {
            font-size: 0.8rem;
            margin-top: 12px;
            color: #ffaa66;
        }

        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">Загрузка...</div>
                    <div class="question-text" id="questionDisplay">Пожалуйста, подождите</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Решайте задачи, чтобы построить энергомост!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box" id="secretTapArea">
                <span>🔋 МЕГАВАТТЫ</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <div class="user-box"><span>👤 ID</span><span id="userIdDisplay">Не авторизован</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<!-- Модалка админ-панели -->
<div id="adminModal" class="admin-modal">
    <div class="admin-card">
        <h3>⚡ АДМИН-ПАНЕЛЬ ⚡</h3>
        <div id="adminPanelActions">
            <button id="giveCorrectAnswerBtn">✅ ВЫДАТЬ ПРАВИЛЬНЫЙ ОТВЕТ</button>
            <button id="instaWinsBtn">🏆 МГНОВЕННАЯ ПОБЕДА</button>
            <button id="addLivesBtn">❤️ +1 СТАБИЛЬНОСТЬ</button>
            <button id="addPointsBtn">🔋 +50 МВт</button>
            <div class="admin-status" id="adminStatusMsg"></div>
        </div>
        <div style="margin-top: 15px;">
            <button id="adminCloseBtn" class="close-admin">✖️ ЗАКРЫТЬ</button>
        </div>
    </div>
</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ИГРЫ ========================
    const TARGET_CORRECT = 15;
    let correctCount = 0;
    let gameActive = true;
    let victoryFlag = false;
    
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    let CANVAS_W = 750, CANVAS_H = 420;
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    
    let score = 0;
    let stability = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    
    // DOM элементы
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    const userIdSpan = document.getElementById('userIdDisplay');
    
    // Админ-переменные
    let isAdminMode = false;
    
    // ========== ВСТРОЕННЫЕ ЗАДАЧИ ==========
    const TASKS_LIBRARY = [
        { title: "⚡ ЗАКОН ОМА", eq: "U = 24 В, I = 2 А", question: "Найдите сопротивление R (в омах)", correctAnswer: 12, hint: "R = U / I" },
        { title: "⚡ ЗАКОН ОМА", eq: "U = 220 В, I = 4 А", question: "Найдите сопротивление R (в омах)", correctAnswer: 55, hint: "R = U / I" },
        { title: "⚡ ЗАКОН ОМА", eq: "U = 48 В, I = 6 А", question: "Найдите сопротивление R (в омах)", correctAnswer: 8, hint: "R = U / I" },
        { title: "🔋 МОЩНОСТЬ ТОКА", eq: "U = 220 В, I = 5 А", question: "Найдите мощность P (в ваттах)", correctAnswer: 1100, hint: "P = U × I" },
        { title: "🔋 МОЩНОСТЬ ТОКА", eq: "U = 12 В, I = 2 А", question: "Найдите мощность P (в ваттах)", correctAnswer: 24, hint: "P = U × I" },
        { title: "🔋 МОЩНОСТЬ ТОКА", eq: "U = 380 В, I = 10 А", question: "Найдите мощность P (в ваттах)", correctAnswer: 3800, hint: "P = U × I" },
        { title: "🔗 ПОСЛЕДОВАТЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 10 Ω, R₂ = 20 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 30, hint: "Rобщ = R₁ + R₂" },
        { title: "🔗 ПОСЛЕДОВАТЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 15 Ω, R₂ = 25 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 40, hint: "Rобщ = R₁ + R₂" },
        { title: "🔗 ПОСЛЕДОВАТЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 30 Ω, R₂ = 50 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 80, hint: "Rобщ = R₁ + R₂" },
        { title: "🔀 ПАРАЛЛЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 20 Ω, R₂ = 30 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 12, hint: "1/Rобщ = 1/R₁ + 1/R₂" },
        { title: "🔀 ПАРАЛЛЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 10 Ω, R₂ = 10 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 5, hint: "1/Rобщ = 1/R₁ + 1/R₂" },
        { title: "🔀 ПАРАЛЛЕЛЬНОЕ СОЕДИНЕНИЕ", eq: "R₁ = 12 Ω, R₂ = 12 Ω", question: "Найдите общее сопротивление Rобщ", correctAnswer: 6, hint: "1/Rобщ = 1/R₁ + 1/R₂" },
        { title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ", eq: "КПД = 75%, Pвх = 400 Вт", question: "Найдите полезную мощность Pвых", correctAnswer: 300, hint: "Pвых = Pвх × КПД / 100" },
        { title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ", eq: "КПД = 85%, Pвх = 200 Вт", question: "Найдите полезную мощность Pвых", correctAnswer: 170, hint: "Pвых = Pвх × КПД / 100" },
        { title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ", eq: "КПД = 90%, Pвх = 500 Вт", question: "Найдите полезную мощность Pвых", correctAnswer: 450, hint: "Pвых = Pвх × КПД / 100" },
        { title: "💡 РАБОТА ЭЛЕКТРИЧЕСКОГО ТОКА", eq: "P = 1000 Вт, t = 30 с", question: "Найдите работу A (в джоулях)", correctAnswer: 30000, hint: "A = P × t" },
        { title: "💡 РАБОТА ЭЛЕКТРИЧЕСКОГО ТОКА", eq: "P = 500 Вт, t = 10 с", question: "Найдите работу A (в джоулях)", correctAnswer: 5000, hint: "A = P × t" }
    ];
    
    // ======================== СЕКРЕТНЫЙ ВХОД В АДМИНКУ (5 тапов по мегаваттам) ========================
    let tapCount = 0;
    let tapTimer = null;
    const secretTapArea = document.getElementById('secretTapArea');
    
    function resetTapCounter() {
        tapCount = 0;
        if(tapTimer) clearTimeout(tapTimer);
        tapTimer = null;
    }
    
    function onSecretTap() {
        if(tapTimer) clearTimeout(tapTimer);
        tapCount++;
        tapTimer = setTimeout(() => {
            tapCount = 0;
            tapTimer = null;
        }, 800);
        
        if(tapCount >= 5) {
            tapCount = 0;
            if(tapTimer) clearTimeout(tapTimer);
            isAdminMode = true;
            openAdminModal();
            messageDiv.innerHTML = "🔓 АДМИН-РЕЖИМ АКТИВИРОВАН!";
            setTimeout(() => {
                if(messageDiv && !victoryFlag && gameActive) messageDiv.innerHTML = "💡 Админ-панель открыта. Используйте команды.";
            }, 2000);
        }
    }
    
    if(secretTapArea) {
        secretTapArea.addEventListener('click', onSecretTap);
        secretTapArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onSecretTap();
        });
    }
    
    // ======================== АДМИН-ФУНКЦИИ И МОДАЛКА ========================
    const adminModal = document.getElementById('adminModal');
    const adminStatusMsg = document.getElementById('adminStatusMsg');
    const adminCloseBtn = document.getElementById('adminCloseBtn');
    
    function openAdminModal() {
        if (!isAdminMode) return;
        adminModal.style.display = 'flex';
        adminStatusMsg.innerHTML = 'Администратор энергосистемы онлайн ⚡';
    }
    
    function closeAdminModal() {
        adminModal.style.display = 'none';
    }
    
    function adminGiveCorrectAnswer() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена (победа/поражение).'; return; }
        if(waitForAnswer) { adminStatusMsg.innerHTML = '⏳ Сейчас смена задачи, подождите...'; return; }
        if(currentProblem) {
            handleAnswer(currentProblem.correctAnswer);
            adminStatusMsg.innerHTML = '✅ Выдан правильный ответ!';
        } else {
            adminStatusMsg.innerHTML = '⚠️ Нет активной задачи';
        }
    }
    
    function adminInstantWin() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(victoryFlag) { adminStatusMsg.innerHTML = '🏆 Уже победа! Перезапустите.'; return; }
        if(!gameActive) { adminStatusMsg.innerHTML = '❌ Игра неактивна, перезапустите'; return; }
        
        if(nextTimer) clearTimeout(nextTimer);
        while(correctCount < TARGET_CORRECT) {
            correctCount++;
            let points = 10;
            score += points;
        }
        scoreSpan.innerText = score;
        updateUI();
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД СИЯЕТ! ✨🏆<br>Счёт: ${score} МВт.`;
        drawVictoryScene();
        adminStatusMsg.innerHTML = '🌟 МГНОВЕННАЯ ПОБЕДА! Энергомост построен! 🌟';
    }
    
    function adminAddLife() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена'; return; }
        stability = Math.min(5, stability + 1);
        livesSpan.innerText = stability;
        messageDiv.innerHTML = `❤️ Администратор добавил стабильность! +1 ❤️`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '❤️ +1 стабильность добавлена';
    }
    
    function adminAddPoints() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена'; return; }
        score += 50;
        scoreSpan.innerText = score;
        messageDiv.innerHTML = `🔋 Администратор начислил +50 МВт! 🔋`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '🔋 +50 мегаватт добавлено!';
    }
    
    // Привязываем обработчики админ-кнопок
    document.getElementById('giveCorrectAnswerBtn').addEventListener('click', adminGiveCorrectAnswer);
    document.getElementById('instaWinsBtn').addEventListener('click', adminInstantWin);
    document.getElementById('addLivesBtn').addEventListener('click', adminAddLife);
    document.getElementById('addPointsBtn').addEventListener('click', adminAddPoints);
    adminCloseBtn.addEventListener('click', closeAdminModal);
    adminModal.addEventListener('click', (e) => {
        if(e.target === adminModal) closeAdminModal();
    });
    
    // ======================== ОСНОВНАЯ ИГРОВАЯ МЕХАНИКА ========================
    function randInt(min, max) { 
        return Math.floor(Math.random() * (max - min + 1)) + min; 
    }
    
    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
    }
    
    function getRandomProblem() {
        return { ...TASKS_LIBRARY[Math.floor(Math.random() * TASKS_LIBRARY.length)] };
    }
    
    function generateOptions(correct) {
        let opts = new Set();
        opts.add(correct);
        while(opts.size < 4) {
            let delta = Math.floor(Math.random() * 21) - 10;
            let cand = correct + delta;
            if(cand < 1) cand = correct + Math.floor(Math.random() * 10) + 1;
            if(cand > 0 && cand < 50000) opts.add(cand);
        }
        let arr = Array.from(opts);
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function handleAnswer(selectedVal) {
        if(!gameActive || waitForAnswer || victoryFlag) return;
        const isCorrect = (selectedVal === currentProblem.correctAnswer);
        if(isCorrect) {
            let points = 10;
            score += points;
            scoreSpan.innerText = score;
            correctCount++;
            updateUI();
            messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Мост ${correctCount}/${TARGET_CORRECT}`;
            drawCorrectFlashEffect();
            if(correctCount >= TARGET_CORRECT) { 
                victoryGame(); 
                drawPowerSystem(); 
                return; 
            }
        } else {
            stability--;
            livesSpan.innerText = stability;
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
            drawWrongFlashEffect();
            if(stability <= 0) { 
                gameDefeat(); 
                drawPowerSystem(); 
                return; 
            }
        }
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => { 
            if(gameActive && !victoryFlag && stability > 0) loadNewChallenge(); 
            nextTimer = null; 
        }, 1300);
        drawPowerSystem();
    }
    
    function loadNewChallenge() {
        if(!gameActive || victoryFlag) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = getRandomProblem();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.eq}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        messageDiv.innerHTML = `💡 ${currentProblem.hint}`;
        drawPowerSystem();
    }
    
    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach((opt) => {
            const btn = document.createElement('div'); 
            btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("СОЕДИНЕНИЕ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suffix = " Дж";
            btn.innerText = `${opt}${suffix}`;
            btn.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); 
            });
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); 
            });
            answersContainer.appendChild(btn);
        });
    }
    
    function victoryGame() { 
        if(victoryFlag) return; 
        victoryFlag = true; 
        gameActive = false; 
        waitForAnswer = true; 
        if(nextTimer) clearTimeout(nextTimer); 
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД СИЯЕТ! ✨🏆<br>Счёт: ${score} МВт.`; 
        drawVictoryScene(); 
    }
    
    function gameDefeat() { 
        if(victoryFlag) return; 
        gameActive = false; 
        waitForAnswer = true; 
        if(nextTimer) clearTimeout(nextTimer); 
        messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост рухнул... Вы дошли до ${correctCount}/15. Перезапустите. 💥`; 
        drawGameOverVisual(); 
    }
    
    function restart() {
        if(nextTimer) clearTimeout(nextTimer);
        score = 0;
        stability = 3;
        correctCount = 0;
        gameActive = true;
        victoryFlag = false;
        waitForAnswer = false;
        scoreSpan.innerText = "0";
        livesSpan.innerText = "3";
        updateUI();
        loadNewChallenge();
        drawPowerSystem();
    }
    
    // ======================== ВИЗУАЛЬНЫЕ ЭФФЕКТЫ (canvas) ========================
    function drawPowerSystem() { 
        ctx.clearRect(0,0,CANVAS_W,CANVAS_H); 
        ctx.fillStyle="#121f1c"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
        ctx.fillStyle="#3a6b55"; 
        ctx.beginPath(); 
        ctx.ellipse(100,200,50,70,0,0,Math.PI*2); 
        ctx.fill();
        ctx.fillStyle="#d4c97a"; 
        ctx.font="bold 24px monospace"; 
        ctx.fillText("⚙️",82,215);
        ctx.fillStyle="#cfe6cf"; 
        ctx.font="12px monospace"; 
        ctx.fillText("ГЕНЕРАТОР",68,260);
        ctx.fillStyle="#f5cb5c"; 
        ctx.beginPath(); 
        ctx.arc(690,180,30,0,Math.PI*2); 
        ctx.fill();
        ctx.fillStyle="#664d1a"; 
        ctx.font="22px monospace"; 
        ctx.fillText("🏙️",678,192);
        
        const waypoints = [{x:150,y:200},{x:280,y:180},{x:400,y:210},{x:550,y:170},{x:660,y:190},{x:690,y:180}];
        let totalLen=0; 
        for(let i=0;i<waypoints.length-1;i++) totalLen+=Math.hypot(waypoints[i+1].x-waypoints[i].x, waypoints[i+1].y-waypoints[i].y);
        let targetProgress=Math.min(1,correctCount/TARGET_CORRECT), currentDist=totalLen*targetProgress;
        
        ctx.beginPath(); 
        for(let i=0;i<waypoints.length-1;i++) { 
            if(i===0) ctx.moveTo(waypoints[i].x,waypoints[i].y); 
            ctx.lineTo(waypoints[i+1].x,waypoints[i+1].y); 
        }
        ctx.strokeStyle="#4a5b55"; 
        ctx.lineWidth=8; 
        ctx.stroke();
        
        ctx.beginPath(); 
        let acc=0,started=false;
        for(let i=0;i<waypoints.length-1;i++){ 
            let p1=waypoints[i],p2=waypoints[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=currentDist){ 
                if(!started){ctx.moveTo(p1.x,p1.y);started=true;} 
                ctx.lineTo(p2.x,p2.y); 
                acc+=seg;
            }
            else if(acc<currentDist && acc+seg>currentDist){ 
                let t=(currentDist-acc)/seg, ix=p1.x+(p2.x-p1.x)*t, iy=p1.y+(p2.y-p1.y)*t; 
                if(!started) ctx.moveTo(p1.x,p1.y); 
                ctx.lineTo(ix,iy); 
                break; 
            } 
        }
        ctx.strokeStyle="#f5d742"; 
        ctx.lineWidth=6; 
        ctx.stroke();
        
        for(let i=0;i<stability;i++){ 
            ctx.fillStyle="#61dafb"; 
            ctx.fillRect(30+i*35,290,25,15); 
        }
        
        if(victoryFlag){ 
            ctx.fillStyle="#ffdd88cc"; 
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
            ctx.fillStyle="#2c5a2e"; 
            ctx.font="bold 28px monospace"; 
            ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!",CANVAS_W/2-170,CANVAS_H/2-20); 
        }
        if(stability<=0 && !victoryFlag){ 
            ctx.fillStyle="#ff6666aa"; 
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
            ctx.fillStyle="white"; 
            ctx.font="bold 26px monospace"; 
            ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА",CANVAS_W/2-150,CANVAS_H/2); 
        }
    }
    
    function drawCorrectFlashEffect(){ 
        ctx.fillStyle="#66ff99aa"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
        setTimeout(()=>drawPowerSystem(),150); 
    }
    
    function drawWrongFlashEffect(){ 
        ctx.fillStyle="#ff6666aa"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
        setTimeout(()=>drawPowerSystem(),180); 
    }
    
    function drawGameOverVisual(){ 
        drawPowerSystem(); 
    }
    
    function drawVictoryScene(){ 
        drawPowerSystem(); 
    }
    
    // ======================== FIREBASE АВТОРИЗАЦИЯ ========================
    auth.signInAnonymously().catch(error => {
        console.error("Ошибка анонимного входа:", error);
        userIdSpan.innerText = "Ошибка входа";
    });
    
    auth.onAuthStateChanged(user => {
        if(user) {
            userIdSpan.innerText = user.uid.substring(0, 12) + "...";
        } else {
            userIdSpan.innerText = "Нет входа";
        }
    });
    
    // ======================== ЗАПУСК ========================
    document.getElementById('restartGame').addEventListener('click', () => restart());
    document.getElementById('restartGame').addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        restart(); 
    });
    
    // Запуск игры
    restart();
</script>
