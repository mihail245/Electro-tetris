<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Математика электрика: Исправь цепь | Адаптивная игра</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b2b1f 0%, #05140e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 16px;
        }

        /* Основной контейнер - резиновый */
        .game-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #2c3e2f;
            background-image: radial-gradient(circle at 20% 30%, rgba(60,100,50,0.5) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 20px 25px 20px;
            border-bottom: 6px solid #5a7a4a;
            transition: all 0.2s;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background-color: #1e2a22;
            width: 100%;
            height: auto;
            background: #192f21;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0f1f1ad9;
            backdrop-filter: blur(4px);
            padding: 10px 18px;
            border-radius: 60px;
            color: #d4f1d9;
            text-shadow: 0 2px 2px black;
            font-weight: bold;
        }

        .score-box, .lives-box, .level-box {
            background: #00000066;
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child {
            color: #ffd966;
        }

        .score-box span:last-child, .lives-box span:last-child, .level-box span:last-child {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #f0f0f0;
            min-width: 60px;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 6px 20px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
            touch-action: manipulation;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a33f00;
        }

        .message-area {
            background: #1e2a1e;
            padding: 10px 16px;
            border-radius: 32px;
            font-size: 0.9rem;
            text-align: center;
            flex: 1;
            color: #ffecb3;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            word-break: break-word;
        }

        /* Адаптация для телефонов (ПК-версия определяется по ширине и наличию параметра PC в URL) 
           но стили работают универсально: на телефоне увеличиваем кнопки, шрифты */
        @media (max-width: 700px) {
            body {
                padding: 8px;
            }
            .game-container {
                padding: 12px 12px 18px 12px;
            }
            .score-box, .lives-box, .level-box {
                font-size: 0.9rem;
                padding: 4px 12px;
                gap: 6px;
            }
            .restart-btn {
                font-size: 0.9rem;
                padding: 5px 16px;
            }
            .message-area {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
            .info-panel {
                gap: 8px;
            }
        }

        /* Для очень маленьких экранов (телефоны) */
        @media (max-width: 550px) {
            .score-box span:last-child, .lives-box span:last-child, .level-box span:last-child {
                min-width: 45px;
            }
            .restart-btn {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
        }

        /* Специфичная пк-версия: если ширина >= 1024px, делаем более просторный вид, но не ломаем */
        @media (min-width: 1024px) {
            .game-container {
                padding: 28px 32px 32px 32px;
            }
            .message-area {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <canvas id="circuitCanvas" width="1000" height="560" style="width:100%; height:auto; max-width:1000px; aspect-ratio:1000/560"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>⚡ ОЧКИ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>🔋 ЖИЗНИ</span><span id="livesValue">3</span></div>
            <div class="level-box"><span>📐 УРОВЕНЬ</span><span id="levelValue">1</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
        <div class="message-area" id="gameMessage">
            🔧 РЕШИ УРАВНЕНИЕ → ВЫБЕРИ СОПРОТИВЛЕНИЕ (R) 🔧
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== ИГРА "МАТЕМАТИКА ЭЛЕКТРИКА" ==========
        // Адаптивная версия: canvas размеры заданы 1000x560, но скейлинг через CSS.
        // Определение версии для ПК или телефона через параметр URL ?PC (регистронезависимо)
        // и дополнительно через ширину экрана: но это влияет только на размеры кнопок в canvas (чувствительность)
        // Отрисовка сама подстроит расположение относительно фиксированной сетки 1000x560, но клики скейлятся.
        
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        
        // Фиксированные размеры canvas (логические)
        let CANVAS_W = 1000;
        let CANVAS_H = 560;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // Игровые переменные
        let score = 0;
        let lives = 3;
        let level = 1;
        let currentProblem = null;
        let options = [];
        let selectedOptionIndex = -1;
        let waitForNext = false;
        let nextTimer = null;
        
        // UI элементы
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const messageDiv = document.getElementById('gameMessage');
        
        // Флаг ПК-стиля (для отладки или изменения логики, но визуально через CSS)
        // также можно чуть увеличить радиус кликов, но координаты скейлятся.
        let isPC = false;
        
        // Проверяем параметр PC в URL (можно использовать для точной настройки поведения)
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('PC') || urlParams.has('pc')) {
            isPC = true;
            document.body.classList.add('pc-mode');
        } else {
            // если ширина экрана больше 900px и нет touch, считаем как ПК условно (но не меняем интерфейс)
            if(window.innerWidth > 900 && !('ontouchstart' in window)) {
                isPC = true;
            }
        }
        
        // Вспомогательные функции
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // Генерация задачи
        function generateProblem() {
            const type = randInt(0, 2);
            const baseMin = 8;
            const baseMax = 45 + Math.min(level * 9, 160);
            
            if (type === 0) { 
                let R1 = randInt(baseMin, baseMax);
                let R2 = randInt(baseMin, baseMax);
                let R_missing = randInt(baseMin, baseMax);
                let R_total = R1 + R2 + R_missing;
                return {
                    type: 'series',
                    text: `⚡ Последовательное соединение`,
                    equation: `R₁ = ${R1} Ω,  R₂ = ${R2} Ω,  Rₒбщ = ${R_total} Ω`,
                    question: `Найди сопротивление Rₓ (Ω)`,
                    correctAnswer: R_missing,
                    visualHint: `R₁ + R₂ + Rₓ = Rₒбщ`
                };
            } 
            else if (type === 1) {
                let R1 = randInt(baseMin, baseMax);
                let R_total = randInt(baseMin + 5, baseMax + 35);
                let R_missing = -1;
                let attempts = 0;
                while(attempts < 35) {
                    if(R1 > R_total) {
                        let num = R1 * R_total;
                        let den = R1 - R_total;
                        if(num % den === 0) {
                            R_missing = num / den;
                            if(R_missing > 4 && R_missing < 350) break;
                        }
                    }
                    R_total = randInt(baseMin + 4, baseMax + 40);
                    R1 = randInt(baseMin, baseMax);
                    attempts++;
                }
                if(R_missing === -1 || R_missing <= 0) {
                    return generateProblem();
                }
                return {
                    type: 'parallel',
                    text: `⚡ Параллельное соединение`,
                    equation: `R₁ = ${R1} Ω,  Rₒбщ = ${R_total} Ω`,
                    question: `Вычисли Rₓ (Ω) для параллельной цепи`,
                    correctAnswer: R_missing,
                    visualHint: `1/Rₒбщ = 1/R₁ + 1/Rₓ`
                };
            }
            else {
                let voltage = randInt(15, 200);
                let current = randInt(1, 14);
                let resistance = voltage / current;
                if(voltage % current !== 0) {
                    voltage = voltage - (voltage % current);
                    if(voltage < current) voltage = current * randInt(2, 14);
                    resistance = voltage / current;
                }
                return {
                    type: 'ohm',
                    text: `📐 Закон Ома`,
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Чему равно сопротивление R (Ω)?`,
                    correctAnswer: resistance,
                    visualHint: `R = U / I`
                };
            }
        }
        
        function generateOptions(correct) {
            let opts = new Set();
            opts.add(correct);
            let rangeLow = Math.max(2, Math.floor(correct * 0.45));
            let rangeHigh = correct + Math.max(8, Math.floor(correct * 0.8));
            if (level > 4) rangeHigh = correct + Math.floor(correct * 1.1);
            while(opts.size < 4) {
                let offset = randInt(-Math.floor(correct*0.6), Math.floor(correct*0.6));
                let variant = correct + offset;
                if(variant < 1) variant = correct + randInt(2, 12);
                if(variant > 550) variant = correct - randInt(3, 20);
                if(variant > 0) opts.add(variant);
                if(opts.size < 3) {
                    let randomAlt = randInt(rangeLow, rangeHigh);
                    if(randomAlt !== correct) opts.add(randomAlt);
                }
            }
            let optsArray = Array.from(opts);
            for (let i = optsArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optsArray[i], optsArray[j]] = [optsArray[j], optsArray[i]];
            }
            return optsArray;
        }
        
        function loadNewProblem() {
            if(nextTimer) clearTimeout(nextTimer);
            waitForNext = false;
            selectedOptionIndex = -1;
            currentProblem = generateProblem();
            options = generateOptions(currentProblem.correctAnswer);
            messageDiv.innerHTML = `🔌 ${currentProblem.text} &nbsp;| ${currentProblem.equation}<br>❓ ${currentProblem.question}`;
            drawCircuit();
        }
        
        function handleAnswer(selectedIdx) {
            if(waitForNext) return;
            if(!currentProblem) return;
            const selectedValue = options[selectedIdx];
            const isCorrect = (selectedValue === currentProblem.correctAnswer);
            
            if(isCorrect) {
                let points = 10 * level;
                score += points;
                scoreSpan.innerText = score;
                messageDiv.innerHTML = `✅ ИДЕАЛЬНО! +${points} очков! R = ${currentProblem.correctAnswer} Ω ✅<br>${currentProblem.visualHint}`;
                drawCorrectFlash();
                // повышение уровня
                if(score >= level * 55 && level < 20) {
                    level++;
                    levelSpan.innerText = level;
                    messageDiv.innerHTML += `<br>🎉 НОВЫЙ УРОВЕНЬ ${level}! Схема усложняется 🎉`;
                }
            } else {
                lives--;
                livesSpan.innerText = lives;
                messageDiv.innerHTML = `❌ ОШИБКА! Правильный ответ: ${currentProblem.correctAnswer} Ω.<br>${currentProblem.visualHint} ❌`;
                drawWrongFlash();
                if(lives <= 0) {
                    gameOver();
                    return;
                }
            }
            waitForNext = true;
            nextTimer = setTimeout(() => {
                if(lives > 0) loadNewProblem();
                else if(lives <=0) { /* игра окончена */ }
                nextTimer = null;
            }, 1400);
            drawCircuit();
        }
        
        function gameOver() {
            waitForNext = true;
            messageDiv.innerHTML = `💀 КОРОТКОЕ ЗАМЫКАНИЕ! ИГРА ЗАВЕРШЕНА 💀<br>Ваши очки: ${score}. Перезапустите схему!`;
            drawGameOverScreen();
        }
        
        function restartGame() {
            if(nextTimer) clearTimeout(nextTimer);
            score = 0;
            lives = 3;
            level = 1;
            scoreSpan.innerText = "0";
            livesSpan.innerText = "3";
            levelSpan.innerText = "1";
            waitForNext = false;
            selectedOptionIndex = -1;
            loadNewProblem();
        }
        
        // ---------- ОТРИСОВКА (профессиональная, яркая) ----------
        function drawCircuit() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            // стиль платы
            ctx.fillStyle = "#1c2a20";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            // линии цепи
            ctx.beginPath();
            ctx.strokeStyle = "#71c286";
            ctx.lineWidth = 3;
            ctx.moveTo(70, 150);
            ctx.lineTo(220, 150);
            ctx.lineTo(220, 240);
            ctx.lineTo(380, 240);
            ctx.lineTo(380, 150);
            ctx.lineTo(720, 150);
            ctx.lineTo(720, 300);
            ctx.lineTo(850, 300);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(850, 300);
            ctx.lineTo(850, 400);
            ctx.lineTo(70, 400);
            ctx.lineTo(70, 150);
            ctx.stroke();
            
            // Резистор R1
            ctx.fillStyle = "#bc9a6c";
            ctx.fillRect(270, 195, 80, 32);
            ctx.fillStyle = "#fff0c0";
            ctx.font = "bold 18px 'Courier New'";
            ctx.fillText("R₁", 300, 218);
            // Резистор R2
            ctx.fillRect(480, 135, 80, 32);
            ctx.fillText("R₂", 510, 158);
            
            // Лампочка
            ctx.beginPath();
            ctx.arc(880, 100, 36, 0, 2*Math.PI);
            ctx.fillStyle = "#ddbb55";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(880, 100, 26, 0, 2*Math.PI);
            ctx.fillStyle = (selectedOptionIndex !== -1 && !waitForNext && currentProblem && options[selectedOptionIndex] === currentProblem.correctAnswer) ? "#ffff99" : "#ffbb33";
            ctx.fill();
            ctx.fillStyle = "#664411";
            ctx.font = "26px monospace";
            ctx.fillText("💡", 868, 115);
            
            // Rx неизвестный
            ctx.fillStyle = "#3e6d41";
            ctx.fillRect(600, 280, 100, 45);
            ctx.fillStyle = "#f7e05e";
            ctx.font = "bold 24px 'Courier New'";
            ctx.fillText("Rₓ = ?", 618, 312);
            
            // Математическая информация
            if(currentProblem) {
                ctx.fillStyle = "#0f2a1acc";
                ctx.fillRect(25, 450, 420, 85);
                ctx.fillStyle = "#cbf5d1";
                ctx.font = "bold 15px 'Segoe UI'";
                ctx.fillText(currentProblem.equation, 35, 478);
                ctx.font = "13px monospace";
                ctx.fillStyle = "#ffecb3";
                ctx.fillText(currentProblem.question, 35, 505);
                if(currentProblem.visualHint) {
                    ctx.font = "italic 12px monospace";
                    ctx.fillStyle = "#bcdaa7";
                    ctx.fillText(`→ ${currentProblem.visualHint}`, 35, 525);
                }
            }
            
            // Кнопки вариантов ответа
            drawDynamicButtons();
            
            if(lives <= 0) {
                ctx.font = "bold 32px 'Segoe UI'";
                ctx.fillStyle = "#ff7766";
                ctx.shadowBlur = 0;
                ctx.fillText("⚡ ЦЕПЬ ПОВРЕЖДЕНА ⚡", CANVAS_W/2-210, CANVAS_H-60);
            }
        }
        
        function drawDynamicButtons() {
            if(!options.length) return;
            const btnW = 190;
            const btnH = 58;
            const startX = (CANVAS_W - (btnW * 2 + 40)) / 2;
            const yPos = CANVAS_H - 100;
            window.buttonAreas = [];
            for(let i=0; i<options.length; i++) {
                let col = i % 2;
                let row = Math.floor(i/2);
                let x = startX + col * (btnW + 30);
                let y = yPos + row * (btnH + 18);
                if(waitForNext) {
                    ctx.fillStyle = "#5a6255";
                } else if(selectedOptionIndex === i) {
                    ctx.fillStyle = "#dba451";
                } else {
                    ctx.fillStyle = "#2f5a34";
                }
                ctx.fillRect(x, y, btnW, btnH);
                ctx.strokeStyle = "#d4f1b0";
                ctx.lineWidth = 2.5;
                ctx.strokeRect(x, y, btnW, btnH);
                ctx.fillStyle = "#ffffdd";
                ctx.font = "bold 22px 'Courier New'";
                ctx.fillText(`${options[i]} Ω`, x+btnW/2-28, y+btnH/2+9);
                window.buttonAreas.push({x, y, w: btnW, h: btnH, idx: i});
            }
        }
        
        function drawCorrectFlash() {
            ctx.fillStyle = "#55ff88aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawCircuit(), 130);
        }
        
        function drawWrongFlash() {
            ctx.fillStyle = "#ff5555aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawCircuit(), 150);
        }
        
        function drawGameOverScreen() {
            drawCircuit();
            ctx.font = "bold 34px monospace";
            ctx.fillStyle = "#ff4444";
            ctx.fillText("GAME OVER", CANVAS_W/2-115, CANVAS_H/2);
        }
        
        // Обработка кликов с масштабированием (для сенсоров и мыши)
        function handleCanvasInteraction(e) {
            if(waitForNext) return;
            if(lives <= 0) return;
            let clientX, clientY;
            if(e.touches) {
                // touch event
                e.preventDefault();
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            const scaleX = CANVAS_W / rect.width;
            const scaleY = CANVAS_H / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if(window.buttonAreas) {
                for(let area of window.buttonAreas) {
                    if(canvasX >= area.x && canvasX <= area.x+area.w && canvasY >= area.y && canvasY <= area.y+area.h) {
                        selectedOptionIndex = area.idx;
                        handleAnswer(area.idx);
                        drawCircuit();
                        break;
                    }
                }
            }
        }
        
        // Добавляем обработчики и для тач, и для мыши
        canvas.addEventListener('click', (e) => {
            handleCanvasInteraction(e);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCanvasInteraction(e);
        }, {passive: false});
        
        document.getElementById('restartGame').addEventListener('click', () => restartGame());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => {
            e.preventDefault();
            restartGame();
        });
        
        // Старт игры
        function init() {
            restartGame();
            // дополнительная адаптация: если телефон, можно чуть увеличить canvas шрифты через JS не обязательно
        }
        init();
    })();
</script>
</body>
</html>
