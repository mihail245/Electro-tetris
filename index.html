<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергобаланс: Математика энергетика</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* Основной контейнер - стиль "пульт управления" */
        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        /* Двухколоночная сетка: левая часть схема, правая - задание и ответы */
        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .level-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        /* Стили для кнопок ответов (интерактивные) */
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }

        @media (max-width: 780px) {
            .game-layout {
                flex-direction: column;
            }
            .answer-btn {
                padding: 10px 5px;
                font-size: 1.2rem;
            }
            .equation-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <!-- Левая часть: визуализация энергосистемы -->
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <!-- Правая панель: задача + варианты -->
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">R₁ = 10 Ω, R₂ = 20 Ω</div>
                    <div class="question-text" id="questionDisplay">Найдите общее сопротивление?</div>
                </div>
                <div class="answers-grid" id="answersContainer">
                    <!-- кнопки генерируются динамически -->
                </div>
                <div class="message-area" id="gameMessage">
                    🎛️ Подберите параметры, чтобы стабилизировать сеть!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="level-box"><span>📈 УРОВЕНЬ СЕТИ</span><span id="levelValue">1</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- НОВАЯ КОНЦЕПЦИЯ: ЭНЕРГЕТИЧЕСКИЙ ИНЖИНИРИНГ ----------
        // Игрок выступает в роли диспетчера энергосети. Нужно рассчитать параметры:
        // 1) Закон Ома для участка цепи (мощность, ток, напряжение)
        // 2) Сопротивление в смешанных цепях 
        // 3) Реактивная мощность (базовая версия — формула P = U*I, или расчёт КПД)
        // Задача сделана динамичной, интересной, с визуализацией "энергопотока".
        
        const canvas = document.getElementById('powerCanvas');
        const ctx = canvas.getContext('2d');
        let CANVAS_W = 750, CANVAS_H = 420;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // Игровые состояния
        let score = 0;          // мегаватты
        let stability = 3;      // жизни (стабильность сети)
        let level = 1;
        let currentProblem = null;
        let optionsArray = [];
        let waitForAnswer = false;
        let nextTimer = null;
        
        // DOM элементы
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const messageDiv = document.getElementById('gameMessage');
        const eqDisplay = document.getElementById('eqDisplay');
        const questionDisplay = document.getElementById('questionDisplay');
        const answersContainer = document.getElementById('answersContainer');
        
        // ---------- Генераторы задач (новые, увлекательные) ----------
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // ТИПЫ ЗАДАЧ: 0 - Мощность P=U*I, найти мощность/ток; 1 - Закон Ома (сопротивление); 2 - Последовательное/параллельное для двух резисторов (найти R2)
        // 3 - КПД или энергия (простая формула)
        function generateCoolProblem() {
            const type = randInt(0, 3);
            const lvlBonus = Math.min(level, 12);
            const rangeU = 20 + lvlBonus * 5;
            const rangeI = 2 + Math.floor(level / 2);
            
            if(type === 0) { // мощность электроприбора
                let voltage = randInt(12, 45 + lvlBonus * 4);
                let current = randInt(1, 12 + Math.floor(level/3));
                let power = voltage * current;
                return {
                    title: "📡 АКТИВНАЯ МОЩНОСТЬ",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Какова мощность P (в ваттах)?`,
                    correctAnswer: power,
                    hint: "P = U × I",
                    visualEffect: "power"
                };
            }
            else if(type === 1) { // Закон Ома: найти сопротивление
                let voltage = randInt(18, 90 + lvlBonus * 6);
                let current = randInt(2, 16);
                let resistance = voltage / current;
                if(voltage % current !== 0) {
                    voltage = voltage - (voltage % current);
                    if(voltage < current) voltage = current * randInt(2, 15);
                    resistance = voltage / current;
                }
                return {
                    title: "⚡ ЗАКОН ОМА",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Найдите сопротивление R (в омах)`,
                    correctAnswer: resistance,
                    hint: "R = U / I",
                    visualEffect: "ohm"
                };
            }
            else if(type === 2) { // Смешанная цепь: два резистора последовательно? или параллельно? Интересный вариант: найти неизвестный резистор
                let mode = randInt(0,1); // 0 - последовательно, 1 - параллельно
                if(mode === 0) {
                    let R_known = randInt(15, 70 + lvlBonus*3);
                    let R_unknown = randInt(10, 75 + lvlBonus*2);
                    let R_total = R_known + R_unknown;
                    return {
                        title: "🔌 ПОСЛЕДОВАТЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R_known} Ω,  R_общ = ${R_total} Ω`,
                        question: `Чему равно R₂ (в омах)?`,
                        correctAnswer: R_unknown,
                        hint: "R₂ = R_общ - R₁",
                        visualEffect: "series"
                    };
                } else {
                    let R1 = randInt(20, 80 + lvlBonus*3);
                    let R_total = randInt(12, 45 + lvlBonus*2);
                    // Из параллельной: 1/R_total = 1/R1 + 1/R2 => R2 = 1 / (1/R_total - 1/R1)
                    let R2 = -1;
                    for(let trys=0; trys<25; trys++) {
                        if(R1 > R_total) {
                            let denom = (R1 - R_total);
                            let num = R1 * R_total;
                            if(num % denom === 0) {
                                R2 = num / denom;
                                if(R2 > 4 && R2 < 300) break;
                            }
                        }
                        R_total = randInt(12, 50 + lvlBonus*3);
                        R1 = randInt(25, 85);
                    }
                    if(R2 === -1 || R2 <=0) {
                        R2 = randInt(15, 90);
                        R_total = Math.floor((R1 * R2) / (R1 + R2));
                    }
                    return {
                        title: "🔀 ПАРАЛЛЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R1} Ω,  R_общ = ${R_total} Ω`,
                        question: `Найдите R₂ (в омах) для параллельного соединения`,
                        correctAnswer: R2,
                        hint: "1/R₂ = 1/R_общ - 1/R₁",
                        visualEffect: "parallel"
                    };
                }
            }
            else { // тип 3: интересная задача на энергию (киловатт-часы или КПД)
                let efficiency = randInt(75, 98);
                let inputPower = randInt(100, 400 + level*15);
                let outputPower = Math.floor(inputPower * efficiency / 100);
                return {
                    title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ",
                    equation: `КПД = ${efficiency}%,  P_вх = ${inputPower} Вт`,
                    question: `Чему равна полезная мощность P_вых (Вт)?`,
                    correctAnswer: outputPower,
                    hint: "P_вых = P_вх × КПД / 100",
                    visualEffect: "efficiency"
                };
            }
        }
        
        function generateOptions(correct) {
            let opts = new Set();
            opts.add(correct);
            let rangeVar = Math.max(3, Math.floor(correct * 0.35));
            while(opts.size < 4) {
                let variation = randInt(-rangeVar, rangeVar);
                let candidate = correct + variation;
                if(candidate < 1) candidate = correct + randInt(2, 12);
                if(candidate > 900) candidate = correct - randInt(3, 25);
                if(candidate > 0) opts.add(candidate);
                if(opts.size < 3) {
                    let extra = correct + randInt(-Math.floor(correct*0.5), Math.floor(correct*0.7));
                    if(extra > 0 && extra !== correct) opts.add(extra);
                }
            }
            let arr = Array.from(opts);
            for(let i=arr.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function loadNewChallenge() {
            if(nextTimer) clearTimeout(nextTimer);
            waitForAnswer = false;
            currentProblem = generateCoolProblem();
            optionsArray = generateOptions(currentProblem.correctAnswer);
            // отображаем в панели
            eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
            questionDisplay.innerHTML = currentProblem.question;
            // Отрисовка кнопок
            renderAnswerButtons();
            messageDiv.innerHTML = `🎛️ ${currentProblem.hint} | Выберите верный параметр для стабилизации!`;
            drawPowerSystem(); // визуализация на канвасе
        }
        
        function renderAnswerButtons() {
            answersContainer.innerHTML = '';
            optionsArray.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'answer-btn';
                btn.innerText = `${opt} ${(currentProblem.title.includes("МОЩНОСТЬ") ? "Вт" : (currentProblem.title.includes("ОМА") ? "Ω" : (currentProblem.title.includes("ЦЕПЬ") ? "Ω" : "Вт")))}`;
                if(currentProblem.title.includes("КПД")) btn.innerText = `${opt} Вт`;
                if(currentProblem.title.includes("ПАРАЛЛЕЛЬНАЯ") || currentProblem.title.includes("ПОСЛЕДОВАТЕЛЬНАЯ")) btn.innerText = `${opt} Ω`;
                if(currentProblem.title.includes("ЗАКОН ОМА")) btn.innerText = `${opt} Ω`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(!waitForAnswer) handleAnswer(opt);
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(!waitForAnswer) handleAnswer(opt);
                });
                answersContainer.appendChild(btn);
            });
        }
        
        function handleAnswer(selectedVal) {
            if(waitForAnswer) return;
            const isCorrect = (selectedVal === currentProblem.correctAnswer);
            if(isCorrect) {
                let points = 15 * level;
                score += points;
                scoreSpan.innerText = score;
                messageDiv.innerHTML = `✅ ОТЛИЧНО! +${points} МВт. ${currentProblem.hint} = ${currentProblem.correctAnswer} ✅`;
                drawCorrectFlashEffect();
                if(score >= level * 70 && level < 20) {
                    level++;
                    levelSpan.innerText = level;
                    messageDiv.innerHTML += `<br>🎉 ПОВЫШЕНИЕ УРОВНЯ СЕТИ ДО ${level}! Задачи сложнее 🎉`;
                }
            } else {
                stability--;
                livesSpan.innerText = stability;
                messageDiv.innerHTML = `❌ СБОЙ! Правильный ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
                drawWrongFlashEffect();
                if(stability <= 0) {
                    gameDefeat();
                    return;
                }
            }
            waitForAnswer = true;
            nextTimer = setTimeout(() => {
                if(stability > 0) loadNewChallenge();
                nextTimer = null;
            }, 1300);
            drawPowerSystem();
        }
        
        function gameDefeat() {
            waitForAnswer = true;
            messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Игра окончена. Ваш счёт: ${score} МВт. Перезапустите подстанцию. 💥`;
            drawGameOverVisual();
        }
        
        function restart() {
            if(nextTimer) clearTimeout(nextTimer);
            score = 0;
            stability = 3;
            level = 1;
            scoreSpan.innerText = "0";
            livesSpan.innerText = "3";
            levelSpan.innerText = "1";
            waitForAnswer = false;
            loadNewChallenge();
        }
        
        // ============= ВИЗУАЛИЗАЦИЯ ЭНЕРГОСИСТЕМЫ (динамичная, интересная) ============
        function drawPowerSystem() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            // фон - электрощит
            ctx.fillStyle = "#121f1c";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            // турбина/генератор
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#3a6b55";
            ctx.beginPath();
            ctx.ellipse(100, 200, 50, 70, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#d4c97a";
            ctx.font = "bold 24px monospace";
            ctx.fillText("⚙️", 82, 215);
            ctx.fillStyle = "#cfe6cf";
            ctx.font = "12px monospace";
            ctx.fillText("ГЕНЕРАТОР", 68, 260);
            
            // линии электропередач
            ctx.beginPath();
            ctx.moveTo(150, 200);
            ctx.lineTo(280, 180);
            ctx.lineTo(400, 210);
            ctx.lineTo(550, 170);
            ctx.lineTo(680, 200);
            ctx.strokeStyle = "#f5b042";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([8, 12]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // "Лампочка-город" справа
            ctx.fillStyle = "#f5cb5c";
            ctx.beginPath();
            ctx.arc(690, 180, 30, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#664d1a";
            ctx.font = "22px monospace";
            ctx.fillText("🏙️", 678, 192);
            
            // Индикатор нагрузки + уравнение
            if(currentProblem) {
                ctx.fillStyle = "#010f0ccc";
                ctx.fillRect(20, 320, 380, 85);
                ctx.fillStyle = "#bbffaa";
                ctx.font = "bold 14px monospace";
                ctx.fillText(currentProblem.title, 30, 345);
                ctx.font = "12px monospace";
                ctx.fillStyle = "#fad974";
                ctx.fillText(currentProblem.equation, 30, 370);
                ctx.fillStyle = "#cceeff";
                ctx.fillText(currentProblem.question.slice(0, 32), 30, 395);
            }
            
            // Уровень стабильности (индикатор)
            for(let i=0; i<stability; i++) {
                ctx.fillStyle = "#61dafb";
                ctx.fillRect(30 + i*35, 290, 25, 15);
            }
            if(stability <= 0) {
                ctx.fillStyle = "#ff6666aa";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.fillStyle = "white";
                ctx.font = "bold 26px monospace";
                ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА", CANVAS_W/2-150, CANVAS_H/2);
            }
        }
        
        function drawCorrectFlashEffect() {
            ctx.fillStyle = "#66ff99aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 150);
        }
        
        function drawWrongFlashEffect() {
            ctx.fillStyle = "#ff6666aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 180);
        }
        
        function drawGameOverVisual() {
            drawPowerSystem();
            ctx.fillStyle = "#d44";
            ctx.font = "bold 24px monospace";
            ctx.fillText("GAME OVER", CANVAS_W/2-80, CANVAS_H/2);
        }
        
        document.getElementById('restartGame').addEventListener('click', () => restart());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restart(); });
        
        // Инициализация
        function init() {
            restart();
        }
        init();
    })();
</script>
</body>
</html>
