<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика | Построй линию до города</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .level-box, .progress-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child, .progress-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }

        @media (max-width: 780px) {
            .game-layout {
                flex-direction: column;
            }
            .answer-btn {
                padding: 10px 5px;
                font-size: 1.2rem;
            }
            .equation-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">R₁ = 10 Ω, R₂ = 20 Ω</div>
                    <div class="question-text" id="questionDisplay">Найдите общее сопротивление?</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Правильный ответ = строим энергомост к городу!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="level-box"><span>📈 УРОВЕНЬ СЕТИ</span><span id="levelValue">1</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- НОВАЯ МЕХАНИКА: ПОСТРОЙКА ЭНЕРГОМОСТА ----------
        // Каждый правильный ответ добавляет сегмент цепи. 15 правильных = ПОБЕДА!
        const TARGET_CORRECT = 15;  // нужно 15 правильных для победы
        let correctCount = 0;        // счётчик правильных ответов (длина построенной цепи)
        let gameActive = true;        // активна ли игра (не победа и не поражение)
        let victoryFlag = false;      // флаг победы для блокировки
        
        const canvas = document.getElementById('powerCanvas');
        const ctx = canvas.getContext('2d');
        let CANVAS_W = 750, CANVAS_H = 420;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        let score = 0;
        let stability = 3;
        let level = 1;
        let currentProblem = null;
        let optionsArray = [];
        let waitForAnswer = false;
        let nextTimer = null;
        
        // DOM элементы
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const bridgeProgressSpan = document.getElementById('bridgeProgress');
        const messageDiv = document.getElementById('gameMessage');
        const eqDisplay = document.getElementById('eqDisplay');
        const questionDisplay = document.getElementById('questionDisplay');
        const answersContainer = document.getElementById('answersContainer');
        
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // Генератор задач (остался прежним, но теперь награда за правильный ответ - прогресс моста)
        function generateCoolProblem() {
            const type = randInt(0, 3);
            const lvlBonus = Math.min(level, 12);
            
            if(type === 0) {
                let voltage = randInt(12, 45 + lvlBonus * 4);
                let current = randInt(1, 12 + Math.floor(level/3));
                let power = voltage * current;
                return {
                    title: "📡 АКТИВНАЯ МОЩНОСТЬ",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Какова мощность P (в ваттах)?`,
                    correctAnswer: power,
                    hint: "P = U × I",
                };
            }
            else if(type === 1) {
                let voltage = randInt(18, 90 + lvlBonus * 6);
                let current = randInt(2, 16);
                let resistance = voltage / current;
                if(voltage % current !== 0) {
                    voltage = voltage - (voltage % current);
                    if(voltage < current) voltage = current * randInt(2, 15);
                    resistance = voltage / current;
                }
                return {
                    title: "⚡ ЗАКОН ОМА",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Найдите сопротивление R (в омах)`,
                    correctAnswer: resistance,
                    hint: "R = U / I",
                };
            }
            else if(type === 2) {
                let mode = randInt(0,1);
                if(mode === 0) {
                    let R_known = randInt(15, 70 + lvlBonus*3);
                    let R_unknown = randInt(10, 75 + lvlBonus*2);
                    let R_total = R_known + R_unknown;
                    return {
                        title: "🔌 ПОСЛЕДОВАТЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R_known} Ω,  R_общ = ${R_total} Ω`,
                        question: `Чему равно R₂ (в омах)?`,
                        correctAnswer: R_unknown,
                        hint: "R₂ = R_общ - R₁",
                    };
                } else {
                    let R1 = randInt(20, 80 + lvlBonus*3);
                    let R_total = randInt(12, 45 + lvlBonus*2);
                    let R2 = -1;
                    for(let trys=0; trys<25; trys++) {
                        if(R1 > R_total) {
                            let denom = (R1 - R_total);
                            let num = R1 * R_total;
                            if(num % denom === 0) {
                                R2 = num / denom;
                                if(R2 > 4 && R2 < 300) break;
                            }
                        }
                        R_total = randInt(12, 50 + lvlBonus*3);
                        R1 = randInt(25, 85);
                    }
                    if(R2 === -1 || R2 <=0) {
                        R2 = randInt(15, 90);
                        R_total = Math.floor((R1 * R2) / (R1 + R2));
                    }
                    return {
                        title: "🔀 ПАРАЛЛЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R1} Ω,  R_общ = ${R_total} Ω`,
                        question: `Найдите R₂ (в омах)`,
                        correctAnswer: R2,
                        hint: "1/R₂ = 1/R_общ - 1/R₁",
                    };
                }
            }
            else {
                let efficiency = randInt(75, 98);
                let inputPower = randInt(100, 400 + level*15);
                let outputPower = Math.floor(inputPower * efficiency / 100);
                return {
                    title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ",
                    equation: `КПД = ${efficiency}%,  P_вх = ${inputPower} Вт`,
                    question: `Чему равна полезная мощность P_вых (Вт)?`,
                    correctAnswer: outputPower,
                    hint: "P_вых = P_вх × КПД / 100",
                };
            }
        }
        
        function generateOptions(correct) {
            let opts = new Set();
            opts.add(correct);
            let rangeVar = Math.max(3, Math.floor(correct * 0.35));
            while(opts.size < 4) {
                let variation = randInt(-rangeVar, rangeVar);
                let candidate = correct + variation;
                if(candidate < 1) candidate = correct + randInt(2, 12);
                if(candidate > 900) candidate = correct - randInt(3, 25);
                if(candidate > 0) opts.add(candidate);
                if(opts.size < 3) {
                    let extra = correct + randInt(-Math.floor(correct*0.5), Math.floor(correct*0.7));
                    if(extra > 0 && extra !== correct) opts.add(extra);
                }
            }
            let arr = Array.from(opts);
            for(let i=arr.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function updateBridgeDisplay() {
            bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
        }
        
        // ПОБЕДА!
        function victoryGame() {
            if(victoryFlag) return;
            victoryFlag = true;
            gameActive = false;
            waitForAnswer = true;
            if(nextTimer) clearTimeout(nextTimer);
            messageDiv.innerHTML = `🏆✨ ВЕЛИКОЛЕПНО! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД ПОЛУЧАЕТ СВЕТ! ✨🏆<br>Вам удалось дать энергию городу! Поздравляем! Счёт: ${score} МВт. Нажмите перезапуск для новой игры.`;
            drawVictoryScene();
        }
        
        // Поражение
        function gameDefeat() {
            if(victoryFlag) return;
            gameActive = false;
            waitForAnswer = true;
            if(nextTimer) clearTimeout(nextTimer);
            messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост не достроен... Поражение. Ваш счёт: ${score} МВт. Перезапустите подстанцию. 💥`;
            drawGameOverVisual();
        }
        
        function handleAnswer(selectedVal) {
            if(!gameActive || waitForAnswer || victoryFlag) return;
            const isCorrect = (selectedVal === currentProblem.correctAnswer);
            if(isCorrect) {
                let points = 15 * level;
                score += points;
                scoreSpan.innerText = score;
                // Увеличиваем прогресс моста!
                correctCount++;
                updateBridgeDisplay();
                messageDiv.innerHTML = `✅ ОТЛИЧНО! +${points} МВт. ${currentProblem.hint} = ${currentProblem.correctAnswer} ✅ | Энергомост продвинут! (${correctCount}/${TARGET_CORRECT})`;
                drawCorrectFlashEffect();
                
                // Повышение уровня
                if(score >= level * 70 && level < 20) {
                    level++;
                    levelSpan.innerText = level;
                    messageDiv.innerHTML += `<br>🎉 ПОВЫШЕНИЕ УРОВНЯ СЕТИ ДО ${level}! 🎉`;
                }
                
                // Проверка победы после увеличения счётчика
                if(correctCount >= TARGET_CORRECT) {
                    victoryGame();
                    drawPowerSystem(); // финальная отрисовка с мостом
                    return;
                }
            } else {
                stability--;
                livesSpan.innerText = stability;
                messageDiv.innerHTML = `❌ СБОЙ! Правильный ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌ Прогресс моста не изменился.`;
                drawWrongFlashEffect();
                if(stability <= 0) {
                    gameDefeat();
                    drawPowerSystem();
                    return;
                }
            }
            waitForAnswer = true;
            nextTimer = setTimeout(() => {
                if(gameActive && !victoryFlag && stability > 0) {
                    loadNewChallenge();
                }
                nextTimer = null;
            }, 1300);
            drawPowerSystem();
        }
        
        function loadNewChallenge() {
            if(!gameActive || victoryFlag) return;
            if(nextTimer) clearTimeout(nextTimer);
            waitForAnswer = false;
            currentProblem = generateCoolProblem();
            optionsArray = generateOptions(currentProblem.correctAnswer);
            eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
            questionDisplay.innerHTML = currentProblem.question;
            renderAnswerButtons();
            let buildStatus = `🏗️ Прогресс моста: ${correctCount}/${TARGET_CORRECT} | `;
            messageDiv.innerHTML = buildStatus + currentProblem.hint + " | Выберите верный параметр!";
            drawPowerSystem();
        }
        
        function renderAnswerButtons() {
            answersContainer.innerHTML = '';
            optionsArray.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = 'answer-btn';
                let suffix = "";
                if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
                else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
                else if(currentProblem.title.includes("ЦЕПЬ")) suffix = " Ω";
                else if(currentProblem.title.includes("КПД")) suffix = " Вт";
                else suffix = "";
                btn.innerText = `${opt}${suffix}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt);
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt);
                });
                answersContainer.appendChild(btn);
            });
        }
        
        function restart() {
            if(nextTimer) clearTimeout(nextTimer);
            score = 0;
            stability = 3;
            level = 1;
            correctCount = 0;
            gameActive = true;
            victoryFlag = false;
            waitForAnswer = false;
            scoreSpan.innerText = "0";
            livesSpan.innerText = "3";
            levelSpan.innerText = "1";
            updateBridgeDisplay();
            loadNewChallenge();
            drawPowerSystem();
        }
        
        // ============= ВИЗУАЛИЗАЦИЯ С ПОСТРОЕНИЕМ ЭНЕРГОМОСТА ============
        // Линия рисуется от генератора (x=120, y=200) к городу (x=690, y=180)
        // Прогресс correctCount / TARGET_CORRECT определяет длину "живой" линии.
        function drawPowerSystem() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = "#121f1c";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            
            // Генератор
            ctx.fillStyle = "#3a6b55";
            ctx.beginPath();
            ctx.ellipse(100, 200, 50, 70, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#d4c97a";
            ctx.font = "bold 24px monospace";
            ctx.fillText("⚙️", 82, 215);
            ctx.fillStyle = "#cfe6cf";
            ctx.font = "12px monospace";
            ctx.fillText("ГЕНЕРАТОР", 68, 260);
            
            // Город (справа)
            ctx.fillStyle = "#f5cb5c";
            ctx.beginPath();
            ctx.arc(690, 180, 30, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#664d1a";
            ctx.font = "22px monospace";
            ctx.fillText("🏙️", 678, 192);
            ctx.fillStyle = "#ffe2a4";
            ctx.font = "10px monospace";
            ctx.fillText("ГОРОД", 672, 222);
            
            // Рисуем базовую линию-трассу (серый фон)
            ctx.beginPath();
            ctx.moveTo(150, 200);
            ctx.lineTo(280, 180);
            ctx.lineTo(400, 210);
            ctx.lineTo(550, 170);
            ctx.lineTo(660, 190);
            ctx.strokeStyle = "#4a5b55";
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // ЭНЕРГОМОСТ — динамическая линия, прогресс (длина в процентах)
            // Сегментированный путь: набор промежуточных точек
            const waypoints = [
                {x:150, y:200},
                {x:280, y:180},
                {x:400, y:210},
                {x:550, y:170},
                {x:660, y:190},
                {x:690, y:180}  // финальная точка
            ];
            const totalLength = computeTotalLength(waypoints);
            let targetProgress = Math.min(1, correctCount / TARGET_CORRECT);
            let currentDist = totalLength * targetProgress;
            
            // рисуем "построенную" часть линии ярким электрическим цветом
            ctx.beginPath();
            let accumulated = 0;
            let started = false;
            let lastPoint = null;
            for(let i=0; i<waypoints.length-1; i++) {
                let p1 = waypoints[i];
                let p2 = waypoints[i+1];
                let segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                if(accumulated + segLen <= currentDist) {
                    // весь сегмент построен
                    if(!started) {
                        ctx.moveTo(p1.x, p1.y);
                        started = true;
                    }
                    ctx.lineTo(p2.x, p2.y);
                    accumulated += segLen;
                } 
                else if(accumulated < currentDist && accumulated + segLen > currentDist) {
                    // частичная отрисовка сегмента
                    let remain = currentDist - accumulated;
                    let t = remain / segLen;
                    let interX = p1.x + (p2.x - p1.x) * t;
                    let interY = p1.y + (p2.y - p1.y) * t;
                    if(!started) {
                        ctx.moveTo(p1.x, p1.y);
                        started = true;
                    }
                    ctx.lineTo(interX, interY);
                    accumulated = currentDist;
                    break;
                }
                else {
                    break;
                }
                lastPoint = p2;
            }
            ctx.strokeStyle = "#f5d742";
            ctx.lineWidth = 6;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffaa33";
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Добавляем искорки на построенной линии
            if(targetProgress > 0) {
                ctx.fillStyle = "#ffdd88";
                for(let i=0; i<Math.floor(targetProgress * 12); i++) {
                    let tPos = (i / 12) * currentDist;
                    let point = getPointAtDistance(waypoints, tPos);
                    if(point) {
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 3, 0, Math.PI*2);
                        ctx.fillStyle = "#ffcc44";
                        ctx.fill();
                    }
                }
            }
            
            // Индикатор текущей задачи
            if(currentProblem && gameActive) {
                ctx.fillStyle = "#010f0ccc";
                ctx.fillRect(20, 320, 380, 85);
                ctx.fillStyle = "#bbffaa";
                ctx.font = "bold 14px monospace";
                ctx.fillText(currentProblem.title, 30, 345);
                ctx.font = "12px monospace";
                ctx.fillStyle = "#fad974";
                ctx.fillText(currentProblem.equation, 30, 370);
                ctx.fillStyle = "#cceeff";
                ctx.fillText(currentProblem.question.slice(0, 32), 30, 395);
            }
            
            // Стабильность
            for(let i=0; i<stability; i++) {
                ctx.fillStyle = "#61dafb";
                ctx.fillRect(30 + i*35, 290, 25, 15);
            }
            
            // Если игра проиграна
            if(stability <= 0 && !victoryFlag) {
                ctx.fillStyle = "#ff6666aa";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.fillStyle = "white";
                ctx.font = "bold 26px monospace";
                ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА", CANVAS_W/2-150, CANVAS_H/2);
            }
            // Если победа
            if(victoryFlag) {
                ctx.fillStyle = "#ffdd88cc";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.fillStyle = "#2c5a2e";
                ctx.font = "bold 28px monospace";
                ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!", CANVAS_W/2-170, CANVAS_H/2-20);
                ctx.font = "20px monospace";
                ctx.fillStyle = "#ffefb9";
                ctx.fillText("ГОРОД СИЯЕТ! ПОБЕДА!", CANVAS_W/2-150, CANVAS_H/2+30);
            }
        }
        
        // вспомогательные функции для расчета длины пути
        function computeTotalLength(points) {
            let len = 0;
            for(let i=0; i<points.length-1; i++) {
                len += Math.hypot(points[i+1].x - points[i].x, points[i+1].y - points[i].y);
            }
            return len;
        }
        
        function getPointAtDistance(points, distance) {
            if(distance <= 0) return points[0];
            let accumulated = 0;
            for(let i=0; i<points.length-1; i++) {
                let p1 = points[i];
                let p2 = points[i+1];
                let segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                if(accumulated + segLen >= distance) {
                    let t = (distance - accumulated) / segLen;
                    let x = p1.x + (p2.x - p1.x) * t;
                    let y = p1.y + (p2.y - p1.y) * t;
                    return {x, y};
                }
                accumulated += segLen;
            }
            return points[points.length-1];
        }
        
        function drawCorrectFlashEffect() {
            ctx.fillStyle = "#66ff99aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 150);
        }
        
        function drawWrongFlashEffect() {
            ctx.fillStyle = "#ff6666aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 180);
        }
        
        function drawGameOverVisual() {
            drawPowerSystem();
        }
        
        function drawVictoryScene() {
            drawPowerSystem();
        }
        
        document.getElementById('restartGame').addEventListener('click', () => restart());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restart(); });
        
        function init() {
            restart();
        }
        init();
    })();
</script>
