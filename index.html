<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Электро-Тетрис</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-pink: #ff0055;
            --neon-yellow: #fffb00;
        }

        body {
            background-color: #0a0a12;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .game-container {
            display: flex;
            gap: 20px;
            background: rgba(20, 20, 35, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
        }

        canvas {
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background-color: #11111d;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-wight: 150px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-pink);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-box h2 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        /* Индикатор электро-заряда */
        .energy-bar-container {
            width: 100%;
            height: 20px;
            background: #222;
            border: 1px solid var(--neon-yellow);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 251, 0, 0.2);
        }

        .energy-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #fffb00, #ff9900);
            box-shadow: 0 0 10px var(--neon-yellow);
            transition: width 0.3s ease;
        }

        .controls {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>⚡ ELECTRO-TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="sidebar">
            <div>
                <div class="stat-box">
                    <h2>СЧЁТ</h2>
                    <div id="score" class="stat-value">0</div>
                </div>
                
                <div class="stat-box">
                    <h2>ЗАРЯД ЭНЕРГИИ</h2>
                    <div class="energy-bar-container">
                        <div id="energy" class="energy-bar"></div>
                    </div>
                    <p style="font-size: 0.7rem; color: var(--neon-yellow); margin: 5px 0 0 0;">При 100% сгорает нижний ряд!</p>
                </div>
            </div>

            <div class="controls">
                <strong>Управление:</strong><br>
                ← / → : Движение<br>
                ↑ : Поворот<br>
                ↓ : Ускорить падение<br>
                Пробел : Дроп (сразу вниз)
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(20, 20); // Масштабируем пиксели под блоки (12x20 стакан)

let score = 0;
let energy = 0;

// Цвета неоновых блоков
const COLORS = [
    null,
    '#00f0ff', // I (Голубой)
    '#fffb00', // O (Желтый)
    '#bd00ff', // T (Фиолетовый)
    '#ff0055', // S (Красный)
    '#00ff66', // Z (Зеленый)
    '#ff9900', // J (Оранжевый)
    '#0066ff'  // L (Синий)
];

// Создание матрицы поля
function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

const arena = createMatrix(12, 20);

// Фигуры тетриса
function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    else if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    else if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    else if (type === 'O') return [[4,4],[4,4]];
    else if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    else if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
}

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0
};

// Проверка столкновений
function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] &&
                arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

// Слияние фигуры с ареной
function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

// Отрисовка
function draw() {
    context.fillStyle = '#11111d';
    context.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка (эффект матрицы)
    context.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    context.lineWidth = 0.05;
    for(let i = 0; i < 12; i++) {
        context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 20); context.stroke();
    }
    for(let i = 0; i < 20; i++) {
        context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
    }

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.fillStyle = COLORS[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                
                // Эффект неонового свечения вокруг каждого кубика
                context.strokeStyle = 'rgba(255,255,255,0.6)';
                context.lineWidth = 0.08;
                context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

// Анимация «Электро-разряда»
function triggerElectricDischarge() {
    energy = 0;
    document.getElementById('energy').style.width = '0%';
    
    // Удаляем нижний ряд
    arena.pop();
    arena.unshift(new Array(12).fill(0));
    
    // Вспышка экрана
    canvas.style.backgroundColor = 'var(--neon-yellow)';
    setTimeout(() => { canvas.style.backgroundColor = '#11111d'; }, 100);
    
    score += 50;
    updateScore();
}

// Проверка заполненных линий
function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        score += rowCount * 10;
        energy += 25; // Каждая линия дает 25% энергии
        if (energy > 100) energy = 100;
        
        rowCount *= 2;
    }
    
    document.getElementById('energy').style.width = energy + '%';
    if (energy >= 100) {
        setTimeout(triggerElectricDischarge, 200);
    }
}

// Падение фигуры
function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function playerReset() {
    const pieces = 'ILJSZOT';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    // Проигрыш
    if (collide(arena, player)) {
        alert('💥 СИСТЕМА ПЕРЕГРУЖЕНА! ИГРА ОКОНЧЕНА. Счет: ' + score);
        arena.forEach(row => row.fill(0));
        score = 0;
        energy = 0;
        document.getElementById('energy').style.width = '0%';
        updateScore();
    }
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) {
        matrix.forEach(row => row.reverse());
    } else {
        matrix.reverse();
    }
}

let dropCounter = 0;
let dropInterval = 1000; // Скорость падения (1 секунда)
let lastTime = 0;

function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

function updateScore() {
    document.getElementById('score').innerText = score;
}

// Управление клавиатурой
document.addEventListener('keydown', event => {
    if (event.keyCode === 37) {
        playerMove(-1);
    } else if (event.keyCode === 39) {
        playerMove(1);
    } else if (event.keyCode === 40) {
        playerDrop();
    } else if (event.keyCode === 38) {
        playerRotate(1);
    } else if (event.keyCode === 32) {
        playerHardDrop();
    }
});

// Старт игры
playerReset();
updateScore();
update();
</script>
</body>
</html>
