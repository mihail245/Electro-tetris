<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>⚡ Электро-Тетрис</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        #game-container {
            display: flex;
            gap: 20px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            border: 4px solid #34495e;
            background: #111;
        }
        #ui {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-widh: 200px;
        }
        .info-box {
            background: #34495e;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .info-box h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #ecf0f1;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #2ecc71;
        }
        .controls {
            font-size: 14px;
            color: #bdc3c7;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>⚡ Электро-Тетрис</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div class="info-box">
                <h2>Счёт</h2>
                <div class="score" id="score">0</div>
            </div>
            <div class="info-box">
                <h2>Управление</h2>
                <div class="controls">
                    ⬅️ ➡️ — Движение<br>
                    ⬇️ — Ускорить падение<br>
                    🔄 Пробел — Поменять местами блоки в паре
                </div>
            </div>
            <div class="info-box" style="flex-grow: 1;">
                <h2>Шпаргалка</h2>
                <div class="controls" style="font-size: 12px;">
                    • P = I² · R (Мощность)<br>
                    • U = I · R (Закон Ома)<br>
                    • Q = I · t (Заряд)<br>
                    • A = U · I · t (Работа)
                </div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

const COLS = 8;
const ROWS = 12;
const BLOCK_SIZE = 50;

let score = 0;
let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));

// База данных формул и их решений
const database = [
    { formula: "P=I²·R", conditions: "I=2А, R=5Ом", answer: "20 Вт" },
    { formula: "P=I²·R", conditions: "I=3А, R=2Ом", answer: "18 Вт" },
    { formula: "U=I·R",  conditions: "I=2А, R=10Ом", answer: "20 В" },
    { formula: "U=I·R",  conditions: "I=5А, R=4Ом", answer: "20 В" },
    { formula: "Q=I·t",  conditions: "I=2А, t=10с", answer: "20 Кл" },
    { formula: "A=U·I·t",conditions: "U=10В, I=2А, t=1с", answer: "20 Дж" }
];

// Падающий элемент (состоит из двух блоков: формулы и значения)
let currentPiece = null;
let dropCounter = 0;
let dropInterval = 1000; // 1 секунда
let lastTime = 0;
let gameOver = false;

function createPiece() {
    // Случайно выбираем задачу из базы данных
    const task = database[Math.floor(Math.random() * database.length)];
    
    // Случайная колонка для спавна (чтобы поместилось 2 блока в ширину)
    const col = Math.floor(Math.random() * (COLS - 1));
    
    currentPiece = {
        x: col,
        y: 0,
        // Блок 1: Формула и условия
        b1: { type: 'formula', text: task.formula, subtext: task.conditions, id: task.answer },
        // Блок 2: Ответ
        b2: { type: 'value', text: task.answer, subtext: '', id: task.answer }
    };

    // Если место уже занято — игра окончена
    if (grid[0][col] || grid[0][col+1]) {
        gameOver = true;
        alert("Игра окончена! Энергосистема перегружена. Ваш счёт: " + score);
    }
}

function drawBlock(x, y, block) {
    if (!block) return;

    ctx.fillStyle = block.type === 'formula' ? '#27ae60' : '#2980b9';
    ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
    
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    
    if (block.type === 'formula') {
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText(block.text, x * BLOCK_SIZE + BLOCK_SIZE/2, y * BLOCK_SIZE + 20);
        ctx.font = '9px sans-serif';
        ctx.fillStyle = '#e8f8f5';
        ctx.fillText(block.subtext, x * BLOCK_SIZE + BLOCK_SIZE/2, y * BLOCK_SIZE + 38);
    } else {
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(block.text, x * BLOCK_SIZE + BLOCK_SIZE/2, y * BLOCK_SIZE + 30);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Сетка фона
    ctx.strokeStyle = '#222';
    for(let i=0; i<COLS; i++) {
        for(let j=0; j<ROWS; j++) {
            ctx.strokeRect(i*BLOCK_SIZE, j*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }
    }

    // Отрисовка зафиксированных блоков
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            drawBlock(c, r, grid[r][c]);
        }
    }

    // Отрисовка падающего элемента
    if (currentPiece) {
        drawBlock(currentPiece.x, currentPiece.y, currentPiece.b1);
        drawBlock(currentPiece.x + 1, currentPiece.y, currentPiece.b2);
    }
}

function moveLeft() {
    if (currentPiece.x > 0 && !grid[currentPiece.y][currentPiece.x - 1]) {
        currentPiece.x--;
    }
}

function moveRight() {
    if (currentPiece.x < COLS - 2 && !grid[currentPiece.y][currentPiece.x + 2]) {
        currentPiece.x++;
    }
}

function flipPiece() {
    // Меняем местами левый и правый блоки в паре
    const temp = currentPiece.b1;
    currentPiece.b1 = currentPiece.b2;
    currentPiece.b2 = temp;
}

function drop() {
    // Проверяем, можно ли опуститься ниже (для обоих блоков)
    if (currentPiece.y < ROWS - 1 && 
        !grid[currentPiece.y + 1][currentPiece.x] && 
        !grid[currentPiece.y + 1][currentPiece.x + 1]) {
        currentPiece.y++;
    } else {
        // Фиксируем блоки на сетке
        grid[currentPiece.y][currentPiece.x] = currentPiece.b1;
        grid[currentPiece.y][currentPiece.x + 1] = currentPiece.b2;
        
        applyGravity();
        checkMatches();
        createPiece();
    }
    dropCounter = 0;
}

// Физика падения блоков вниз, если под ними пусто
function applyGravity() {
    let moved = false;
    for (let r = ROWS - 2; r >= 0; r--) {
        for (let c = 0; c < COLS; c++) {
            if (grid[r][c] && !grid[r + 1][c]) {
                grid[r + 1][c] = grid[r][c];
                grid[r][c] = null;
                moved = true;
            }
        }
    }
    if (moved) applyGravity(); // Рекурсивно опускаем, пока всё не упадет
}

function checkMatches() {
    let toDelete = [];

    // Проверка по горизонтали
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 1; c++) {
            let b1 = grid[r][c];
            let b2 = grid[r][c+1];
            if (b1 && b2 && b1.type !== b2.type && b1.id === b2.id) {
                toDelete.push({r, c}, {r, c: c+1});
            }
        }
    }

    // Проверка по вертикали
    for (let r = 0; r < ROWS - 1; r++) {
        for (let c = 0; c < COLS; c++) {
            let b1 = grid[r][c];
            let b2 = grid[r+1][c];
            if (b1 && b2 && b1.type !== b2.type && b1.id === b2.id) {
                toDelete.push({r, c}, {r: r+1, c});
            }
        }
    }

    // Удаление совпадений
    if (toDelete.length > 0) {
        toDelete.forEach(cell => {
            grid[cell.r][cell.c] = null;
        });
        score += toDelete.length * 50;
        scoreElement.innerText = score;
        
        // После удаления блоков запускаем гравитацию снова
        applyGravity();
        // И проверяем на новые совпадения (каскад)
        checkMatches();
    }
}

// Управление кнопками
document.addEventListener('keydown', event => {
    if (gameOver) return;
    
    if (event.key === 'ArrowLeft') {
        moveLeft();
    } else if (event.key === 'ArrowRight') {
        moveRight();
    } else if (event.key === 'ArrowDown') {
        drop();
    } else if (event.key === ' ') { // Пробел
        flipPiece();
        event.preventDefault();
    }
});

function update(time = 0) {
    if (gameOver) return;

    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        drop();
    }

    draw();
    requestAnimationFrame(update);
}

// Старт игры
createPiece();
update();
</script>

</body>
</html>
