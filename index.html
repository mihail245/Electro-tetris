<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .progress-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .score-box span:first-child, .lives-box span:first-child, .progress-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        
        /* Стили для админ-модалки */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .admin-card {
            background: #0e1a1f;
            border: 2px solid #ffaa44;
            border-radius: 48px;
            padding: 25px 20px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 40px black;
            color: #eee;
        }
        .admin-card input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background: #1f3a33;
            border: 1px solid #8bc34a;
            border-radius: 60px;
            color: #ffecb3;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .admin-card button {
            background: #3a7a5a;
            border: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-card button:active { transform: scale(0.97); }
        .close-admin {
            background: #aa3e2c;
        }
        .admin-status {
            font-size: 0.8rem;
            margin-top: 12px;
            color: #ffaa66;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ffdfa5;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3a7a5a;
            border-top: 6px solid #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">Загрузка задач...</div>
                    <div class="question-text" id="questionDisplay">Пожалуйста, подождите</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Загрузка задач с GitHub...
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box" id="secretTapArea">
                <span>🔋 МЕГАВАТТЫ</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/30</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<!-- Модалка админ-панели -->
<div id="adminModal" class="admin-modal">
    <div class="admin-card">
        <h3>⚡ АДМИН-ДОСТУП ⚡</h3>
        <input type="password" id="adminCodeInput" placeholder="Введите код администратора" autocomplete="off">
        <div>
            <button id="adminAuthBtn">🔑 ВОЙТИ</button>
            <button id="adminCloseBtn" class="close-admin">✖️ ЗАКРЫТЬ</button>
        </div>
        <div id="adminPanelActions" style="display: none; margin-top: 15px;">
            <button id="giveCorrectAnswerBtn">✅ ВЫДАТЬ ПРАВИЛЬНЫЙ ОТВЕТ</button>
            <button id="instaWinsBtn">🏆 МГНОВЕННАЯ ПОБЕДА</button>
            <button id="addLivesBtn">❤️ +1 СТАБИЛЬНОСТЬ</button>
            <button id="addPointsBtn">🔋 +50 МВт</button>
            <div class="admin-status" id="adminStatusMsg"></div>
        </div>
        <div class="admin-status" id="adminLoginMsg">Введите код администратора</div>
    </div>
</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        databaseURL: "https://igra-82a42-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ======================== НАСТРОЙКА TELEGRAM ========================
    const TELEGRAM_BOT_TOKEN = "8417193861:AAEDz_zxGbWCmbSXBRbA-omQws5jE6hrE54";
    const TELEGRAM_CHAT_ID = "1209403544";
    
    // Функция отправки сообщения в Telegram
    async function sendTelegramMessage(message) {
        try {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            const data = await response.json();
            if (data.ok) {
                console.log("Сообщение в Telegram отправлено");
            } else {
                console.error("Ошибка отправки в Telegram:", data);
            }
        } catch (error) {
            console.error("Ошибка при отправке в Telegram:", error);
        }
    }
    const ADMIN_PASSWORDS = {
        "14881161": { name: "АДМИН", emoji: "👑" },
        "148867": { name: "АДМИН", emoji: "⭐" }  // Замените на пароль друга
    };
    
    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ИГРЫ ========================
    let ALL_TASKS = [];
    let TASKS_LEVEL_1 = [];
    let TASKS_LEVEL_2 = [];
    let TASKS_LEVEL_3 = [];
    let gameReady = false;
    const TARGET_CORRECT = 30;
    let correctCount = 0;
    let gameActive = true;
    let victoryFlag = false;
    let usedTasks = [];
    
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    let CANVAS_W = 750, CANVAS_H = 420;
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    
    let score = 0;
    let stability = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    
    let isAdminMode = false;
    
    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = `<div class="spinner"></div><div>Загрузка задач с GitHub...</div>`;
    document.body.appendChild(loadingOverlay);
    
    // ======================== ЗАГРУЗКА ЗАДАЧ С GITHUB ========================
    const GITHUB_TASKS_URL = "https://raw.githubusercontent.com/mihail245/Electro-tetris/refs/heads/main/tasks.json";
    
    async function fetchTasksFromGitHub() {
        try {
            const response = await fetch(GITHUB_TASKS_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (Array.isArray(data) && data.length > 0) {
                ALL_TASKS = data;
                TASKS_LEVEL_1 = ALL_TASKS.filter(task => task.level === 1);
                TASKS_LEVEL_2 = ALL_TASKS.filter(task => task.level === 2);
                TASKS_LEVEL_3 = ALL_TASKS.filter(task => task.level === 3);
                
                gameReady = true;
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    if(loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay);
                }, 500);
                restart();
            } else {
                throw new Error("Нет задач или неверный формат");
            }
        } catch (error) {
            loadingOverlay.innerHTML = `<div style="color: #ff8866;">❌ ОШИБКА ЗАГРУЗКИ</div>
                                        <div>${error.message}</div>
                                        <button id="reloadBtn" style="margin-top:30px;padding:10px 25px;background:#ffaa44;border:none;border-radius:40px;cursor:pointer;">🔄 ПОВТОРИТЬ</button>`;
            const reloadBtn = document.getElementById('reloadBtn');
            if(reloadBtn) reloadBtn.onclick = () => location.reload();
            gameReady = false;
        }
    }
    
    // ======================== СЕКРЕТНЫЙ ВХОД В АДМИНКУ ========================
    let tapCount = 0;
    let tapTimer = null;
    const secretTapArea = document.getElementById('secretTapArea');
    
    function resetTapCounter() {
        tapCount = 0;
        if(tapTimer) clearTimeout(tapTimer);
        tapTimer = null;
    }
    
    function onSecretTap() {
        if(tapTimer) clearTimeout(tapTimer);
        tapCount++;
        tapTimer = setTimeout(() => {
            tapCount = 0;
            tapTimer = null;
        }, 800);
        
        if(tapCount >= 5) {
            tapCount = 0;
            if(tapTimer) clearTimeout(tapTimer);
            openAdminModal();
        }
    }
    
    if(secretTapArea) {
        secretTapArea.addEventListener('click', onSecretTap);
        secretTapArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onSecretTap();
        });
    }
    
    // ======================== АДМИН-ФУНКЦИИ ========================
    const adminModal = document.getElementById('adminModal');
    const adminCodeInput = document.getElementById('adminCodeInput');
    const adminAuthBtn = document.getElementById('adminAuthBtn');
    const adminCloseBtn = document.getElementById('adminCloseBtn');
    const adminPanelActions = document.getElementById('adminPanelActions');
    const adminLoginMsg = document.getElementById('adminLoginMsg');
    const adminStatusMsg = document.getElementById('adminStatusMsg');
    
    function openAdminModal() {
        adminModal.style.display = 'flex';
        adminCodeInput.value = '';
        adminPanelActions.style.display = 'none';
        adminLoginMsg.innerHTML = 'Введите код администратора';
        adminLoginMsg.style.color = '#ffaa66';
        adminStatusMsg.innerHTML = '';
    }
    
    function closeAdminModal() {
        adminModal.style.display = 'none';
    }
    
    // Проверка пароля и отправка уведомления
    adminAuthBtn.addEventListener('click', async () => {
        const enteredCode = adminCodeInput.value.trim();
        if(enteredCode === "") {
            adminLoginMsg.innerHTML = '❌ Введите код!';
            adminLoginMsg.style.color = '#ff8866';
            return;
        }
        
        // Проверяем, есть ли такой пароль в списке
        const adminInfo = ADMIN_PASSWORDS[enteredCode];
        
        if (adminInfo) {
            // ПРАВИЛЬНЫЙ ПАРОЛЬ - отправляем уведомление в Telegram
            const date = new Date().toLocaleString('ru-RU');
            const userAgent = navigator.userAgent;
            const message = `🔐 <b>АДМИН-ВХОД В ИГРУ</b>\n\n` +
                           `👤 ${adminInfo.emoji} <b>${adminInfo.name}</b>\n` +
                           `🔑 Код: <code>${enteredCode}</code>\n` +
                           `⏰ Время: ${date}\n` +
                           `🌐 Браузер: ${userAgent.substring(0, 100)}\n` +
                           `📱 Устройство: ${/Mobile|Android|iPhone|iPad/i.test(userAgent) ? 'Мобильное' : 'Компьютер'}`;
            
            // Отправляем уведомление
            await sendTelegramMessage(message);
            
            // Даем доступ
            isAdminMode = true;
            adminLoginMsg.innerHTML = `✅ ДОСТУП РАЗРЕШЁН! (${adminInfo.name})`;
            adminLoginMsg.style.color = '#8bc34a';
            adminPanelActions.style.display = 'block';
            adminStatusMsg.innerHTML = `Добро пожаловать, ${adminInfo.name}! ⚡`;
            messageDiv.innerHTML = `🔓 АДМИН-РЕЖИМ АКТИВИРОВАН (${adminInfo.name})!`;
            
            setTimeout(() => {
                if(messageDiv && !victoryFlag && gameActive) messageDiv.innerHTML = "💡 Админ-панель открыта. Используйте команды.";
            }, 3000);
        } else {
            // НЕПРАВИЛЬНЫЙ ПАРОЛЬ - не отправляем уведомление
            adminLoginMsg.innerHTML = '❌ НЕВЕРНЫЙ КОД! Доступ запрещён.';
            adminLoginMsg.style.color = '#ff8866';
            adminPanelActions.style.display = 'none';
            isAdminMode = false;
        }
    });
    
    adminCloseBtn.addEventListener('click', closeAdminModal);
    adminModal.addEventListener('click', (e) => {
        if(e.target === adminModal) closeAdminModal();
    });
    
    function adminGiveCorrectAnswer() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена (победа/поражение).'; return; }
        if(waitForAnswer) { adminStatusMsg.innerHTML = '⏳ Сейчас смена задачи, подождите...'; return; }
        if(currentProblem) {
            handleAnswer(currentProblem.correctAnswer);
            adminStatusMsg.innerHTML = '✅ Выдан правильный ответ!';
        } else {
            adminStatusMsg.innerHTML = '⚠️ Нет активной задачи';
        }
    }
    
    function adminInstantWin() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(victoryFlag) { adminStatusMsg.innerHTML = '🏆 Уже победа! Перезапустите.'; return; }
        if(!gameActive) { adminStatusMsg.innerHTML = '❌ Игра неактивна, перезапустите'; return; }
        
        if(nextTimer) clearTimeout(nextTimer);
        while(correctCount < TARGET_CORRECT) {
            correctCount++;
            let points = 10;
            score += points;
        }
        scoreSpan.innerText = score;
        updateUI();
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ✨🏆<br>Счёт: ${score} МВт.`;
        drawVictoryScene();
        adminStatusMsg.innerHTML = '🌟 МГНОВЕННАЯ ПОБЕДА! Энергомост построен! 🌟';
    }
    
    function adminAddLife() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена'; return; }
        stability = Math.min(5, stability + 1);
        livesSpan.innerText = stability;
        messageDiv.innerHTML = `❤️ Администратор добавил стабильность! +1 ❤️`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '❤️ +1 стабильность добавлена';
    }
    
    function adminAddPoints() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена'; return; }
        score += 50;
        scoreSpan.innerText = score;
        messageDiv.innerHTML = `🔋 Администратор начислил +50 МВт! 🔋`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '🔋 +50 мегаватт добавлено!';
    }
    
    document.getElementById('giveCorrectAnswerBtn').addEventListener('click', adminGiveCorrectAnswer);
    document.getElementById('instaWinsBtn').addEventListener('click', adminInstantWin);
    document.getElementById('addLivesBtn').addEventListener('click', adminAddLife);
    document.getElementById('addPointsBtn').addEventListener('click', adminAddPoints);
    
    // ======================== ОСНОВНАЯ ИГРОВАЯ МЕХАНИКА ========================
    function getTaskByProgress() {
        let availableTasks = [];
        
        if (correctCount < 10) {
            availableTasks = TASKS_LEVEL_1.filter(task => !usedTasks.includes(task));
        } else if (correctCount < 22) {
            availableTasks = TASKS_LEVEL_2.filter(task => !usedTasks.includes(task));
        } else {
            availableTasks = TASKS_LEVEL_3.filter(task => !usedTasks.includes(task));
        }
        
        if (availableTasks.length === 0) {
            if (correctCount < 10) availableTasks = [...TASKS_LEVEL_1];
            else if (correctCount < 22) availableTasks = [...TASKS_LEVEL_2];
            else availableTasks = [...TASKS_LEVEL_3];
        }
        
        const randomIndex = Math.floor(Math.random() * availableTasks.length);
        const task = availableTasks[randomIndex];
        usedTasks.push(task);
        
        return {
            title: task.title,
            equation: task.eq,
            question: task.question,
            correctAnswer: task.correct,
            hint: task.hint,
            level: task.level
        };
    }
    
    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
        
        let levelText = "";
        if (correctCount < 10) levelText = "УРОВЕНЬ 1 (ЛЕГКИЙ)";
        else if (correctCount < 22) levelText = "УРОВЕНЬ 2 (СРЕДНИЙ)";
        else levelText = "УРОВЕНЬ 3 (СЛОЖНЫЙ)";
        
        if (!victoryFlag && gameActive && gameReady) {
            messageDiv.innerHTML = `📊 ${levelText} | Мост ${correctCount}/${TARGET_CORRECT}`;
        }
    }
    
    function generateOptions(correct) {
        let opts = new Set();
        opts.add(correct);
        while(opts.size < 4) {
            let delta = Math.floor(Math.random() * 21) - 10;
            let cand = correct + delta;
            if(cand < 1) cand = correct + Math.floor(Math.random() * 10) + 1;
            if(cand > 0 && cand < 50000) opts.add(cand);
        }
        let arr = Array.from(opts);
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function handleAnswer(selectedVal) {
        if(!gameActive || waitForAnswer || victoryFlag || !gameReady) return;
        const isCorrect = (selectedVal === currentProblem.correctAnswer);
        if(isCorrect) {
            let points = 10;
            score += points;
            scoreSpan.innerText = score;
            correctCount++;
            updateUI();
            messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Мост ${correctCount}/${TARGET_CORRECT}`;
            drawCorrectFlashEffect();
            if(correctCount >= TARGET_CORRECT) { 
                victoryGame(); 
                drawPowerSystem(); 
                return; 
            }
        } else {
            stability--;
            livesSpan.innerText = stability;
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
            drawWrongFlashEffect();
            if(stability <= 0) { 
                gameDefeat(); 
                drawPowerSystem(); 
                return; 
            }
        }
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => { 
            if(gameActive && !victoryFlag && stability > 0 && gameReady) loadNewChallenge(); 
            nextTimer = null; 
        }, 1300);
        drawPowerSystem();
    }
    
    function loadNewChallenge() {
        if(!gameActive || victoryFlag || !gameReady) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = getTaskByProgress();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        drawPowerSystem();
    }
    
    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach((opt) => {
            const btn = document.createElement('div'); 
            btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("СОЕДИНЕНИЕ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suffix = " Дж";
            else if(currentProblem.title.includes("КОНДЕНСАТОР")) suffix = " мкФ";
            else if(currentProblem.title.includes("ЭНЕРГИЯ")) suffix = " Дж";
            btn.innerText = `${opt}${suffix}`;
            btn.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); 
            });
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); 
            });
            answersContainer.appendChild(btn);
        });
    }
    
    function victoryGame() { 
        if(victoryFlag) return; 
        victoryFlag = true; 
        gameActive = false; 
        waitForAnswer = true; 
        if(nextTimer) clearTimeout(nextTimer); 
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ✨🏆<br>Счёт: ${score} МВт.`; 
        drawVictoryScene(); 
    }
    
    function gameDefeat() { 
        if(victoryFlag) return; 
        gameActive = false; 
        waitForAnswer = true; 
        if(nextTimer) clearTimeout(nextTimer); 
        messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост рухнул... Вы дошли до ${correctCount}/30. Перезапустите. 💥`; 
        drawGameOverVisual(); 
    }
    
    function restart() {
        if(nextTimer) clearTimeout(nextTimer);
        score = 0;
        stability = 3;
        correctCount = 0;
        gameActive = true;
        victoryFlag = false;
        waitForAnswer = false;
        usedTasks = [];
        scoreSpan.innerText = "0";
        livesSpan.innerText = "3";
        updateUI();
        if(gameReady && ALL_TASKS.length > 0) {
            loadNewChallenge();
        } else {
            eqDisplay.innerHTML = "Загрузка задач...";
            questionDisplay.innerHTML = "Пожалуйста, подождите";
            messageDiv.innerHTML = "⏳ Ожидание загрузки задач с GitHub...";
        }
        drawPowerSystem();
    }
    
    // ======================== ВИЗУАЛЬНЫЕ ЭФФЕКТЫ ========================
    function drawPowerSystem() { 
        ctx.clearRect(0,0,CANVAS_W,CANVAS_H); 
        ctx.fillStyle="#121f1c"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
        ctx.fillStyle="#3a6b55"; 
        ctx.beginPath(); 
        ctx.ellipse(100,200,50,70,0,0,Math.PI*2); 
        ctx.fill();
        ctx.fillStyle="#d4c97a"; 
        ctx.font="bold 24px monospace"; 
        ctx.fillText("⚙️",82,215);
        ctx.fillStyle="#cfe6cf"; 
        ctx.font="12px monospace"; 
        ctx.fillText("ГЕНЕРАТОР",68,260);
        ctx.fillStyle="#f5cb5c"; 
        ctx.beginPath(); 
        ctx.arc(690,180,30,0,Math.PI*2); 
        ctx.fill();
        ctx.fillStyle="#664d1a"; 
        ctx.font="22px monospace"; 
        ctx.fillText("🏙️",678,192);
        
        const waypoints = [{x:150,y:200},{x:280,y:180},{x:400,y:210},{x:550,y:170},{x:660,y:190},{x:690,y:180}];
        let totalLen=0; 
        for(let i=0;i<waypoints.length-1;i++) totalLen+=Math.hypot(waypoints[i+1].x-waypoints[i].x, waypoints[i+1].y-waypoints[i].y);
        let targetProgress=Math.min(1,correctCount/TARGET_CORRECT), currentDist=totalLen*targetProgress;
        
        ctx.beginPath(); 
        for(let i=0;i<waypoints.length-1;i++) { 
            if(i===0) ctx.moveTo(waypoints[i].x,waypoints[i].y); 
            ctx.lineTo(waypoints[i+1].x,waypoints[i+1].y); 
        }
        ctx.strokeStyle="#4a5b55"; 
        ctx.lineWidth=8; 
        ctx.stroke();
        
        ctx.beginPath(); 
        let acc=0,started=false;
        for(let i=0;i<waypoints.length-1;i++){ 
            let p1=waypoints[i],p2=waypoints[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=currentDist){ 
                if(!started){ctx.moveTo(p1.x,p1.y);started=true;} 
                ctx.lineTo(p2.x,p2.y); 
                acc+=seg;
            }
            else if(acc<currentDist && acc+seg>currentDist){ 
                let t=(currentDist-acc)/seg, ix=p1.x+(p2.x-p1.x)*t, iy=p1.y+(p2.y-p1.y)*t; 
                if(!started) ctx.moveTo(p1.x,p1.y); 
                ctx.lineTo(ix,iy); 
                break; 
            } 
        }
        ctx.strokeStyle="#f5d742"; 
        ctx.lineWidth=6; 
        ctx.stroke();
        
        for(let i=0;i<stability;i++){ 
            ctx.fillStyle="#61dafb"; 
            ctx.fillRect(30+i*35,290,25,15); 
        }
        
        if(victoryFlag){ 
            ctx.fillStyle="#ffdd88cc"; 
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
            ctx.fillStyle="#2c5a2e"; 
            ctx.font="bold 28px monospace"; 
            ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!",CANVAS_W/2-170,CANVAS_H/2-20); 
        }
        if(stability<=0 && !victoryFlag){ 
            ctx.fillStyle="#ff6666aa"; 
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
            ctx.fillStyle="white"; 
            ctx.font="bold 26px monospace"; 
            ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА",CANVAS_W/2-150,CANVAS_H/2); 
        }
    }
    
    function drawCorrectFlashEffect(){ 
        ctx.fillStyle="#66ff99aa"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
        setTimeout(()=>drawPowerSystem(),150); 
    }
    
    function drawWrongFlashEffect(){ 
        ctx.fillStyle="#ff6666aa"; 
        ctx.fillRect(0,0,CANVAS_W,CANVAS_H); 
        setTimeout(()=>drawPowerSystem(),180); 
    }
    
    function drawGameOverVisual(){ 
        drawPowerSystem(); 
    }
    
    function drawVictoryScene(){ 
        drawPowerSystem(); 
    }
    
    // ======================== АВТОРИЗАЦИЯ И ЗАПУСК ========================
    auth.signInAnonymously().catch(error => {
        console.error("Ошибка анонимного входа:", error);
    });
    
    document.getElementById('restartGame').addEventListener('click', () => restart());
    document.getElementById('restartGame').addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        restart(); 
    });
    
    fetchTasksFromGitHub();
</script>
