<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика | Админ Панель</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .level-box, .progress-box, .diff-box, .user-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child, .progress-box span:first-child, .diff-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }

        /* Админ-модальное окно */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .admin-card {
            background: #0e1a1f;
            border: 2px solid #ffaa44;
            border-radius: 48px;
            padding: 25px 20px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 40px black;
            color: #eee;
        }
        .admin-card input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background: #1f3a33;
            border: 1px solid #8bc34a;
            border-radius: 60px;
            color: #ffecb3;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .admin-card button {
            background: #3a7a5a;
            border: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-card button:active { transform: scale(0.97); }
        .close-admin {
            background: #aa3e2c;
        }
        .admin-status {
            font-size: 0.8rem;
            margin-top: 12px;
            color: #ffaa66;
        }
        /* Кнопка входа в админку через UI */
        .admin-trigger-btn {
            background: #2a5f6e;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-family: monospace;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">R₁ = 10 Ω, R₂ = 20 Ω</div>
                    <div class="question-text" id="questionDisplay">Найдите общее сопротивление?</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Каждый правильный ответ усложняет сеть!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="diff-box"><span>📊 СЛОЖНОСТЬ</span><span id="difficultyValue">0%</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <div class="user-box"><span>👤 ID</span><span id="userIdDisplay">Не авторизован</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
            <button class="admin-trigger-btn" id="openAdminBtn">⚙️ АДМИН</button>
        </div>
    </div>
</div>

<!-- Модалка авторизации админа через Firebase UID -->
<div id="adminModal" class="admin-modal">
    <div class="admin-card">
        <h3>⚡ АДМИН-ДОСТУП ⚡</h3>
        <input type="text" id="adminUidInput" placeholder="Введите ваш Firebase UID" autocomplete="off">
        <div>
            <button id="adminAuthBtn">🔑 Войти как админ</button>
            <button id="adminCloseBtn" class="close-admin">✖️ Закрыть</button>
        </div>
        <div id="adminPanelActions" style="display: none; margin-top: 15px;">
            <button id="giveCorrectAnswerBtn">✅ ВЫДАТЬ ПРАВИЛЬНЫЙ ОТВЕТ</button>
            <button id="instaWinsBtn">🏆 МГНОВЕННАЯ ПОБЕДА</button>
            <button id="addLivesBtn">❤️ +1 Стабильность</button>
            <button id="addPointsBtn">🔋 +50 МВт</button>
            <div class="admin-status" id="adminStatusMsg"></div>
        </div>
        <div class="admin-status" id="adminLoginMsg">Введите UID, который вы выбрали (из Firebase Auth)</div>
    </div>
</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    // Ваш конфиг (уже предоставлен)
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ИГРЫ ========================
    const TARGET_CORRECT = 15;
    let correctCount = 0;
    let difficulty = 0;
    let gameActive = true;
    let victoryFlag = false;
    
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    let CANVAS_W = 750, CANVAS_H = 420;
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    
    let score = 0;
    let stability = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const difficultySpan = document.getElementById('difficultyValue');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    const userIdSpan = document.getElementById('userIdDisplay');
    
    // Админские переменные
    let isAdminMode = false;          // флаг, что текущий пользователь - админ (по UID)
    let adminAuthorizedUid = null;    // тут будем хранить разрешённый uid, который вы выберете

    // ЖЕСТ: 5 тапов по счёту для быстрого открытия админки (оставлен для удобства)
    let tapCount = 0;
    let tapTimer = null;
    const scoreBoxElement = document.querySelector('.score-box');
    
    function resetTapCounter() {
        tapCount = 0;
        if(tapTimer) clearTimeout(tapTimer);
        tapTimer = null;
    }
    
    function onSecretTap() {
        if(tapTimer) clearTimeout(tapTimer);
        tapCount++;
        tapTimer = setTimeout(() => {
            tapCount = 0;
            tapTimer = null;
        }, 800);
        if(tapCount >= 5) {
            tapCount = 0;
            if(tapTimer) clearTimeout(tapTimer);
            openAdminModal();
        }
    }
    
    if(scoreBoxElement) {
        scoreBoxElement.addEventListener('click', onSecretTap);
        scoreBoxElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onSecretTap();
        });
    }
    
    // DOM-элементы админ-модалки
    const adminModal = document.getElementById('adminModal');
    const adminUidInput = document.getElementById('adminUidInput');
    const adminAuthBtn = document.getElementById('adminAuthBtn');
    const adminCloseBtn = document.getElementById('adminCloseBtn');
    const adminPanelActions = document.getElementById('adminPanelActions');
    const adminLoginMsg = document.getElementById('adminLoginMsg');
    const adminStatusMsg = document.getElementById('adminStatusMsg');
    const openAdminBtn = document.getElementById('openAdminBtn');
    
    // Открыть модалку
    function openAdminModal() {
        adminModal.style.display = 'flex';
        adminUidInput.value = '';
        // Скрываем панель действий, пока не авторизовались
        adminPanelActions.style.display = 'none';
        adminLoginMsg.innerHTML = 'Введите Firebase UID, который вы выбрали для админа.';
        adminLoginMsg.style.color = '#ffaa66';
        adminStatusMsg.innerHTML = '';
    }
    
    function closeAdminModal() {
        adminModal.style.display = 'none';
        adminUidInput.value = '';
    }
    
    // Функция проверки: соответствует ли текущий залогиненный пользователь UID-админу
    // Вы вызываете её после входа в Firebase (либо анонимно, либо через почту/пароль)
    // Для удобства сделаем поддержку анонимной авторизации, а админский UID вы зададите через конфиг.
    // ЗАДАЙТЕ ЗДЕСЬ ВАШ АДМИНСКИЙ UID (тот, который вы хотите сделать администратором)
    const ALLOWED_ADMIN_UID = "ВАШ_UID_АДМИНА";   // <------- ⚠️ ВСТАВЬТЕ СЮДА ВАШ ID ПОЛЬЗОВАТЕЛЯ ИЗ FIREBASE!
    
    // Функция обновления статуса админа на основе текущего пользователя Firebase
    function updateAdminStatus() {
        const user = auth.currentUser;
        if(user) {
            userIdSpan.innerText = user.uid.substring(0, 12) + "...";
            if(user.uid === ALLOWED_ADMIN_UID) {
                isAdminMode = true;
                adminAuthorizedUid = user.uid;
                messageDiv.innerHTML = `🔐 РЕЖИМ АДМИНИСТРАТОРА АКТИВЕН. Вы имеете доступ к админ-панели.`;
                // Дополнительно можно показать в интерфейсе
            } else {
                isAdminMode = false;
                adminAuthorizedUid = null;
                // Не пишем каждый раз, чтобы не засорять
            }
        } else {
            userIdSpan.innerText = "Не авторизован";
            isAdminMode = false;
            adminAuthorizedUid = null;
        }
    }
    
    // Авторизация через анонимный вход (чтобы у каждого игрока был свой UID, а вы потом могли выбрать нужный)
    // Это позволит вам получить UID через консоль Firebase и указать его выше.
    auth.signInAnonymously().catch(error => {
        console.error("Ошибка анонимного входа:", error);
        userIdSpan.innerText = "Ошибка входа";
    });
    
    auth.onAuthStateChanged(user => {
        if(user) {
            userIdSpan.innerText = user.uid.substring(0, 12) + "...";
            updateAdminStatus();
        } else {
            userIdSpan.innerText = "Нет входа";
            isAdminMode = false;
        }
    });
    
    // Логика входа в админку через модалку: сверяем введённый UID с ALLOWED_ADMIN_UID
    adminAuthBtn.addEventListener('click', () => {
        const enteredUid = adminUidInput.value.trim();
        if(enteredUid === "") {
            adminLoginMsg.innerHTML = '❌ Введите UID!';
            adminLoginMsg.style.color = '#ff8866';
            return;
        }
        const currentUser = auth.currentUser;
        if(!currentUser) {
            adminLoginMsg.innerHTML = '❌ Сначала дождитесь авторизации Firebase (анонимный вход). Обновите страницу если нужно.';
            adminLoginMsg.style.color = '#ff8866';
            return;
        }
        // Сравниваем текущий UID залогиненного пользователя с тем, что ввёл пользователь в модалке
        if(currentUser.uid === enteredUid && currentUser.uid === ALLOWED_ADMIN_UID) {
            isAdminMode = true;
            adminAuthorizedUid = currentUser.uid;
            adminLoginMsg.innerHTML = '✅ АДМИН ДОСТУП ПОДТВЕРЖДЁН! Панель управления открыта.';
            adminLoginMsg.style.color = '#8bc34a';
            adminPanelActions.style.display = 'block';
            adminStatusMsg.innerHTML = 'Админ-функции активны.';
        } else {
            adminLoginMsg.innerHTML = '❌ НЕВЕРНЫЙ UID или этот пользователь не является администратором! Укажите правильный UID в конфиге (ALLOWED_ADMIN_UID).';
            adminLoginMsg.style.color = '#ff8866';
            adminPanelActions.style.display = 'none';
            isAdminMode = false;
        }
    });
    
    adminCloseBtn.addEventListener('click', closeAdminModal);
    adminModal.addEventListener('click', (e) => {
        if(e.target === adminModal) closeAdminModal();
    });
    
    // Кнопка "Админ" в интерфейсе открывает модалку
    openAdminBtn.addEventListener('click', () => {
        openAdminModal();
    });
    
    // -------------------- АДМИН-КОМАНДЫ (доступны только если isAdminMode = true) --------------------
    function adminGiveCorrectAnswer() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) {
            adminStatusMsg.innerHTML = '❌ Игра уже завершена (победа/поражение).';
            return;
        }
        if(waitForAnswer) {
            adminStatusMsg.innerHTML = '⏳ Сейчас смена задачи, подождите...';
            return;
        }
        if(currentProblem) {
            handleAnswer(currentProblem.correctAnswer);
            adminStatusMsg.innerHTML = '✅ Админ: выдан правильный ответ!';
        } else {
            adminStatusMsg.innerHTML = '⚠️ Нет активной задачи';
        }
    }
    
    function adminInstantWin() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(victoryFlag) {
            adminStatusMsg.innerHTML = '🏆 Уже победа! Перезапустите.';
            return;
        }
        if(!gameActive) {
            adminStatusMsg.innerHTML = '❌ Игра неактивна, перезапустите';
            return;
        }
        if(nextTimer) clearTimeout(nextTimer);
        gameActive = true;
        victoryFlag = false;
        waitForAnswer = false;
        while(correctCount < TARGET_CORRECT) {
            correctCount++;
            let points = 10 + Math.floor(difficulty / 5);
            score += points;
            let newDifficulty = (correctCount / TARGET_CORRECT) * 100;
            difficulty = Math.min(100, newDifficulty);
        }
        scoreSpan.innerText = score;
        stability = Math.max(1, stability);
        livesSpan.innerText = stability;
        updateUI();
        victoryGame();
        drawPowerSystem();
        adminStatusMsg.innerHTML = '🌟 АДМИН: МГНОВЕННАЯ ПОБЕДА! 🌟';
    }
    
    function adminAddLife() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) {
            adminStatusMsg.innerHTML = '❌ Игра завершена';
            return;
        }
        stability = Math.min(5, stability + 1);
        livesSpan.innerText = stability;
        messageDiv.innerHTML = `❤️ Админ добавил стабильность! +1 ❤️`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '❤️ +1 стабильность добавлена';
        setTimeout(()=>{ if(gameActive && !victoryFlag && !waitForAnswer) drawPowerSystem(); },200);
    }
    
    function adminAddPoints() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав администратора.'; return; }
        if(!gameActive || victoryFlag) {
            adminStatusMsg.innerHTML = '❌ Игра завершена';
            return;
        }
        score += 50;
        scoreSpan.innerText = score;
        messageDiv.innerHTML = `🔋 Админ начислил +50 МВт! 🔋`;
        drawPowerSystem();
        adminStatusMsg.innerHTML = '🔋 +50 мегаватт!';
    }
    
    // Привязываем кнопки админ-панели (они всегда существуют, но проверяют isAdminMode внутри функций)
    document.getElementById('giveCorrectAnswerBtn').addEventListener('click', adminGiveCorrectAnswer);
    document.getElementById('instaWinsBtn').addEventListener('click', adminInstantWin);
    document.getElementById('addLivesBtn').addEventListener('click', adminAddLife);
    document.getElementById('addPointsBtn').addEventListener('click', adminAddPoints);
    
    // -------------------- ИГРОВАЯ МЕХАНИКА (без изменений, но добавлен вызов updateUI) --------------------
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
        difficultySpan.innerText = `${Math.floor(difficulty)}%`;
    }
    function getDifficultyMultiplier() { return 1.0 + (difficulty / 100) * 1.8; }
    
    function generateCoolProblem() {
        const mult = getDifficultyMultiplier();
        let type = 0;
        if (difficulty < 25) type = randInt(0, 2);
        else if (difficulty < 60) type = randInt(0, 3);
        else { let r = randInt(0,100); if(r<35) type=0; else if(r<60) type=1; else if(r<80) type=2; else type=3; }
        if(type === 0) {
            let voltage = randInt(12, Math.min(150, 40 + Math.floor(25 * mult)));
            let current = randInt(1, Math.min(30, 8 + Math.floor(8 * mult)));
            let power = voltage * current;
            return { title: "📡 АКТИВНАЯ МОЩНОСТЬ", equation: `U = ${voltage} В,  I = ${current} А`, question: `Какова мощность P (в ваттах)?`, correctAnswer: power, hint: "P = U × I" };
        } else if(type === 1) {
            let voltage = randInt(18, Math.min(200, 60 + Math.floor(45 * mult)));
            let current = randInt(2, Math.min(35, 8 + Math.floor(10 * mult)));
            let resistance = Math.floor(voltage / current);
            if(resistance < 1) resistance = 2;
            voltage = resistance * current;
            return { title: "⚡ ЗАКОН ОМА", equation: `U = ${voltage} В,  I = ${current} А`, question: `Найдите сопротивление R (в омах)`, correctAnswer: resistance, hint: "R = U / I" };
        } else if(type === 2) {
            let useParallel = (difficulty > 50) ? (randInt(0,100) < 70) : (randInt(0,1) === 1);
            if(!useParallel) {
                let R_known = randInt(15, Math.min(120, 40 + Math.floor(35 * mult)));
                let R_unknown = randInt(10, Math.min(130, 30 + Math.floor(40 * mult)));
                let R_total = R_known + R_unknown;
                return { title: "🔌 ПОСЛЕДОВАТЕЛЬНАЯ ЦЕПЬ", equation: `R₁ = ${R_known} Ω,  R_общ = ${R_total} Ω`, question: `Чему равно R₂ (в омах)?`, correctAnswer: R_unknown, hint: "R₂ = R_общ - R₁" };
            } else {
                let R1 = randInt(20, Math.min(140, 45 + Math.floor(45 * mult)));
                let R_total = randInt(12, Math.min(90, 25 + Math.floor(30 * mult)));
                let R2 = -1;
                for(let trys=0; trys<30; trys++) {
                    if(R1 > R_total && R_total > 0) {
                        let denom = (R1 - R_total);
                        if(denom !== 0) {
                            let num = R1 * R_total;
                            if(num % denom === 0) { R2 = num / denom; if(R2 > 5 && R2 < 300) break; }
                        }
                    }
                    R_total = randInt(12, Math.min(100, 30 + Math.floor(35 * mult)));
                    R1 = randInt(25, Math.min(150, 50 + Math.floor(45 * mult)));
                }
                if(R2 === -1 || R2 <= 0) { R2 = randInt(15, Math.min(120, 40 + Math.floor(35 * mult))); R_total = Math.floor((R1 * R2) / (R1 + R2)); }
                return { title: "🔀 ПАРАЛЛЕЛЬНАЯ ЦЕПЬ", equation: `R₁ = ${R1} Ω,  R_общ = ${R_total} Ω`, question: `Найдите R₂ (в омах)`, correctAnswer: R2, hint: "1/R₂ = 1/R_общ - 1/R₁" };
            }
        } else {
            let efficiency = randInt(65, 98);
            let inputPower = randInt(100, Math.min(800, 200 + Math.floor(250 * mult)));
            let outputPower = Math.floor(inputPower * efficiency / 100);
            return { title: "♻️ КПД", equation: `КПД = ${efficiency}%,  P_вх = ${inputPower} Вт`, question: `Чему равна полезная мощность P_вых (Вт)?`, correctAnswer: outputPower, hint: "P_вых = P_вх × КПД / 100" };
        }
    }
    
    function generateOptions(correct) {
        let opts = new Set(); opts.add(correct);
        let rangeVar = Math.max(3, Math.floor(correct * (0.2 + difficulty / 150)));
        rangeVar = Math.min(rangeVar, Math.floor(correct * 0.6));
        while(opts.size < 4) {
            let variation = randInt(-rangeVar, rangeVar);
            let candidate = correct + variation;
            if(candidate < 1) candidate = correct + randInt(2, 8);
            if(candidate > 1500) candidate = correct - randInt(5, 35);
            if(candidate > 0) opts.add(candidate);
            if(opts.size < 3) { let extra = correct + randInt(-Math.floor(correct*0.45), Math.floor(correct*0.55)); if(extra > 0 && extra !== correct) opts.add(extra); }
        }
        let arr = Array.from(opts);
        for(let i=arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
        return arr;
    }
    
    function victoryGame() { if(victoryFlag) return; victoryFlag=true; gameActive=false; waitForAnswer=true; if(nextTimer) clearTimeout(nextTimer); messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ✨🏆<br>Сложность: ${Math.floor(difficulty)}% | Счёт: ${score} МВт.`; drawVictoryScene(); }
    function gameDefeat() { if(victoryFlag) return; gameActive=false; waitForAnswer=true; if(nextTimer) clearTimeout(nextTimer); messageDiv.innerHTML = `💥 КОЛЛАПС! Рухнул на ${correctCount}/15. Перезапустите.`; drawGameOverVisual(); }
    
    function handleAnswer(selectedVal) {
        if(!gameActive || waitForAnswer || victoryFlag) return;
        const isCorrect = (selectedVal === currentProblem.correctAnswer);
        if(isCorrect) {
            let points = 10 + Math.floor(difficulty / 5);
            score += points; scoreSpan.innerText = score;
            correctCount++;
            let newDifficulty = (correctCount / TARGET_CORRECT) * 100;
            difficulty = Math.min(100, newDifficulty);
            updateUI();
            messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Сложность ↑ ${Math.floor(difficulty)}% | Мост ${correctCount}/${TARGET_CORRECT}`;
            drawCorrectFlashEffect();
            if(correctCount >= TARGET_CORRECT) { victoryGame(); drawPowerSystem(); return; }
        } else {
            stability--;
            livesSpan.innerText = stability;
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
            drawWrongFlashEffect();
            if(stability <= 0) { gameDefeat(); drawPowerSystem(); return; }
        }
        waitForAnswer = true;
        nextTimer = setTimeout(() => { if(gameActive && !victoryFlag && stability > 0) loadNewChallenge(); nextTimer = null; }, 1300);
        drawPowerSystem();
    }
    
    function loadNewChallenge() {
        if(!gameActive || victoryFlag) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = generateCoolProblem();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        let complexityBar = "▰".repeat(Math.floor(difficulty/10)) + "▱".repeat(10 - Math.floor(difficulty/10));
        messageDiv.innerHTML = `📈 Сложность: ${Math.floor(difficulty)}% ${complexityBar} | ${currentProblem.hint}`;
        drawPowerSystem();
    }
    
    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach((opt) => {
            const btn = document.createElement('div'); btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("ЦЕПЬ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            btn.innerText = `${opt}${suffix}`;
            btn.addEventListener('click', (e) => { e.stopPropagation(); if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt); });
            answersContainer.appendChild(btn);
        });
    }
    
    function restart() {
        if(nextTimer) clearTimeout(nextTimer);
        score = 0; stability = 3; correctCount = 0; difficulty = 0;
        gameActive = true; victoryFlag = false; waitForAnswer = false;
        scoreSpan.innerText = "0"; livesSpan.innerText = "3";
        updateUI();
        loadNewChallenge();
        drawPowerSystem();
    }
    
    // Визуализация (базовая)
    function drawPowerSystem() { 
        ctx.clearRect(0,0,CANVAS_W,CANVAS_H); ctx.fillStyle="#121f1c"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
        ctx.fillStyle="#3a6b55"; ctx.beginPath(); ctx.ellipse(100,200,50,70,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#d4c97a"; ctx.font="bold 24px monospace"; ctx.fillText("⚙️",82,215);
        ctx.fillStyle="#cfe6cf"; ctx.font="12px monospace"; ctx.fillText("ГЕНЕРАТОР",68,260);
        ctx.fillStyle="#f5cb5c"; ctx.beginPath(); ctx.arc(690,180,30,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#664d1a"; ctx.font="22px monospace"; ctx.fillText("🏙️",678,192);
        const waypoints = [{x:150,y:200},{x:280,y:180},{x:400,y:210},{x:550,y:170},{x:660,y:190},{x:690,y:180}];
        let totalLen=0; for(let i=0;i<waypoints.length-1;i++) totalLen+=Math.hypot(waypoints[i+1].x-waypoints[i].x, waypoints[i+1].y-waypoints[i].y);
        let targetProgress=Math.min(1,correctCount/TARGET_CORRECT), currentDist=totalLen*targetProgress;
        ctx.beginPath(); for(let i=0;i<waypoints.length-1;i++) { if(i===0) ctx.moveTo(waypoints[i].x,waypoints[i].y); ctx.lineTo(waypoints[i+1].x,waypoints[i+1].y); }
        ctx.strokeStyle="#4a5b55"; ctx.lineWidth=8; ctx.stroke();
        ctx.beginPath(); let acc=0,started=false;
        for(let i=0;i<waypoints.length-1;i++){ let p1=waypoints[i],p2=waypoints[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=currentDist){ if(!started){ctx.moveTo(p1.x,p1.y);started=true;} ctx.lineTo(p2.x,p2.y); acc+=seg;}
            else if(acc<currentDist && acc+seg>currentDist){ let t=(currentDist-acc)/seg, ix=p1.x+(p2.x-p1.x)*t, iy=p1.y+(p2.y-p1.y)*t; if(!started) ctx.moveTo(p1.x,p1.y); ctx.lineTo(ix,iy); break; } }
        ctx.strokeStyle="#f5d742"; ctx.lineWidth=6; ctx.stroke();
        for(let i=0;i<stability;i++){ ctx.fillStyle="#61dafb"; ctx.fillRect(30+i*35,290,25,15); }
        if(victoryFlag){ ctx.fillStyle="#ffdd88cc"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); ctx.fillStyle="#2c5a2e"; ctx.font="bold 28px monospace"; ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!",CANVAS_W/2-170,CANVAS_H/2-20); }
        if(stability<=0 && !victoryFlag){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); ctx.fillStyle="white"; ctx.font="bold 26px monospace"; ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА",CANVAS_W/2-150,CANVAS_H/2); }
    }
    function drawCorrectFlashEffect(){ ctx.fillStyle="#66ff99aa"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); setTimeout(()=>drawPowerSystem(),150); }
    function drawWrongFlashEffect(){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); setTimeout(()=>drawPowerSystem(),180); }
    function drawGameOverVisual(){ drawPowerSystem(); }
    function drawVictoryScene(){ drawPowerSystem(); }
    
    document.getElementById('restartGame').addEventListener('click', () => restart());
    document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restart(); });
    
    function init() { restart(); }
    init();
</script>
