<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>⚡ Электро-Тетрис Mobile Touch</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-pink: #ff0055;
            --neon-yellow: #fffb00;
        }

        body {
            background-color: #0a0a12;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Запрещает браузеру скроллить и зумить страницу */
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin: 10px 0 5px 0;
            font-size: 1.5rem;
            text-align: center;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 20, 35, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
            max-width: 90vw;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-pink);
            padding: 8px 12px;
            border-radius: 5px;
            flex: 1;
            text-align: center;
        }

        .stat-box.energy-box {
            border-color: var(--neon-yellow);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .energy-box .stat-label {
            color: var(--neon-yellow);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .energy-bar-container {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 4px;
            border: 1px solid rgba(255, 251, 0, 0.3);
        }

        .energy-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #fffb00, #ff9900);
            box-shadow: 0 0 8px var(--neon-yellow);
            transition: width 0.2s ease;
        }

        canvas {
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            background-color: #11111d;
            max-width: 100%;
            height: auto;
        }

        .hint {
            font-size: 0.7rem;
            color: #666;
            margin-top: 10px;
            text-align: center;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <h1>⚡ ELECTRO-TETRIS</h1>

    <div class="game-container">
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">Счет</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box energy-box">
                <div class="stat-label">Заряд</div>
                <div class="energy-bar-container">
                    <div id="energy" class="energy-bar"></div>
                </div>
            </div>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="hint">
            Тап — поворот | Свайп влево/вправо — движение<br>
            Свайп вниз — ускорить | Свайп вверх — упасть (⚡)
        </div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(20, 20); // Сетка стакана 12x20

let score = 0;
let energy = 0;
let dropCounter = 0;
let dropInterval = 1000; 
let lastTime = 0;

const COLORS = [
    null,
    '#00f0ff', // I
    '#fffb00', // O
    '#bd00ff', // T
    '#ff0055', // S
    '#00ff66', // Z
    '#ff9900', // J
    '#0066ff'  // L
];

function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

let arena = createMatrix(12, 20);

const player = {
    pos: {x: 0, y: 0},
    matrix: null
};

function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    else if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    else if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    else if (type === 'O') return [[4,4],[4,4]];
    else if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    else if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    updateScore();
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) player.pos.x -= dir;
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function triggerElectricDischarge() {
    energy = 0;
    document.getElementById('energy').style.width = '0%';
    arena.pop();
    arena.unshift(new Array(12).fill(0));
    
    canvas.style.backgroundColor = 'var(--neon-yellow)';
    setTimeout(() => { canvas.style.backgroundColor = '#11111d'; }, 100);
    
    score += 50;
    updateScore();
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        score += rowCount * 10;
        energy += 25; 
        if (energy > 100) energy = 100;
        rowCount *= 2;
    }
    
    document.getElementById('energy').style.width = energy + '%';
    if (energy >= 100) {
        setTimeout(triggerElectricDischarge, 200);
    }
}

function playerReset() {
    const pieces = 'ILJSZOT';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        alert('💥 СИСТЕМА ПЕРЕГРУЖЕНА! Игра окончена. Счет: ' + score);
        arena.forEach(row => row.fill(0));
        score = 0;
        energy = 0;
        document.getElementById('energy').style.width = '0%';
        updateScore();
    }
}

function draw() {
    context.fillStyle = '#11111d';
    context.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    context.strokeStyle = 'rgba(255, 255, 255, 0.02)';
    context.lineWidth = 0.05;
    for(let i = 0; i < 12; i++) {
        context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 20); context.stroke();
    }
    for(let i = 0; i < 20; i++) {
        context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
    }

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.fillStyle = COLORS[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                context.strokeStyle = 'rgba(255,255,255,0.5)';
                context.lineWidth = 0.08;
                context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    draw();
    requestAnimationFrame(update);
}

function updateScore() {
    document.getElementById('score').innerText = score;
}

// --- ЛОГИКА ТАЧ-УПРАВЛЕНИЯ (ЖЕСТЫ) ---
let touchStartX = 0;
let touchStartY = 0;
const sensitivity = 35; // Порог чувствительности свайпа в пикселях

window.addEventListener('touchstart', (e) => {
    // Считываем точку касания только внутри игрового контейнера
    if(e.target.closest('.game-container') || e.target === canvas) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
}, { passive: true });

window.addEventListener('touchend', (e) => {
    if (!touchStartX || !touchStartY) return;

    let touchEndX = e.changedTouches[0].clientX;
    let touchEndY = e.changedTouches[0].clientY;
    
    let diffX = touchEndX - touchStartX;
    let diffY = touchEndY - touchStartY;

    // Если палец почти не сдвинулся — это Тап (Поворот)
    if (Math.abs(diffX) < sensitivity && Math.abs(diffY) < sensitivity) {
        playerRotate(1);
    } 
    // Если сдвиг по горизонтали больше, чем по вертикали — двигаем влево/вправо
    else if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > sensitivity) {
            playerMove(1); // Свайп вправо
        } else if (diffX < -sensitivity) {
            playerMove(-1); // Свайп влево
        }
    } 
    // Вертикальные свайпы
    else {
        if (diffY > sensitivity) {
            playerDrop(); // Свайп вниз — ускорить падение
        } else if (diffY < -sensitivity) {
            playerHardDrop(); // Свайп вверх — мгновенный сброс (Дроп)
        }
    }

    // Сброс координат
    touchStartX = 0;
    touchStartY = 0;
}, { passive: true });

// Поддержка обычной клавиатуры на всякий случай (для ПК)
document.addEventListener('keydown', event => {
    if (event.keyCode === 37) playerMove(-1);
    else if (event.keyCode === 39) playerMove(1);
    else if (event.keyCode === 40) playerDrop();
    else if (event.keyCode === 38) playerRotate(1);
    else if (event.keyCode === 32) playerHardDrop();
});

// Старт игры
playerReset();
updateScore();
update();
</script>
</body>
</html>
