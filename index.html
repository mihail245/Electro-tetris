<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика | Рост сложности</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .lives-box, .level-box, .progress-box, .diff-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .lives-box span:first-child, .level-box span:first-child, .progress-box span:first-child, .diff-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }

        @media (max-width: 780px) {
            .game-layout {
                flex-direction: column;
            }
            .answer-btn {
                padding: 10px 5px;
                font-size: 1.2rem;
            }
            .equation-text {
                font-size: 1rem;
            }
            .info-panel {
                gap: 8px;
            }
            .diff-box, .progress-box {
                padding: 4px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">R₁ = 10 Ω, R₂ = 20 Ω</div>
                    <div class="question-text" id="questionDisplay">Найдите общее сопротивление?</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Каждый правильный ответ усложняет сеть!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="diff-box"><span>📊 СЛОЖНОСТЬ</span><span id="difficultyValue">0%</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- НОВАЯ МЕХАНИКА: СЛОЖНОСТЬ РАСТЁТ С КАЖДЫМ ПРАВИЛЬНЫМ ОТВЕТОМ ----------
        // Каждый правильный ответ увеличивает сложность на ~6-7%, максимальная сложность 100%
        // Сложность влияет на:
        // - Диапазон чисел в задачах (напряжение, ток, сопротивления)
        // - Количество сложных типов задач (параллельные цепи, КПД становятся чаще)
        // - Вариативность ответов (разброс вариантов становится больше)
        
        const TARGET_CORRECT = 15;      // 15 правильных = полный мост = победа
        let correctCount = 0;            // прогресс строительства моста (0..15)
        let difficulty = 0;              // 0..100 (%)
        let gameActive = true;
        let victoryFlag = false;
        
        const canvas = document.getElementById('powerCanvas');
        const ctx = canvas.getContext('2d');
        let CANVAS_W = 750, CANVAS_H = 420;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        let score = 0;
        let stability = 3;
        // Уровень теперь не используется для сложности, оставлен для отображения (можно удалить, но оставим legacy)
        let displayLevel = 1;
        let currentProblem = null;
        let optionsArray = [];
        let waitForAnswer = false;
        let nextTimer = null;
        
        // DOM элементы
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const difficultySpan = document.getElementById('difficultyValue');
        const bridgeProgressSpan = document.getElementById('bridgeProgress');
        const messageDiv = document.getElementById('gameMessage');
        const eqDisplay = document.getElementById('eqDisplay');
        const questionDisplay = document.getElementById('questionDisplay');
        const answersContainer = document.getElementById('answersContainer');
        
        // Прячем старый levelSpan, но оставим для совместимости (заменим текст)
        if(levelSpan) levelSpan.innerText = "—";
        
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // Обновить отображение сложности и прогресса
        function updateUI() {
            bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
            difficultySpan.innerText = `${Math.floor(difficulty)}%`;
        }
        
        // Функция получения множителя сложности (от 1.0 до ~2.8)
        function getDifficultyMultiplier() {
            return 1.0 + (difficulty / 100) * 1.8;
        }
        
        // Генерация задач с плавающей сложностью
        function generateCoolProblem() {
            const mult = getDifficultyMultiplier();
            // Тип задачи: с ростом сложности чаще встречаются параллельные цепи и КПД (типы 2 и 3)
            let type = 0;
            if (difficulty < 25) {
                type = randInt(0, 2); // больше простых мощностей и закона Ома
            } else if (difficulty < 60) {
                type = randInt(0, 3);
            } else {
                // высокая сложность: больше параллельных цепей и КПД (2 и 3)
                let r = randInt(0, 100);
                if (r < 35) type = 0;
                else if (r < 60) type = 1;
                else if (r < 80) type = 2;
                else type = 3;
            }
            
            // Базовые диапазоны с учётом сложности
            let baseVoltage = 15 + Math.floor(10 * mult);
            let baseCurrent = 2 + Math.floor(3 * mult);
            
            if(type === 0) { // Мощность
                let voltage = randInt(12, Math.min(150, 40 + Math.floor(25 * mult)));
                let current = randInt(1, Math.min(30, 8 + Math.floor(8 * mult)));
                let power = voltage * current;
                return {
                    title: "📡 АКТИВНАЯ МОЩНОСТЬ",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Какова мощность P (в ваттах)?`,
                    correctAnswer: power,
                    hint: "P = U × I",
                };
            }
            else if(type === 1) { // Закон Ома
                let voltage = randInt(18, Math.min(200, 60 + Math.floor(45 * mult)));
                let current = randInt(2, Math.min(35, 8 + Math.floor(10 * mult)));
                // Сделаем resistance целым, подбирая voltage
                let resistance = Math.floor(voltage / current);
                if(resistance < 1) resistance = 2;
                voltage = resistance * current;
                return {
                    title: "⚡ ЗАКОН ОМА",
                    equation: `U = ${voltage} В,  I = ${current} А`,
                    question: `Найдите сопротивление R (в омах)`,
                    correctAnswer: resistance,
                    hint: "R = U / I",
                };
            }
            else if(type === 2) { // Смешанная цепь: последовательная или параллельная (чаще параллельная при высокой сложности)
                let useParallel = (difficulty > 50) ? (randInt(0,100) < 70) : (randInt(0,1) === 1);
                if(!useParallel) {
                    let R_known = randInt(15, Math.min(120, 40 + Math.floor(35 * mult)));
                    let R_unknown = randInt(10, Math.min(130, 30 + Math.floor(40 * mult)));
                    let R_total = R_known + R_unknown;
                    return {
                        title: "🔌 ПОСЛЕДОВАТЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R_known} Ω,  R_общ = ${R_total} Ω`,
                        question: `Чему равно R₂ (в омах)?`,
                        correctAnswer: R_unknown,
                        hint: "R₂ = R_общ - R₁",
                    };
                } else {
                    let R1 = randInt(20, Math.min(140, 45 + Math.floor(45 * mult)));
                    let R_total = randInt(12, Math.min(90, 25 + Math.floor(30 * mult)));
                    let R2 = -1;
                    for(let trys=0; trys<30; trys++) {
                        if(R1 > R_total && R_total > 0) {
                            let denom = (R1 - R_total);
                            if(denom !== 0) {
                                let num = R1 * R_total;
                                if(num % denom === 0) {
                                    R2 = num / denom;
                                    if(R2 > 5 && R2 < 300) break;
                                }
                            }
                        }
                        R_total = randInt(12, Math.min(100, 30 + Math.floor(35 * mult)));
                        R1 = randInt(25, Math.min(150, 50 + Math.floor(45 * mult)));
                    }
                    if(R2 === -1 || R2 <= 0) {
                        R2 = randInt(15, Math.min(120, 40 + Math.floor(35 * mult)));
                        R_total = Math.floor((R1 * R2) / (R1 + R2));
                    }
                    return {
                        title: "🔀 ПАРАЛЛЕЛЬНАЯ ЦЕПЬ",
                        equation: `R₁ = ${R1} Ω,  R_общ = ${R_total} Ω`,
                        question: `Найдите R₂ (в омах)`,
                        correctAnswer: R2,
                        hint: "1/R₂ = 1/R_общ - 1/R₁",
                    };
                }
            }
            else { // КПД
                let efficiency = randInt(65, 98);
                let inputPower = randInt(100, Math.min(800, 200 + Math.floor(250 * mult)));
                let outputPower = Math.floor(inputPower * efficiency / 100);
                return {
                    title: "♻️ КОЭФФИЦИЕНТ ПОЛЕЗНОГО ДЕЙСТВИЯ",
                    equation: `КПД = ${efficiency}%,  P_вх = ${inputPower} Вт`,
                    question: `Чему равна полезная мощность P_вых (Вт)?`,
                    correctAnswer: outputPower,
                    hint: "P_вых = P_вх × КПД / 100",
                };
            }
        }
        
        // Генерация вариантов: разброс увеличивается со сложностью
        function generateOptions(correct) {
            let opts = new Set();
            opts.add(correct);
            let rangeVar = Math.max(3, Math.floor(correct * (0.2 + difficulty / 150)));
            rangeVar = Math.min(rangeVar, Math.floor(correct * 0.6));
            while(opts.size < 4) {
                let variation = randInt(-rangeVar, rangeVar);
                let candidate = correct + variation;
                if(candidate < 1) candidate = correct + randInt(2, 8);
                if(candidate > 1500) candidate = correct - randInt(5, 35);
                if(candidate > 0) opts.add(candidate);
                if(opts.size < 3) {
                    let extra = correct + randInt(-Math.floor(correct*0.45), Math.floor(correct*0.55));
                    if(extra > 0 && extra !== correct) opts.add(extra);
                }
            }
            let arr = Array.from(opts);
            for(let i=arr.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function victoryGame() {
            if(victoryFlag) return;
            victoryFlag = true;
            gameActive = false;
            waitForAnswer = true;
            if(nextTimer) clearTimeout(nextTimer);
            messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД СИЯЕТ! ✨🏆<br>Сложность покорена: ${Math.floor(difficulty)}% | Счёт: ${score} МВт.`;
            drawVictoryScene();
        }
        
        function gameDefeat() {
            if(victoryFlag) return;
            gameActive = false;
            waitForAnswer = true;
            if(nextTimer) clearTimeout(nextTimer);
            messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост рухнул... Вы дошли до ${correctCount}/15. Перезапустите. 💥`;
            drawGameOverVisual();
        }
        
        function handleAnswer(selectedVal) {
            if(!gameActive || waitForAnswer || victoryFlag) return;
            const isCorrect = (selectedVal === currentProblem.correctAnswer);
            if(isCorrect) {
                let points = 10 + Math.floor(difficulty / 5); // бонус от сложности
                score += points;
                scoreSpan.innerText = score;
                // Увеличиваем прогресс моста И сложность!
                correctCount++;
                // Сложность растёт: каждый правильный ответ добавляет ~6.67% к сложности (макс 100%)
                let newDifficulty = (correctCount / TARGET_CORRECT) * 100;
                difficulty = Math.min(100, newDifficulty);
                updateUI();
                
                messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Сложность ↑ ${Math.floor(difficulty)}% | Мост ${correctCount}/${TARGET_CORRECT}`;
                drawCorrectFlashEffect();
                
                if(correctCount >= TARGET_CORRECT) {
                    victoryGame();
                    drawPowerSystem();
                    return;
                }
            } else {
                stability--;
                livesSpan.innerText = stability;
                messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌ Сложность не растёт.`;
                drawWrongFlashEffect();
                if(stability <= 0) {
                    gameDefeat();
                    drawPowerSystem();
                    return;
                }
            }
            waitForAnswer = true;
            nextTimer = setTimeout(() => {
                if(gameActive && !victoryFlag && stability > 0) {
                    loadNewChallenge();
                }
                nextTimer = null;
            }, 1300);
            drawPowerSystem();
        }
        
        function loadNewChallenge() {
            if(!gameActive || victoryFlag) return;
            if(nextTimer) clearTimeout(nextTimer);
            waitForAnswer = false;
            currentProblem = generateCoolProblem();
            optionsArray = generateOptions(currentProblem.correctAnswer);
            eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
            questionDisplay.innerHTML = currentProblem.question;
            renderAnswerButtons();
            let complexityBar = "▰".repeat(Math.floor(difficulty/10)) + "▱".repeat(10 - Math.floor(difficulty/10));
            messageDiv.innerHTML = `📈 Сложность: ${Math.floor(difficulty)}% ${complexityBar} | ${currentProblem.hint}`;
            drawPowerSystem();
        }
        
        function renderAnswerButtons() {
            answersContainer.innerHTML = '';
            optionsArray.forEach((opt) => {
                const btn = document.createElement('div');
                btn.className = 'answer-btn';
                let suffix = "";
                if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
                else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
                else if(currentProblem.title.includes("ЦЕПЬ")) suffix = " Ω";
                else if(currentProblem.title.includes("КПД")) suffix = " Вт";
                else suffix = "";
                btn.innerText = `${opt}${suffix}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt);
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(!waitForAnswer && gameActive && !victoryFlag) handleAnswer(opt);
                });
                answersContainer.appendChild(btn);
            });
        }
        
        function restart() {
            if(nextTimer) clearTimeout(nextTimer);
            score = 0;
            stability = 3;
            correctCount = 0;
            difficulty = 0;
            gameActive = true;
            victoryFlag = false;
            waitForAnswer = false;
            scoreSpan.innerText = "0";
            livesSpan.innerText = "3";
            updateUI();
            loadNewChallenge();
            drawPowerSystem();
        }
        
        // ============= ВИЗУАЛИЗАЦИЯ С РОСТОМ СЛОЖНОСТИ И МОСТОМ =============
        function drawPowerSystem() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = "#121f1c";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            
            // Генератор
            ctx.fillStyle = "#3a6b55";
            ctx.beginPath();
            ctx.ellipse(100, 200, 50, 70, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#d4c97a";
            ctx.font = "bold 24px monospace";
            ctx.fillText("⚙️", 82, 215);
            ctx.fillStyle = "#cfe6cf";
            ctx.font = "12px monospace";
            ctx.fillText("ГЕНЕРАТОР", 68, 260);
            
            // Город
            ctx.fillStyle = "#f5cb5c";
            ctx.beginPath();
            ctx.arc(690, 180, 30, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#664d1a";
            ctx.font = "22px monospace";
            ctx.fillText("🏙️", 678, 192);
            ctx.fillStyle = "#ffe2a4";
            ctx.font = "10px monospace";
            ctx.fillText("ГОРОД", 672, 222);
            
            // Путевые точки моста
            const waypoints = [
                {x:150, y:200}, {x:280, y:180}, {x:400, y:210}, 
                {x:550, y:170}, {x:660, y:190}, {x:690, y:180}
            ];
            const totalLength = computeTotalLength(waypoints);
            let targetProgress = Math.min(1, correctCount / TARGET_CORRECT);
            let currentDist = totalLength * targetProgress;
            
            // Серая основа
            ctx.beginPath();
            for(let i=0; i<waypoints.length-1; i++) {
                if(i===0) ctx.moveTo(waypoints[i].x, waypoints[i].y);
                ctx.lineTo(waypoints[i+1].x, waypoints[i+1].y);
            }
            ctx.strokeStyle = "#4a5b55";
            ctx.lineWidth = 8;
            ctx.stroke();
            
            // Построенная часть (яркая)
            ctx.beginPath();
            let accumulated = 0;
            let started = false;
            for(let i=0; i<waypoints.length-1; i++) {
                let p1 = waypoints[i], p2 = waypoints[i+1];
                let segLen = Math.hypot(p2.x-p1.x, p2.y-p1.y);
                if(accumulated + segLen <= currentDist) {
                    if(!started) { ctx.moveTo(p1.x, p1.y); started=true; }
                    ctx.lineTo(p2.x, p2.y);
                    accumulated += segLen;
                } else if(accumulated < currentDist && accumulated+segLen > currentDist) {
                    let remain = currentDist - accumulated;
                    let t = remain/segLen;
                    let ix = p1.x + (p2.x-p1.x)*t;
                    let iy = p1.y + (p2.y-p1.y)*t;
                    if(!started) ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(ix, iy);
                    break;
                } else break;
            }
            ctx.strokeStyle = "#f5d742";
            ctx.lineWidth = 6;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Искры
            if(targetProgress > 0) {
                ctx.fillStyle = "#ffaa44";
                for(let i=0; i<Math.min(12, Math.floor(targetProgress*12)); i++) {
                    let tPos = (i/12) * currentDist;
                    let pt = getPointAtDistance(waypoints, tPos);
                    if(pt) { ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI*2); ctx.fill(); }
                }
            }
            
            // Текущая задача
            if(currentProblem && gameActive && !victoryFlag) {
                ctx.fillStyle = "#010f0ccc";
                ctx.fillRect(20, 320, 400, 85);
                ctx.fillStyle = "#bbffaa";
                ctx.font = "bold 13px monospace";
                ctx.fillText(currentProblem.title, 30, 345);
                ctx.font = "11px monospace";
                ctx.fillStyle = "#fad974";
                ctx.fillText(currentProblem.equation, 30, 370);
                ctx.fillStyle = "#cceeff";
                ctx.fillText(currentProblem.question.slice(0, 34), 30, 395);
            }
            
            // Отображение стабильности
            for(let i=0; i<stability; i++) {
                ctx.fillStyle = "#61dafb";
                ctx.fillRect(30 + i*35, 290, 25, 15);
            }
            
            // Эффект повышенной сложности: молнии на фоне
            if(difficulty > 50) {
                ctx.beginPath();
                for(let s=0; s<3; s++) {
                    let x = 500 + Math.random() * 200;
                    let y = 50 + Math.random() * 100;
                    ctx.moveTo(x, y);
                    ctx.lineTo(x-15, y+30);
                    ctx.lineTo(x+5, y+40);
                    ctx.lineTo(x-10, y+70);
                    ctx.strokeStyle = "#ffdd77";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            if(stability <= 0 && !victoryFlag) {
                ctx.fillStyle = "#ff6666aa";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.fillStyle = "white";
                ctx.font = "bold 26px monospace";
                ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА", CANVAS_W/2-150, CANVAS_H/2);
            }
            if(victoryFlag) {
                ctx.fillStyle = "#ffdd88cc";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.fillStyle = "#2c5a2e";
                ctx.font = "bold 28px monospace";
                ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!", CANVAS_W/2-170, CANVAS_H/2-20);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#ffefb9";
                ctx.fillText("ПОБЕДА! ГОРОД ВОЗРОДИЛСЯ", CANVAS_W/2-170, CANVAS_H/2+30);
            }
        }
        
        function computeTotalLength(points) {
            let len=0;
            for(let i=0;i<points.length-1;i++) len += Math.hypot(points[i+1].x-points[i].x, points[i+1].y-points[i].y);
            return len;
        }
        
        function getPointAtDistance(points, dist) {
            let acc=0;
            for(let i=0;i<points.length-1;i++) {
                let p1=points[i], p2=points[i+1];
                let seg=Math.hypot(p2.x-p1.x, p2.y-p1.y);
                if(acc+seg>=dist) {
                    let t=(dist-acc)/seg;
                    return {x:p1.x+(p2.x-p1.x)*t, y:p1.y+(p2.y-p1.y)*t};
                }
                acc+=seg;
            }
            return points[points.length-1];
        }
        
        function drawCorrectFlashEffect() {
            ctx.fillStyle = "#66ff99aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 150);
        }
        
        function drawWrongFlashEffect() {
            ctx.fillStyle = "#ff6666aa";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            setTimeout(()=>drawPowerSystem(), 180);
        }
        
        function drawGameOverVisual() { drawPowerSystem(); }
        function drawVictoryScene() { drawPowerSystem(); }
        
        document.getElementById('restartGame').addEventListener('click', () => restart());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restart(); });
        
        function init() { restart(); }
        init();
    })();
</script>
</body>
</html>
