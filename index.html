<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергомост: Математика энергетика | Мультиплеер</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }
        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }
        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .canvas-area {
            flex: 2;
            min-width: 280px;
        }
        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            background-color: #101f18;
            width: 100%;
            height: auto;
            background: #14261d;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }
        .score-box, .lives-box, .progress-box, .user-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .score-box span:first-child, .lives-box span:first-child, .progress-box span:first-child, .user-box span:first-child {
            color: #ffcd7e;
        }
        .restart-btn, .end-game-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }
        .end-game-btn {
            background: #f44336;
            box-shadow: 0 3px 0 #b71c1c;
        }
        .restart-btn:active, .end-game-btn:active {
            transform: translateY(2px);
        }
        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }
        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }
        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }
        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }
        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }
        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #00000055;
            padding: 8px;
            border-radius: 28px;
        }
        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ffdfa5;
            font-family: monospace;
            font-size: 1.5rem;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3a7a5a;
            border-top: 6px solid #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .multiplayer-panel {
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 15px;
            border-radius: 32px;
            margin-bottom: 15px;
        }
        .game-code-input {
            background: #1f3a33;
            border: 2px solid #5f9e72;
            border-radius: 40px;
            padding: 10px 15px;
            color: #ffdfa5;
            font-size: 1rem;
            font-family: monospace;
            text-align: center;
            width: 200px;
        }
        .players-list {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #aaffcc;
            max-height: 150px;
            overflow-y: auto;
        }
        .teacher-controls, .student-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .create-game-btn {
            background: #4caf50;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 0 #2e7d32;
        }
        .join-game-btn {
            background: #2196f3;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 0 #0b5e9e;
        }
        .copy-link-btn {
            background: #ff9800;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .game-code-display {
            background: #00000066;
            padding: 6px 15px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .teacher-stats {
            background: #00000066;
            padding: 10px;
            border-radius: 20px;
            margin-top: 10px;
        }
        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="multiplayer-panel" id="multiplayerPanel">
            <div id="teacherMode" style="display:none;">
                <div class="teacher-controls">
                    <button class="create-game-btn" id="createGameBtn">🎮 СОЗДАТЬ НОВУЮ ИГРУ</button>
                    <div class="game-code-display" id="gameCodeDisplay"></div>
                    <button class="copy-link-btn" id="copyTeacherLink">📋 КОПИРОВАТЬ ССЫЛКУ УЧИТЕЛЯ</button>
                    <button class="end-game-btn" id="endGameBtn" style="display:none;">🏁 ЗАВЕРШИТЬ ИГРУ</button>
                </div>
                <div id="gameInfo" style="display:none;">
                    <div class="players-list" id="playersList">👥 Ожидание игроков...</div>
                    <div class="teacher-stats" id="teacherStats"></div>
                </div>
            </div>
            <div id="studentMode" style="display:none;">
                <div class="student-controls">
                    <input type="text" id="joinGameInput" class="game-code-input" placeholder="Введите код игры" maxlength="6">
                    <button class="join-game-btn" id="joinGameBtn">🔌 ПРИСОЕДИНИТЬСЯ</button>
                </div>
                <div id="studentGameInfo" style="display:none; margin-top:10px;">
                    <div class="game-code-display" id="studentCodeDisplay"></div>
                </div>
            </div>
        </div>
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">Загрузка задач...</div>
                    <div class="question-text" id="questionDisplay">Пожалуйста, подождите</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Загрузка конфигурации с GitHub...
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>🔋 МЕГАВАТТЫ</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>⚡ СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="progress-box"><span>🏗️ ЭНЕРГОМОСТ</span><span id="bridgeProgress">0/15</span></div>
            <div class="user-box"><span>👤 РОЛЬ</span><span id="roleDisplay">Не авторизован</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    const firebaseConfig = {
  apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
  authDomain: "igra-82a42.firebaseapp.com",
  databaseURL: "https://igra-82a42-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "igra-82a42",
  storageBucket: "igra-82a42.firebasestorage.app",
  messagingSenderId: "246552412786",
  appId: "1:246552412786:web:013a67819cfc816683b8eb"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
    let TASKS_LIBRARY = [];
    let gameReady = false;
    let correctCount = 0;
    let gameActive = true;
    let victoryFlag = false;
    let score = 0;
    let stability = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    const TARGET_CORRECT = 15;
    
    // Мультиплеер переменные
    let currentGameId = null;
    let isTeacher = false;
    let isPlayer = false;
    let playerId = null;
    let gameStarted = false;

    // DOM элементы
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 750;
    canvas.height = 420;
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    const roleDisplay = document.getElementById('roleDisplay');

    // ======================== ЗАГРУЗКА ЗАДАЧ ========================
    const GITHUB_TASKS_URL = "https://raw.githubusercontent.com/mihail245/Electro-tetris/refs/heads/main/tasks.json";

    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = `<div class="spinner"></div><div>Загрузка задач с GitHub...</div>`;
    document.body.appendChild(loadingOverlay);

    async function fetchTasksFromGitHub() {
        try {
            const response = await fetch(GITHUB_TASKS_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (Array.isArray(data) && data.length > 0) {
                TASKS_LIBRARY = data;
                messageDiv.innerHTML = `✅ Загружено ${TASKS_LIBRARY.length} задач. Ожидание создания/присоединения к игре.`;
                gameReady = true;
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    if(loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay);
                }, 500);
                checkURLAndMode();
            } else {
                throw new Error("Нет задач");
            }
        } catch (error) {
            loadingOverlay.innerHTML = `<div style="color: #ff8866;">❌ ОШИБКА ЗАГРУЗКИ</div><div>${error.message}</div><button id="reloadBtn" style="margin-top:30px;padding:10px 25px;background:#ffaa44;border:none;border-radius:40px;cursor:pointer;">🔄 ПОВТОРИТЬ</button>`;
            const reloadBtn = document.getElementById('reloadBtn');
            if(reloadBtn) reloadBtn.onclick = () => location.reload();
            gameReady = false;
        }
    }

    // ======================== ПРОВЕРКА URL ДЛЯ РАЗДЕЛЕНИЯ РОЛЕЙ ========================
    function checkURLAndMode() {
        const urlParams = new URLSearchParams(window.location.search);
        const gameCode = urlParams.get('code');
        const role = urlParams.get('role');
        
        if (role === 'teacher' && gameCode) {
            // Учитель присоединяется к созданной игре
            joinAsTeacher(gameCode);
        } else if (gameCode) {
            // Ученик присоединяется по коду
            showStudentModeWithCode(gameCode);
        } else {
            // Обычный режим - показываем выбор
            showRoleSelection();
        }
    }
    
    function showRoleSelection() {
        document.getElementById('teacherMode').style.display = 'block';
        document.getElementById('studentMode').style.display = 'block';
        roleDisplay.innerText = "👤 ВЫБЕРИТЕ РЕЖИМ";
    }
    
    function showStudentModeWithCode(code) {
        document.getElementById('studentMode').style.display = 'block';
        document.getElementById('teacherMode').style.display = 'none';
        document.getElementById('joinGameInput').value = code;
        roleDisplay.innerText = "👨‍🎓 УЧЕНИК";
        setTimeout(() => joinGame(), 500);
    }
    
    // ======================== ФУНКЦИИ УЧИТЕЛЯ ========================
    function generateGameCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
    
    async function createGame() {
        if (!gameReady) {
            messageDiv.innerHTML = "⏳ Загрузка задач, подождите...";
            return;
        }
        const user = auth.currentUser;
        if (!user) return;
        
        const gameCode = generateGameCode();
        currentGameId = gameCode;
        isTeacher = true;
        isPlayer = false;
        
        const gameRef = db.ref(`games/${gameCode}`);
        await gameRef.set({
            code: gameCode,
            teacherId: user.uid,
            createdAt: Date.now(),
            started: false,
            ended: false,
            players: {}
        });
        
        playerId = user.uid;
        await gameRef.child(`players/${playerId}`).set({
            name: "Учитель",
            isTeacher: true,
            score: 0,
            correctCount: 0,
            stability: 3,
            joinedAt: Date.now(),
            victory: false
        });
        
        const teacherLink = `${window.location.origin}${window.location.pathname}?role=teacher&code=${gameCode}`;
        const studentLink = `${window.location.origin}${window.location.pathname}?code=${gameCode}`;
        
        document.getElementById('gameCodeDisplay').innerHTML = `🎮 КОД: ${gameCode}`;
        document.getElementById('endGameBtn').style.display = 'inline-block';
        document.getElementById('gameInfo').style.display = 'block';
        
        messageDiv.innerHTML = `✅ Игра создана!<br>📋 Ссылка для УЧИТЕЛЯ: ${teacherLink}<br>📋 Ссылка для УЧЕНИКОВ: ${studentLink}`;
        roleDisplay.innerText = "👨‍🏫 УЧИТЕЛЬ";
        
        // Скрываем student mode
        document.getElementById('studentMode').style.display = 'none';
        
        // Автоматически стартуем игру для учителя
        gameStarted = true;
        await db.ref(`games/${gameCode}`).update({ started: true });
        restartGame();
        
        // Слушаем игроков
        db.ref(`games/${gameCode}/players`).on('value', (snapshot) => {
            const players = snapshot.val() || {};
            const playersArray = Object.entries(players).filter(([id, p]) => !p.isTeacher);
            const playersList = playersArray.map(([id, p]) => 
                `👨‍🎓 ${p.name || id.substring(0,6)}: ${p.correctCount || 0}/15 | ${p.stability || 3}⚡`
            ).join('<br>') || "👥 Ожидание игроков...";
            document.getElementById('playersList').innerHTML = `👥 ИГРОКИ:<br>${playersList}`;
            
            // Обновляем статистику учителя
            const teacherData = players[user.uid];
            if (teacherData) {
                document.getElementById('teacherStats').innerHTML = `
                    📊 ВАШ ПРОГРЕСС: ${teacherData.correctCount || 0}/15 задач<br>
                    🔋 ОЧКИ: ${teacherData.score || 0} МВт<br>
                    ⚡ СТАБИЛЬНОСТЬ: ${teacherData.stability || 3}
                `;
            }
        });
    }
    
    async function joinAsTeacher(gameCode) {
        if (!gameReady) {
            messageDiv.innerHTML = "⏳ Загрузка задач, подождите...";
            return;
        }
        const user = auth.currentUser;
        if (!user) return;
        
        const gameRef = db.ref(`games/${gameCode}`);
        const snapshot = await gameRef.once('value');
        const game = snapshot.val();
        
        if (!game) {
            messageDiv.innerHTML = "❌ Игра не найдена!";
            return;
        }
        
        if (game.teacherId !== user.uid) {
            messageDiv.innerHTML = "❌ Только учитель, создавший игру, может использовать эту ссылку!";
            return;
        }
        
        currentGameId = gameCode;
        isTeacher = true;
        isPlayer = false;
        playerId = user.uid;
        
        document.getElementById('teacherMode').style.display = 'block';
        document.getElementById('studentMode').style.display = 'none';
        document.getElementById('gameCodeDisplay').innerHTML = `🎮 КОД: ${gameCode}`;
        document.getElementById('endGameBtn').style.display = 'inline-block';
        document.getElementById('gameInfo').style.display = 'block';
        roleDisplay.innerText = "👨‍🏫 УЧИТЕЛЬ";
        
        // Обновляем данные учителя
        await gameRef.child(`players/${playerId}`).set({
            name: "Учитель",
            isTeacher: true,
            score: 0,
            correctCount: 0,
            stability: 3,
            joinedAt: Date.now(),
            victory: false
        });
        
        if (!game.started) {
            gameStarted = true;
            await db.ref(`games/${gameCode}`).update({ started: true });
        } else {
            gameStarted = true;
        }
        
        restartGame();
        messageDiv.innerHTML = `✅ Вы вошли как учитель в игру ${gameCode}!`;
        
        // Слушаем игроков
        db.ref(`games/${gameCode}/players`).on('value', (snapshot) => {
            const players = snapshot.val() || {};
            const playersArray = Object.entries(players).filter(([id, p]) => !p.isTeacher);
            const playersList = playersArray.map(([id, p]) => 
                `👨‍🎓 ${p.name || id.substring(0,6)}: ${p.correctCount || 0}/15 | ${p.stability || 3}⚡`
            ).join('<br>') || "👥 Ожидание игроков...";
            document.getElementById('playersList').innerHTML = `👥 ИГРОКИ:<br>${playersList}`;
            
            const teacherData = players[user.uid];
            if (teacherData) {
                document.getElementById('teacherStats').innerHTML = `
                    📊 ВАШ ПРОГРЕСС: ${teacherData.correctCount || 0}/15 задач<br>
                    🔋 ОЧКИ: ${teacherData.score || 0} МВт<br>
                    ⚡ СТАБИЛЬНОСТЬ: ${teacherData.stability || 3}
                `;
            }
        });
    }
    
    async function endGame() {
        if (!currentGameId || !isTeacher) return;
        
        const gameRef = db.ref(`games/${currentGameId}`);
        await gameRef.update({ ended: true, started: false });
        
        gameActive = false;
        gameStarted = false;
        messageDiv.innerHTML = "🏁 ИГРА ЗАВЕРШЕНА УЧИТЕЛЕМ! Спасибо за участие! 🏁";
        
        if (nextTimer) clearTimeout(nextTimer);
        waitForAnswer = true;
        
        // Показываем финальную таблицу
        const playersSnapshot = await gameRef.child('players').once('value');
        const players = playersSnapshot.val() || {};
        const results = Object.entries(players).map(([id, p]) => 
            `${p.isTeacher ? '👨‍🏫 УЧИТЕЛЬ' : '👨‍🎓 УЧЕНИК'}: ${p.correctCount || 0}/15 задач, ${p.score || 0} МВт`
        ).join('<br>');
        
        messageDiv.innerHTML = `🏆 ИТОГИ ИГРЫ 🏆<br>${results}`;
        drawGameOverVisual();
    }
    
    // ======================== ФУНКЦИИ УЧЕНИКА ========================
    async function joinGame() {
        if (!gameReady) {
            messageDiv.innerHTML = "⏳ Загрузка задач, подождите...";
            return;
        }
        const gameCode = document.getElementById('joinGameInput').value.toUpperCase();
        if (!gameCode) return;
        
        const user = auth.currentUser;
        if (!user) return;
        
        const gameRef = db.ref(`games/${gameCode}`);
        const snapshot = await gameRef.once('value');
        const game = snapshot.val();
        
        if (!game) {
            messageDiv.innerHTML = "❌ Игра не найдена! Проверьте код.";
            return;
        }
        
        if (game.ended) {
            messageDiv.innerHTML = "❌ Эта игра уже завершена!";
            return;
        }
        
        currentGameId = gameCode;
        isTeacher = false;
        isPlayer = true;
        playerId = user.uid;
        
        await gameRef.child(`players/${playerId}`).set({
            name: "Ученик",
            isTeacher: false,
            score: 0,
            correctCount: 0,
            stability: 3,
            joinedAt: Date.now(),
            victory: false
        });
        
        document.getElementById('studentGameInfo').style.display = 'block';
        document.getElementById('studentCodeDisplay').innerHTML = `🎮 КОД ИГРЫ: ${gameCode}`;
        document.getElementById('teacherMode').style.display = 'none';
        roleDisplay.innerText = "👨‍🎓 УЧЕНИК";
        
        messageDiv.innerHTML = `✅ Присоединились к игре ${gameCode}! Ожидайте начала.`;
        
        if (game.started && !game.ended) {
            gameStarted = true;
            messageDiv.innerHTML = "🚀 ИГРА НАЧАЛАСЬ! Удачи!";
            restartGame();
        }
        
        // Слушаем старт/конец игры
        db.ref(`games/${gameCode}`).on('value', (snapshot) => {
            const gameData = snapshot.val();
            if (gameData) {
                if (gameData.ended) {
                    gameStarted = false;
                    gameActive = false;
                    messageDiv.innerHTML = "🏁 ИГРА ЗАВЕРШЕНА УЧИТЕЛЕМ! 🏁";
                    if (nextTimer) clearTimeout(nextTimer);
                } else if (gameData.started && !gameStarted && !gameData.ended) {
                    gameStarted = true;
                    messageDiv.innerHTML = "🚀 ИГРА НАЧАЛАСЬ! Удачи!";
                    restartGame();
                }
            }
        });
        
        // Синхронизация прогресса
        db.ref(`games/${gameCode}/players/${playerId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && gameStarted && !isTeacher) {
                // Обновляем UI из Firebase (если нужно)
            }
        });
    }
    
    // ======================== ИГРОВЫЕ ФУНКЦИИ ========================
    function getRandomProblem() {
        if (!TASKS_LIBRARY.length) {
            return {
                title: "⚠️ ОШИБКА",
                equation: "Нет задач",
                question: "Перезагрузите страницу",
                correctAnswer: 1,
                hint: "Проверьте интернет"
            };
        }
        const base = { ...TASKS_LIBRARY[Math.floor(Math.random() * TASKS_LIBRARY.length)] };
        return {
            title: base.title || "ЭНЕРГОЗАДАЧА",
            equation: base.eq || base.equation || "данные",
            question: base.question || "Найдите значение",
            correctAnswer: Number(base.correct) || Number(base.answer) || 100,
            hint: base.hint || "Проверьте формулу"
        };
    }
    
    function generateOptions(correct) {
        let opts = new Set();
        opts.add(correct);
        while(opts.size < 4) {
            let delta = Math.floor(Math.random() * 21) - 10;
            let cand = correct + delta;
            if(cand < 1) cand = correct + Math.floor(Math.random() * 10) + 1;
            if(cand > 0 && cand < 50000) opts.add(cand);
        }
        let arr = Array.from(opts);
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
    }
    
    function updateFirebaseProgress() {
        if (currentGameId && playerId && gameStarted) {
            db.ref(`games/${currentGameId}/players/${playerId}`).update({
                score: score,
                correctCount: correctCount,
                stability: stability,
                timestamp: Date.now()
            });
        }
    }
    
    function handleAnswer(selectedVal) {
        if(!gameActive || waitForAnswer || victoryFlag || !gameStarted) return;
        const isCorrect = (selectedVal === currentProblem.correctAnswer);
        if(isCorrect) {
            let points = 10;
            score += points;
            scoreSpan.innerText = score;
            correctCount++;
            updateUI();
            updateFirebaseProgress();
            messageDiv.innerHTML = `✅ ВЕРНО! +${points} МВт | Мост ${correctCount}/${TARGET_CORRECT}`;
            drawCorrectFlashEffect();
            if(correctCount >= TARGET_CORRECT) { victoryGame(); drawPowerSystem(); return; }
        } else {
            stability--;
            livesSpan.innerText = stability;
            updateFirebaseProgress();
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint} ❌`;
            drawWrongFlashEffect();
            if(stability <= 0) { gameDefeat(); drawPowerSystem(); return; }
        }
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => { if(gameActive && !victoryFlag && stability > 0 && gameStarted) loadNewChallenge(); nextTimer = null; }, 1300);
        drawPowerSystem();
    }
    
    function loadNewChallenge() {
        if(!gameActive || victoryFlag || !gameStarted) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = getRandomProblem();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        messageDiv.innerHTML = `💡 ${currentProblem.hint}`;
        drawPowerSystem();
    }
    
    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach((opt) => {
            const btn = document.createElement('div'); btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("ЦЕПЬ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suffix = " Дж";
            else if(currentProblem.title.includes("ЭНЕРГИЯ")) suffix = " кВт·ч";
            btn.innerText = `${opt}${suffix}`;
            btn.addEventListener('click', (e) => { e.stopPropagation(); if(!waitForAnswer && gameActive && !victoryFlag && gameStarted) handleAnswer(opt); });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(!waitForAnswer && gameActive && !victoryFlag && gameStarted) handleAnswer(opt); });
            answersContainer.appendChild(btn);
        });
    }
    
    function victoryGame() {
        if(victoryFlag) return;
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОМОСТ ПОСТРОЕН! ГОРОД СИЯЕТ! ✨🏆<br>Счёт: ${score} МВт.`;
        drawVictoryScene();
        if (currentGameId && playerId) {
            db.ref(`games/${currentGameId}/players/${playerId}`).update({ victory: true });
        }
    }
    
    function gameDefeat() {
        if(victoryFlag) return;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `💥 КОЛЛАПС ЭНЕРГОСЕТИ! Энергомост рухнул... Вы дошли до ${correctCount}/15. 💥`;
        drawGameOverVisual();
        if (currentGameId && playerId) {
            db.ref(`games/${currentGameId}/players/${playerId}`).update({ defeated: true });
        }
    }
    
    function restartGame() {
        if(nextTimer) clearTimeout(nextTimer);
        score = 0; stability = 3; correctCount = 0;
        gameActive = true; victoryFlag = false; waitForAnswer = false;
        scoreSpan.innerText = "0"; livesSpan.innerText = "3";
        updateUI();
        if (gameStarted) loadNewChallenge();
        drawPowerSystem();
        if (currentGameId && playerId && gameStarted) {
            db.ref(`games/${currentGameId}/players/${playerId}`).update({
                score: 0, correctCount: 0, stability: 3, victory: false, defeated: false
            });
        }
    }
    
    // ======================== ВИЗУАЛЬНЫЕ ЭФФЕКТЫ ========================
    function drawPowerSystem() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#121f1c"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#3a6b55"; ctx.beginPath(); ctx.ellipse(100,200,50,70,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#d4c97a"; ctx.font="bold 24px monospace"; ctx.fillText("⚙️",82,215);
        ctx.fillStyle="#cfe6cf"; ctx.font="12px monospace"; ctx.fillText("ГЕНЕРАТОР",68,260);
        ctx.fillStyle="#f5cb5c"; ctx.beginPath(); ctx.arc(690,180,30,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#664d1a"; ctx.font="22px monospace"; ctx.fillText("🏙️",678,192);
        const waypoints = [{x:150,y:200},{x:280,y:180},{x:400,y:210},{x:550,y:170},{x:660,y:190},{x:690,y:180}];
        let totalLen=0; for(let i=0;i<waypoints.length-1;i++) totalLen+=Math.hypot(waypoints[i+1].x-waypoints[i].x, waypoints[i+1].y-waypoints[i].y);
        let targetProgress=Math.min(1,correctCount/TARGET_CORRECT), currentDist=totalLen*targetProgress;
        ctx.beginPath(); for(let i=0;i<waypoints.length-1;i++) { if(i===0) ctx.moveTo(waypoints[i].x,waypoints[i].y); ctx.lineTo(waypoints[i+1].x,waypoints[i+1].y); }
        ctx.strokeStyle="#4a5b55"; ctx.lineWidth=8; ctx.stroke();
        ctx.beginPath(); let acc=0,started=false;
        for(let i=0;i<waypoints.length-1;i++){ let p1=waypoints[i],p2=waypoints[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=currentDist){ if(!started){ctx.moveTo(p1.x,p1.y);started=true;} ctx.lineTo(p2.x,p2.y); acc+=seg;}
            else if(acc<currentDist && acc+seg>currentDist){ let t=(currentDist-acc)/seg, ix=p1.x+(p2.x-p1.x)*t, iy=p1.y+(p2.y-p1.y)*t; if(!started) ctx.moveTo(p1.x,p1.y); ctx.lineTo(ix,iy); break; } }
        ctx.strokeStyle="#f5d742"; ctx.lineWidth=6; ctx.stroke();
        for(let i=0;i<stability;i++){ ctx.fillStyle="#61dafb"; ctx.fillRect(30+i*35,290,25,15); }
        if(victoryFlag){ ctx.fillStyle="#ffdd88cc"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#2c5a2e"; ctx.font="bold 28px monospace"; ctx.fillText("ЭНЕРГОМОСТ ПОСТРОЕН!",canvas.width/2-170,canvas.height/2-20); }
        if(stability<=0 && !victoryFlag){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; ctx.font="bold 26px monospace"; ctx.fillText("СИСТЕМА ОТКЛЮЧЕНА",canvas.width/2-150,canvas.height/2); }
    }
    function drawCorrectFlashEffect(){ ctx.fillStyle="#66ff99aa"; ctx.fillRect(0,0,canvas.width,canvas.height); setTimeout(()=>drawPowerSystem(),150); }
    function drawWrongFlashEffect(){ ctx.fillStyle="#ff6666aa"; ctx.fillRect(0,0,canvas.width,canvas.height); setTimeout(()=>drawPowerSystem(),180); }
    function drawGameOverVisual(){ drawPowerSystem(); }
    function drawVictoryScene(){ drawPowerSystem(); }
    
    function copyTeacherLink() {
        const teacherLink = `${window.location.origin}${window.location.pathname}?role=teacher&code=${currentGameId}`;
        navigator.clipboard.writeText(teacherLink);
        messageDiv.innerHTML = "📋 Ссылка для учителя скопирована!";
        setTimeout(() => { if(messageDiv) messageDiv.innerHTML = "✅ Готово!"; }, 1500);
    }
    
    // ======================== ИНИЦИАЛИЗАЦИЯ ========================
    auth.signInAnonymously().catch(error => console.error("Ошибка анонимного входа:", error));
    auth.onAuthStateChanged(user => {
        if(user) {
            console.log("Авторизован:", user.uid);
            if(gameReady) checkURLAndMode();
        }
    });
    
    document.getElementById('createGameBtn').addEventListener('click', createGame);
    document.getElementById('endGameBtn').addEventListener('click', endGame);
    document.getElementById('joinGameBtn').addEventListener('click', joinGame);
    document.getElementById('restartGame').addEventListener('click', () => { if(gameStarted) restartGame(); });
    document.getElementById('copyTeacherLink').addEventListener('click', copyTeacherLink);
    
    fetchTasksFromGitHub();
</script>
