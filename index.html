<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Энергосеть: Математика энергетика</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
            transition: all 0.2s;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
            position: relative;
        }

        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            width: 100%;
            height: auto;
            background: #0d1f18;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }

        .score-box, .health-box, .progress-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s;
            align-items: center;
        }

        .health-box img {
            width: 40px;
            height: 40px;
            vertical-align: middle;
        }

        .score-box:active, .health-box:active, .progress-box:active {
            transform: scale(0.98);
        }

        .score-box span:first-child, .progress-box span:first-child {
            color: #ffcd7e;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }

        .restart-btn:active {
            transform: translateY(2px);
        }

        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }

        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }

        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }

        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }

        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #ffdfa5;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        
        /* Стили для админ-модалки */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .admin-card {
            background: #0e1a1f;
            border: 2px solid #ffaa44;
            border-radius: 48px;
            padding: 25px 20px;
            width: 500px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 40px black;
            color: #eee;
        }
        .admin-card input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background: #1f3a33;
            border: 1px solid #8bc34a;
            border-radius: 60px;
            color: #ffecb3;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .admin-card button {
            background: #3a7a5a;
            border: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-card button:active { transform: scale(0.97); }
        .close-admin {
            background: #aa3e2c;
        }
        .close-game-btn {
            background: #aa3e2c;
        }
        .admin-status {
            font-size: 0.8rem;
            margin-top: 12px;
            color: #ffaa66;
        }
        
        /* Вкладки админки */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #5a9e6e;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .admin-tab {
            background: #1f3a33;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .admin-tab.active {
            background: #ffaa44;
            color: #1e2a1c;
        }
        .admin-tab-content {
            display: none;
        }
        .admin-tab-content.active {
            display: block;
        }
        
        /* Стили для логов */
        .logs-container {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.8rem;
            background: #0b1815;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
        }
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #2e6b4e;
            font-family: monospace;
        }
        .log-entry.success {
            color: #8bc34a;
        }
        .log-entry.failed {
            color: #ff8866;
        }
        .log-entry.admin-action {
            color: #ffaa44;
        }
        .clear-logs-btn {
            background: #aa3e2c;
            margin-top: 10px;
            font-size: 0.8rem;
            padding: 5px 12px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ffdfa5;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3a7a5a;
            border-top: 6px solid #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
            .admin-card { width: 95%; }
            .admin-tabs { flex-wrap: wrap; }
            .health-box img { width: 32px; height: 32px; }
        }
        
        /* Затемнение для закрытой игры */
        .game-closed-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ff8866;
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }
        .game-closed-overlay .closed-text {
            font-size: 3rem;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .game-closed-overlay .closed-subtext {
            font-size: 1.2rem;
            color: #ffaa66;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">

</div>

<!-- Модалка админ-панели -->

</div>

<script>
    // ======================== НАСТРОЙКА FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        databaseURL: "https://igra-82a42-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ======================== ПАРОЛИ АДМИНОВ ========================
    const ADMIN_PASSWORDS = {
        "14881161": { name: "Главный администратор", emoji: "👑", access: "full" },
        "148867": { name: "Помощник", emoji: "⭐", access: "actions_only" }
    };
    
    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
    let ALL_TASKS = [];
    let TASKS_LEVEL_1 = [];
    let TASKS_LEVEL_2 = [];
    let TASKS_LEVEL_3 = [];
    let gameReady = false;
    const TARGET_CORRECT = 15;
    let correctCount = 0;
    let gameActive = true;
    let victoryFlag = false;
    let usedTasks = [];
    let gameClosed = false; // Флаг, закрыта ли игра
    
    let score = 0;
    let health = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 750;
    canvas.height = 420;
    
    const scoreSpan = document.getElementById('scoreValue');
    const healthIcon = document.getElementById('healthIcon');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    
    let isAdminMode = false;
    let currentAdminName = "";
    let currentAdminAccess = "";
    
    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = `<div class="spinner"></div><div>Загрузка задач...</div>`;
    document.body.appendChild(loadingOverlay);
    
    // ======================== ПРОВЕРКА СТАТУСА ИГРЫ ========================
    async function checkGameStatus() {
        try {
            const snapshot = await db.ref('admin/gameStatus').once('value');
            const status = snapshot.val();
            if (status && status.closed === true) {
                gameClosed = true;
                showGameClosedOverlay();
            } else {
                gameClosed = false;
                hideGameClosedOverlay();
            }
        } catch (error) {
            console.error("Ошибка проверки статуса игры:", error);
        }
    }
    
    function showGameClosedOverlay() {
        if (document.getElementById('gameClosedOverlay')) return;
        const overlay = document.createElement('div');
        overlay.id = 'gameClosedOverlay';
        overlay.className = 'game-closed-overlay';
        overlay.innerHTML = `
            <div class="closed-text">🔒 ИГРА ЗАКРЫТА 🔒</div>
            <div class="closed-subtext">Администратор временно закрыл доступ</div>
            <div style="font-size: 0.8rem; margin-top: 20px;">Попробуйте зайти позже</div>
        `;
        document.body.appendChild(overlay);
        
        // Блокируем кнопки ответов
        if (answersContainer) {
            answersContainer.style.pointerEvents = 'none';
            answersContainer.style.opacity = '0.5';
        }
        // Блокируем кнопку перезапуска
        const restartBtn = document.getElementById('restartGame');
        if (restartBtn) restartBtn.disabled = true;
    }
    
    function hideGameClosedOverlay() {
        const overlay = document.getElementById('gameClosedOverlay');
        if (overlay) overlay.remove();
        if (answersContainer) {
            answersContainer.style.pointerEvents = 'auto';
            answersContainer.style.opacity = '1';
        }
        const restartBtn = document.getElementById('restartGame');
        if (restartBtn) restartBtn.disabled = false;
    }
    
    // ======================== ФУНКЦИЯ ОБНОВЛЕНИЯ ИКОНКИ ========================
    function updateHealthIcon() {
        const healthIcons = {
            3: "https://i.imgur.com/rHRy49i.png",
            2: "https://i.imgur.com/ESGJRuM.png",
            1: "https://i.imgur.com/eASASjl.png",
            0: "https://i.imgur.com/kLlSxtl.png"
        };
        healthIcon.src = healthIcons[health] || healthIcons[0];
    }
    
    // ======================== КРАСИВОЕ РИСОВАНИЕ ========================
    function drawGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#0d2818');
        gradient.addColorStop(1, '#06120c');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        
        // Левая вышка
        ctx.fillStyle = '#5a7a6a';
        ctx.fillRect(80, 160, 15, 120);
        ctx.fillRect(60, 160, 55, 10);
        ctx.fillRect(70, 140, 35, 25);
        
        ctx.fillStyle = '#aa8866';
        for(let i = 0; i < 3; i++) {
            ctx.fillRect(85, 170 + i * 15, 5, 8);
        }
        
        // Правая вышка
        ctx.fillStyle = '#5a7a6a';
        ctx.fillRect(650, 160, 15, 120);
        ctx.fillRect(630, 160, 55, 10);
        ctx.fillRect(640, 140, 35, 25);
        
        ctx.fillStyle = '#aa8866';
        for(let i = 0; i < 3; i++) {
            ctx.fillRect(655, 170 + i * 15, 5, 8);
        }
        
        // Провода
        const points = [
            {x: 95, y: 175}, {x: 200, y: 165}, {x: 310, y: 180},
            {x: 420, y: 160}, {x: 530, y: 175}, {x: 650, y: 170}
        ];
        
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.strokeStyle = '#4a5b55';
        ctx.lineWidth = 6;
        ctx.stroke();
        
        let totalLength = 0;
        for (let i = 0; i < points.length - 1; i++) {
            totalLength += Math.hypot(points[i+1].x - points[i].x, points[i+1].y - points[i].y);
        }
        
        let progress = Math.min(1, correctCount / TARGET_CORRECT);
        let builtLength = totalLength * progress;
        
        ctx.beginPath();
        let accumulated = 0;
        let started = false;
        
        for (let i = 0; i < points.length - 1; i++) {
            const p1 = points[i];
            const p2 = points[i+1];
            const segmentLength = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            
            if (accumulated + segmentLength <= builtLength) {
                if (!started) {
                    ctx.moveTo(p1.x, p1.y);
                    started = true;
                }
                ctx.lineTo(p2.x, p2.y);
                accumulated += segmentLength;
            } else if (accumulated < builtLength) {
                const t = (builtLength - accumulated) / segmentLength;
                const x = p1.x + (p2.x - p1.x) * t;
                const y = p1.y + (p2.y - p1.y) * t;
                if (!started) ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(x, y);
                break;
            }
        }
        ctx.strokeStyle = '#ffdd66';
        ctx.lineWidth = 4;
        ctx.stroke();
        
        // Искры
        if (progress > 0 && !victoryFlag && health > 0 && !gameClosed) {
            for (let i = 0; i < 6; i++) {
                const sparkX = 150 + (correctCount / TARGET_CORRECT) * 500 + Math.sin(Date.now() / 500 + i) * 4;
                const sparkY = 170 + Math.cos(Date.now() / 400 + i) * 5;
                ctx.fillStyle = `rgba(255, 200, 80, ${0.3 + Math.sin(Date.now() / 300) * 0.2})`;
                ctx.beginPath();
                ctx.arc(sparkX, sparkY, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Трансформатор
        ctx.fillStyle = '#8a7a5a';
        ctx.fillRect(380, 240, 60, 40);
        ctx.fillStyle = '#aa9a7a';
        ctx.fillRect(390, 230, 40, 15);
        ctx.fillStyle = '#ccaa66';
        ctx.font = "16px monospace";
        ctx.fillText("⚡", 400, 265);
        
        // Прогресс текстом
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = '#ffdd99';
        ctx.fillText(`📡 ПРОГРЕСС: ${correctCount}/${TARGET_CORRECT}`, canvas.width - 150, 40);
        
        // Победа/Поражение
        if (victoryFlag) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 28px monospace";
            ctx.fillStyle = '#ffdd66';
            ctx.fillText("🏆 ЭНЕРГОСЕТЬ ПОСТРОЕНА! 🏆", canvas.width/2 - 200, canvas.height/2);
            ctx.font = "16px monospace";
            ctx.fillStyle = '#ffeeaa';
            ctx.fillText("ГОРОД ПОЛУЧАЕТ ЭНЕРГИЮ!", canvas.width/2 - 140, canvas.height/2 + 50);
        }
        
        if (health <= 0 && !victoryFlag) {
            ctx.fillStyle = 'rgba(80,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 26px monospace";
            ctx.fillStyle = '#ff8866';
            ctx.fillText("💥 СЕТЬ РУХНУЛА! 💥", canvas.width/2 - 160, canvas.height/2);
            ctx.font = "14px monospace";
            ctx.fillStyle = '#ffaaaa';
            ctx.fillText("Провода оборваны", canvas.width/2 - 70, canvas.height/2 + 50);
        }
        
        // Если игра закрыта админом
        if (gameClosed && !victoryFlag) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 24px monospace";
            ctx.fillStyle = '#ff6666';
            ctx.fillText("🔒 ИГРА ЗАКРЫТА АДМИНИСТРАТОРОМ", canvas.width/2 - 220, canvas.height/2);
            ctx.font = "14px monospace";
            ctx.fillStyle = '#ffaa66';
            ctx.fillText("Попробуйте зайти позже", canvas.width/2 - 90, canvas.height/2 + 50);
        }
        
        ctx.shadowBlur = 0;
    }
    
    function flashEffect(type) {
        ctx.fillStyle = type === 'correct' ? 'rgba(100,255,100,0.4)' : 'rgba(255,100,100,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        setTimeout(() => drawGame(), 150);
    }
    
    // ======================== ЛОГИРОВАНИЕ ========================
    async function addLogEntry(type, message, details = {}) {
        try {
            const logEntry = {
                timestamp: Date.now(),
                date: new Date().toLocaleString('ru-RU'),
                type: type,
                message: message,
                details: details,
                adminName: currentAdminName || null
            };
            await db.ref('admin/logs').push(logEntry);
        } catch (error) {
            console.error("Ошибка логирования:", error);
        }
    }
    
    async function loadLogs() {
        const logsContainer = document.getElementById('logsContainer');
        if (!logsContainer) return;
        try {
            logsContainer.innerHTML = '<div style="text-align: center; color: #ffaa66;">⏳ Загрузка логов...</div>';
            const snapshot = await db.ref('admin/logs').once('value');
            const logs = snapshot.val();
            if (!logs || Object.keys(logs).length === 0) {
                logsContainer.innerHTML = '<div style="text-align: center; color: #888;">📭 Логов пока нет</div>';
                return;
            }
            const logsArray = Object.entries(logs).map(([key, value]) => ({ key, ...value }));
            logsArray.sort((a, b) => b.timestamp - a.timestamp);
            const recentLogs = logsArray.slice(0, 50);
            let html = '';
            for (const log of recentLogs) {
                let logClass = '', icon = '';
                switch(log.type) {
                    case 'login_success': logClass = 'success'; icon = '✅'; break;
                    case 'login_failed': logClass = 'failed'; icon = '❌'; break;
                    case 'admin_action': logClass = 'admin-action'; icon = '🎮'; break;
                    default: icon = '📝';
                }
                html += `<div class="log-entry ${logClass}">${icon} <strong>${log.date}</strong><br>${log.message}</div>`;
            }
            logsContainer.innerHTML = html;
        } catch (error) {
            console.error("Ошибка загрузки логов:", error);
            logsContainer.innerHTML = '<div style="color: #ff8866;">❌ Ошибка загрузки логов. Проверьте правила Firebase!</div>';
        }
    }
    
    async function clearLogs() {
        if (confirm('Вы уверены, что хотите очистить все логи?')) {
            await db.ref('admin/logs').remove();
            await addLogEntry('admin_action', 'Очистка логов администратором', { action: 'clear_logs' });
            loadLogs();
            if (adminStatusMsg) adminStatusMsg.innerHTML = '🗑️ Логи очищены!';
        }
    }
    
    // ======================== УПРАВЛЕНИЕ СТАТУСОМ ИГРЫ ========================
    async function closeGame() {
        if (!isAdminMode) return;
        await db.ref('admin/gameStatus').set({ closed: true, closedBy: currentAdminName, closedAt: Date.now() });
        gameClosed = true;
        showGameClosedOverlay();
        drawGame();
        await addLogEntry('admin_action', `${currentAdminName} ЗАКРЫЛ игру`, { action: 'close_game' });
        if (settingsStatusMsg) settingsStatusMsg.innerHTML = '🔒 Игра закрыта! Пользователи не могут зайти.';
        document.getElementById('closeGameBtn').style.display = 'none';
        document.getElementById('openGameBtn').style.display = 'inline-block';
    }
    
    async function openGame() {
        if (!isAdminMode) return;
        await db.ref('admin/gameStatus').set({ closed: false });
        gameClosed = false;
        hideGameClosedOverlay();
        drawGame();
        await addLogEntry('admin_action', `${currentAdminName} ОТКРЫЛ игру`, { action: 'open_game' });
        if (settingsStatusMsg) settingsStatusMsg.innerHTML = '🔓 Игра открыта! Пользователи могут заходить.';
        document.getElementById('closeGameBtn').style.display = 'inline-block';
        document.getElementById('openGameBtn').style.display = 'none';
    }
    
    // ======================== ЗАГРУЗКА ЗАДАЧ ========================
    const GITHUB_TASKS_URL = "https://raw.githubusercontent.com/mihail245/Electro-tetris/refs/heads/main/tasks.json";
    
    async function fetchTasksFromGitHub() {
        try {
            const response = await fetch(GITHUB_TASKS_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (Array.isArray(data) && data.length > 0) {
                ALL_TASKS = data;
                TASKS_LEVEL_1 = ALL_TASKS.filter(task => task.level === 1);
                TASKS_LEVEL_2 = ALL_TASKS.filter(task => task.level === 2);
                TASKS_LEVEL_3 = ALL_TASKS.filter(task => task.level === 3);
                gameReady = true;
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    if(loadingOverlay.parentNode) loadingOverlay.parentNode.removeChild(loadingOverlay);
                }, 500);
                await checkGameStatus();
                restart();
            } else {
                throw new Error("Нет задач или неверный формат");
            }
        } catch (error) {
            loadingOverlay.innerHTML = `<div style="color: #ff8866;">❌ ОШИБКА ЗАГРУЗКИ</div>
                                        <div>${error.message}</div>
                                        <button id="reloadBtn" style="margin-top:30px;padding:10px 25px;background:#ffaa44;border:none;border-radius:40px;cursor:pointer;">🔄 ПОВТОРИТЬ</button>`;
            document.getElementById('reloadBtn')?.addEventListener('click', () => location.reload());
            gameReady = false;
        }
    }
    
    // ======================== СЕКРЕТНЫЙ ВХОД ========================
    let tapCount = 0;
    let tapTimer = null;
    document.getElementById('secretTapArea')?.addEventListener('click', () => {
        if(timer) clearTimeout(tapTimer);
        tapCount++;
        tapTimer = setTimeout(() => { tapCount = 0; }, 800);
        if(tapCount >= 5) { tapCount = 0; openAdminModal(); }
    });
    
    // ======================== АДМИНКА ========================
    const adminModal = document.getElementById('adminModal');
    const adminCodeInput = document.getElementById('adminCodeInput');
    const adminAuthBtn = document.getElementById('adminAuthBtn');
    const adminCloseBtn = document.getElementById('adminCloseBtn');
    const adminStatusMsg = document.getElementById('adminStatusMsg');
    const adminLoginMsg = document.getElementById('adminLoginMsg');
    const settingsStatusMsg = document.getElementById('settingsStatusMsg');
    const actionsTab = document.querySelector('.admin-tab[data-tab="actions"]');
    const settingsTab = document.querySelector('.admin-tab[data-tab="settings"]');
    const logsTab = document.querySelector('.admin-tab[data-tab="logs"]');
    
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabId = tab.dataset.tab;
            if (tabId === 'logs' && currentAdminAccess !== 'full') return;
            if (tabId === 'settings' && currentAdminAccess !== 'full') return;
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if (tabId === 'logs') loadLogs();
        });
    });
    
    function openAdminModal() {
        adminModal.style.display = 'flex';
        adminCodeInput.value = '';
        adminLoginMsg.innerHTML = 'Введите код администратора';
        adminLoginMsg.style.color = '#ffaa66';
        if (adminStatusMsg) adminStatusMsg.innerHTML = '';
        if (settingsStatusMsg) settingsStatusMsg.innerHTML = '';
        document.querySelectorAll('.admin-tab').forEach(t => {
            if (t.dataset.tab !== 'auth') t.style.display = 'none';
        });
        document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-auth').classList.add('active');
        document.querySelector('.admin-tab[data-tab="auth"]').classList.add('active');
    }
    
    function closeAdminModal() { adminModal.style.display = 'none'; }
    
    adminAuthBtn.addEventListener('click', async () => {
        const enteredCode = adminCodeInput.value.trim();
        if (!enteredCode) {
            adminLoginMsg.innerHTML = '❌ Введите код!';
            return;
        }
        const adminInfo = ADMIN_PASSWORDS[enteredCode];
        if (adminInfo) {
            isAdminMode = true;
            currentAdminName = adminInfo.name;
            currentAdminAccess = adminInfo.access;
            adminLoginMsg.innerHTML = `✅ ДОСТУП РАЗРЕШЁН! (${adminInfo.name})`;
            adminLoginMsg.style.color = '#8bc34a';
            adminStatusMsg.innerHTML = `Добро пожаловать, ${adminInfo.name}! ⚡`;
            
            actionsTab.style.display = 'block';
            if (adminInfo.access === 'full') {
                settingsTab.style.display = 'block';
                logsTab.style.display = 'block';
            } else {
                settingsTab.style.display = 'none';
                logsTab.style.display = 'none';
            }
            
            // Обновляем кнопки в настройках
            if (gameClosed) {
                document.getElementById('closeGameBtn').style.display = 'none';
                document.getElementById('openGameBtn').style.display = 'inline-block';
            } else {
                document.getElementById('closeGameBtn').style.display = 'inline-block';
                document.getElementById('openGameBtn').style.display = 'none';
            }
            
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            actionsTab.classList.add('active');
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-actions').classList.add('active');
            
            await addLogEntry('login_success', `Успешный вход: ${adminInfo.name} ${adminInfo.emoji} (${adminInfo.access === 'full' ? 'полный доступ' : 'только действия'})`);
            
            setTimeout(() => {
                if(messageDiv && !victoryFlag && gameActive) messageDiv.innerHTML = "💡 Админ-панель открыта. Используйте команды.";
            }, 3000);
        } else {
            adminLoginMsg.innerHTML = '❌ НЕВЕРНЫЙ КОД! Доступ запрещён.';
            adminLoginMsg.style.color = '#ff8866';
            await addLogEntry('login_failed', `Неудачная попытка входа: ${enteredCode}`);
        }
    });
    
    adminCloseBtn.addEventListener('click', closeAdminModal);
    document.getElementById('clearLogsBtn')?.addEventListener('click', clearLogs);
    document.getElementById('closeGameBtn')?.addEventListener('click', closeGame);
    document.getElementById('openGameBtn')?.addEventListener('click', openGame);
    
    async function adminGiveCorrectAnswer() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав.'; return; }
        if(!gameActive || victoryFlag) { adminStatusMsg.innerHTML = '❌ Игра завершена.'; return; }
        if(waitForAnswer) { adminStatusMsg.innerHTML = '⏳ Подождите...'; return; }
        if(currentProblem) {
            await addLogEntry('admin_action', `${currentAdminName} выдал правильный ответ`, { problem: currentProblem.title });
            handleAnswer(currentProblem.correctAnswer);
            adminStatusMsg.innerHTML = '✅ Выдан правильный ответ!';
        }
    }
    
    async function adminInstantWin() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав.'; return; }
        if(victoryFlag) { adminStatusMsg.innerHTML = '🏆 Уже победа!'; return; }
        await addLogEntry('admin_action', `${currentAdminName} использовал мгновенную победу`);
        if(nextTimer) clearTimeout(nextTimer);
        while(correctCount < TARGET_CORRECT) { correctCount++; score += 10; }
        scoreSpan.innerText = score;
        updateUI();
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОСЕТЬ ПОСТРОЕНА! ✨🏆<br>Счёт: ${score} МВт.`;
        drawGame();
        adminStatusMsg.innerHTML = '🌟 ПОБЕДА!';
    }
    
    async function adminAddLife() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав.'; return; }
        if(health < 5) {
            await addLogEntry('admin_action', `${currentAdminName} добавил жизнь`);
            health++;
            updateHealthIcon();
            messageDiv.innerHTML = `❤️ +1 жизнь!`;
            drawGame();
            adminStatusMsg.innerHTML = '❤️ +1 жизнь';
        }
    }
    
    async function adminAddPoints() {
        if(!isAdminMode) { adminStatusMsg.innerHTML = '⛔ Нет прав.'; return; }
        await addLogEntry('admin_action', `${currentAdminName} добавил +50 МВт`);
        score += 50;
        scoreSpan.innerText = score;
        messageDiv.innerHTML = `🔋 +50 МВт!`;
        drawGame();
        adminStatusMsg.innerHTML = '🔋 +50 очков';
    }
    
    document.getElementById('giveCorrectAnswerBtn')?.addEventListener('click', adminGiveCorrectAnswer);
    document.getElementById('instaWinsBtn')?.addEventListener('click', adminInstantWin);
    document.getElementById('addLivesBtn')?.addEventListener('click', adminAddLife);
    document.getElementById('addPointsBtn')?.addEventListener('click', adminAddPoints);
    
    // ======================== ИГРОВАЯ МЕХАНИКА ========================
    function getTaskByProgress() {
        let availableTasks = [];
        if (correctCount < 5) availableTasks = TASKS_LEVEL_1.filter(t => !usedTasks.includes(t));
        else if (correctCount < 10) availableTasks = TASKS_LEVEL_2.filter(t => !usedTasks.includes(t));
        else availableTasks = TASKS_LEVEL_3.filter(t => !usedTasks.includes(t));
        if (availableTasks.length === 0) {
            if (correctCount < 5) availableTasks = [...TASKS_LEVEL_1];
            else if (correctCount < 10) availableTasks = [...TASKS_LEVEL_2];
            else availableTasks = [...TASKS_LEVEL_3];
        }
        const task = availableTasks[Math.floor(Math.random() * availableTasks.length)];
        usedTasks.push(task);
        return { title: task.title, equation: task.eq, question: task.question, correctAnswer: task.correct, hint: task.hint };
    }
    
    function generateOptions(correct) {
        let opts = new Set([correct]);
        while(opts.size < 4) {
            let delta = Math.floor(Math.random() * 21) - 10;
            let cand = correct + delta;
            if(cand < 1) cand = correct + Math.floor(Math.random() * 10) + 1;
            if(cand > 0 && cand < 50000) opts.add(cand);
        }
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }
    
    function updateUI() {
        bridgeProgressSpan.innerText = `${correctCount}/${TARGET_CORRECT}`;
        if (!victoryFlag && gameActive && gameReady && !gameClosed) {
            messageDiv.innerHTML = `📡 ПРОГРЕСС: ${correctCount}/${TARGET_CORRECT}`;
        }
        drawGame();
    }
    
    function handleAnswer(selected) {
        if(!gameActive || waitForAnswer || victoryFlag || gameClosed) return;
        const isCorrect = selected === currentProblem.correctAnswer;
        if(isCorrect) {
            score += 10;
            scoreSpan.innerText = score;
            correctCount++;
            messageDiv.innerHTML = `✅ ВЕРНО! +10 МВт | ПРОГРЕСС: ${correctCount}/${TARGET_CORRECT}`;
            flashEffect('correct');
            if(correctCount >= TARGET_CORRECT) { victoryGame(); return; }
        } else {
            health--;
            updateHealthIcon();
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint}`;
            flashEffect('wrong');
            if(health <= 0) { gameDefeat(); return; }
        }
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => {
            if(gameActive && !victoryFlag && health > 0 && !gameClosed) loadNewChallenge();
            nextTimer = null;
        }, 1300);
        updateUI();
    }
    
    function loadNewChallenge() {
        if(!gameActive || victoryFlag || !gameReady || gameClosed) return;
        if(nextTimer) clearTimeout(nextTimer);
        waitForAnswer = false;
        currentProblem = getTaskByProgress();
        optionsArray = generateOptions(currentProblem.correctAnswer);
        eqDisplay.innerHTML = `${currentProblem.title}<br>${currentProblem.equation}`;
        questionDisplay.innerHTML = currentProblem.question;
        renderAnswerButtons();
        messageDiv.innerHTML = `💡 ${currentProblem.hint}`;
        drawGame();
    }
    
    function renderAnswerButtons() {
        answersContainer.innerHTML = '';
        optionsArray.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'answer-btn';
            let suffix = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suffix = " Вт";
            else if(currentProblem.title.includes("ОМА")) suffix = " Ω";
            else if(currentProblem.title.includes("СОЕДИНЕНИЕ")) suffix = " Ω";
            else if(currentProblem.title.includes("КПД")) suffix = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suffix = " Дж";
            btn.innerText = `${opt}${suffix}`;
            btn.onclick = () => { if(!waitForAnswer && gameActive && !victoryFlag && !gameClosed) handleAnswer(opt); };
            answersContainer.appendChild(btn);
        });
    }
    
    function victoryGame() {
        victoryFlag = true;
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ЭНЕРГОСЕТЬ ПОСТРОЕНА! ✨🏆<br>Счёт: ${score} МВт.`;
        drawGame();
    }
    
    function gameDefeat() {
        gameActive = false;
        waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `💥 КОЛЛАПС! Вы дошли до ${correctCount}/15. Перезапустите. 💥`;
        drawGame();
    }
    
    function restart() {
        if(gameClosed) return;
        if(nextTimer) clearTimeout(nextTimer);
        score = 0;
        health = 3;
        correctCount = 0;
        gameActive = true;
        victoryFlag = false;
        waitForAnswer = false;
        usedTasks = [];
        scoreSpan.innerText = "0";
        updateHealthIcon();
        updateUI();
        if(gameReady && ALL_TASKS.length > 0) loadNewChallenge();
        drawGame();
    }
    
    // ======================== ЗАПУСК ========================
    auth.signInAnonymously().catch(console.error);
    document.getElementById('restartGame').addEventListener('click', () => { if(!gameClosed) restart(); });
    fetchTasksFromGitHub();
</script>
