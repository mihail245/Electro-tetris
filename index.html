<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ ГРОЗОВАЯ СЕТЬ: МАТЕМАТИКА ЭЛЕКТРИКА ⚡</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #010101);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', 'Impact', monospace;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }

        /* Электрический фон - молнии */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(255,215,0,0.08) 0px, rgba(255,215,0,0.08) 2px, transparent 2px, transparent 8px),
                              repeating-linear-gradient(135deg, rgba(255,100,0,0.05) 0px, rgba(255,100,0,0.05) 1px, transparent 1px, transparent 12px);
            pointer-events: none;
            z-index: 0;
        }

        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* Главный пульт с искрами */
        .game-container {
            background: #0b1219e0;
            backdrop-filter: blur(3px);
            border-radius: 48px;
            box-shadow: 0 0 0 3px #ffaa33, 0 0 0 8px #2c2c1c, 0 20px 40px black;
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #ffaa33;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        /* Анимация молний на рамке */
        .game-container::after {
            content: "⚡⚡⚡";
            position: absolute;
            bottom: -12px;
            right: 20px;
            font-size: 28px;
            opacity: 0.6;
            color: #ffcc44;
            text-shadow: 0 0 8px yellow;
            animation: sparkFlicker 1.2s infinite;
        }

        @keyframes sparkFlicker {
            0% { opacity: 0.3; text-shadow: 0 0 2px gold;}
            100% { opacity: 1; text-shadow: 0 0 12px #ffaa33;}
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 20px;
        }

        .canvas-area {
            flex: 2;
            min-width: 280px;
            filter: drop-shadow(0 0 8px #ffaa33);
        }

        .task-panel {
            flex: 1.2;
            min-width: 270px;
            background: #030b0fe6;
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 15px #ffb347, 0 8px 25px black;
            border: 2px solid #ffaa33;
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #ffaa33, 0 12px 28px black;
            background-color: #030d0a;
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 30% 20%, #1a2a1f, #021008);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #ffeaac;
            font-weight: bold;
            border: 1px solid #ffaa33;
        }

        .score-box, .lives-box, .level-box {
            background: #1a1000aa;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 1.3rem;
            letter-spacing: 1px;
            border-left: 4px solid #ffaa33;
        }

        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 20px;
            border-radius: 40px;
            color: #0a0f05;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 0 8px #ffaa66;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .message-area {
            background: #020a04dd;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 18px;
            color: #ffffb0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-top: 3px solid #ffaa33;
            border-bottom: 2px solid #ffaa33;
            text-shadow: 0 0 3px orange;
        }

        /* Кнопки ответов - стиль "высоковольтные переключатели" */
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 25px;
        }

        .answer-btn {
            background: linear-gradient(145deg, #1f2b1c, #071208);
            border: 2px solid #ffbb44;
            border-radius: 60px;
            padding: 14px 6px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #ffeb99;
            text-align: center;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 4px 0 #7a4d1a;
            backdrop-filter: blur(2px);
            letter-spacing: 2px;
        }

        .answer-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #7a4d1a;
        }

        .equation-card {
            background: #0f170cd9;
            padding: 16px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffcc55;
            box-shadow: inset 0 0 8px #e6b422;
        }

        .equation-text {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }

        .question-text {
            font-size: 1.1rem;
            margin-top: 12px;
            background: #00000077;
            padding: 8px;
            border-radius: 28px;
        }

        .badge-power {
            display: inline-block;
            background: #ffaa33;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
            font-weight: bold;
            margin-bottom: 8px;
        }

        @media (max-width: 780px) {
            .game-layout {
                flex-direction: column;
            }
            .answer-btn {
                padding: 10px 4px;
                font-size: 1.2rem;
            }
            .equation-text {
                font-size: 1rem;
            }
        }

        /* Электрические молнии в углах */
        .lightning-corner {
            position: absolute;
            font-size: 55px;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <!-- Левая часть: высоковольтная схема с молниями -->
            <div class="canvas-area">
                <canvas id="powerCanvas" width="800" height="450" style="width:100%; height:auto; aspect-ratio:800/450"></canvas>
            </div>
            <!-- Правая панель: вычислитель -->
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡⚡ ВЫСОКОЕ НАПРЯЖЕНИЕ ⚡⚡</span>
                    <div class="equation-text" id="eqDisplay">Заряд...</div>
                    <div class="question-text" id="questionDisplay">Расчет цепи</div>
                </div>
                <div class="answers-grid" id="answersContainer">
                    <!-- кнопки ответов динамически -->
                </div>
                <div class="message-area" id="gameMessage">
                    🌀 МОЛНИИ КОНТРОЛЯ: Реши уравнение, чтобы стабилизировать разряд!
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box"><span>⚡ МЕГАВАТТЫ ⚡</span><span id="scoreValue">0</span></div>
            <div class="lives-box"><span>🌀 СТАБИЛЬНОСТЬ</span><span id="livesValue">3</span></div>
            <div class="level-box"><span>🌩️ УРОВЕНЬ РАЗРЯДА</span><span id="levelValue">1</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК СЕТИ</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ========== ЭЛЕКТРИЧЕСКАЯ ТЕМА: МАТЕМАТИКА ДЛЯ ЭНЕРГЕТИКА ==========
        // Дизайн с молниями, искрами, динамическая отрисовка высоковольтной линии
        const canvas = document.getElementById('powerCanvas');
        const ctx = canvas.getContext('2d');
        let CANVAS_W = 800, CANVAS_H = 450;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        let score = 0;          // мегаватты энергии
        let stability = 3;      // жизни (целостность сети)
        let level = 1;
        let currentProblem = null;
        let optionsArray = [];
        let waitForAnswer = false;
        let nextTimer = null;
        
        // DOM ссылки
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const messageDiv = document.getElementById('gameMessage');
        const eqDisplay = document.getElementById('eqDisplay');
        const questionDisplay = document.getElementById('questionDisplay');
        const answersContainer = document.getElementById('answersContainer');
        
        // вспомогательные
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // Генератор задач с электрическим уклоном: закон Ома, мощность, последовательное/параллельное, удельное сопротивление
        function generateElectricProblem() {
            const type = randInt(0, 3);
            const lvlBoost = Math.min(level, 14);
            const voltageRange = 24 + lvlBoost * 6;
            const currentRange = 2 + Math.floor(level / 2);
            
            if(type === 0) { // Мощность, яркий пример для электрика
                let U = randInt(24, 60 + lvlBoost * 5);
                let I = randInt(2, 18 + Math.floor(level/2));
                let P = U * I;
                return {
                    title: "💥 ЭЛЕКТРИЧЕСКАЯ МОЩНОСТЬ",
                    equation: `Напряжение U = ${U} В,  Ток I = ${I} А`,
                    question: `Найдите мощность P (Вт) в цепи с молнией`,
                    correctAnswer: P,
                    hint: "P = U × I",
                    unit: "Вт"
                };
            }
            else if(type === 1) { // Закон Ома (классика)
                let U = randInt(30, 110 + lvlBoost*6);
                let I = randInt(2, 20);
                let R = U / I;
                if(U % I !== 0) {
                    U = U - (U % I);
                    if(U < I) U = I * randInt(3, 15);
                    R = U / I;
                }
                return {
                    title: "⚡ ЗАКОН ОМА (ДЛЯ ГРОЗОЗАЩИТЫ)",
                    equation: `U = ${U} В,  I = ${I} А`,
                    question: `Вычислите сопротивление R (Ом) участка`,
                    correctAnswer: R,
                    hint: "R = U / I",
                    unit: "Ω"
                };
            }
            else if(type === 2) { // Последовательное соединение (электрическая цепь)
                let R1 = randInt(12, 65 + lvlBoost*4);
                let R2 = randInt(18, 85 + lvlBoost*3);
                let Rtotal = R1 + R2;
                return {
                    title: "🔌 ПОСЛЕДОВАТЕЛЬНЫЙ УЧАСТОК",
                    equation: `R₁ = ${R1} Ω,  R₂ = ? ,  Rобщ = ${Rtotal} Ω`,
                    question: `Чему равно сопротивление R₂ (Ом)?`,
                    correctAnswer: R2,
                    hint: "R₂ = Rобщ - R₁",
                    unit: "Ω"
                };
            }
            else { // параллельное соединение с искрами
                let R1 = randInt(20, 80 + lvlBoost*3);
                let targetRtotal = randInt(12, 55 + lvlBoost*2);
                let R2 = -1;
                for(let t=0; t<30; t++) {
                    if(R1 > targetRtotal) {
                        let numerator = R1 * targetRtotal;
                        let denominator = R1 - targetRtotal;
                        if(numerator % denominator === 0) {
                            R2 = numerator / denominator;
                            if(R2 > 5 && R2 < 280) break;
                        }
                    }
                    targetRtotal = randInt(14, 55 + lvlBoost*2);
                    R1 = randInt(22, 85);
                }
                if(R2 === -1 || R2 <= 0) {
                    R2 = randInt(25, 100);
                    targetRtotal = Math.floor((R1 * R2) / (R1 + R2));
                }
                return {
                    title: "🌀 ПАРАЛЛЕЛЬНАЯ МОЛНИЯ",
                    equation: `R₁ = ${R1} Ω,  Rобщ = ${targetRtotal} Ω`,
                    question: `Найдите R₂ для параллельного соединения (Ом)`,
                    correctAnswer: R2,
                    hint: "1/R₂ = 1/Rобщ - 1/R₁",
                    unit: "Ω"
                };
            }
        }
        
        function generateOptions(correctVal, unitType) {
            let opts = new Set();
            opts.add(correctVal);
            let delta = Math.max(3, Math.floor(correctVal * 0.3));
            while(opts.size < 4) {
                let variation = randInt(-delta, delta);
                let candidate = correctVal + variation;
                if(candidate < 1) candidate = correctVal + randInt(2, 12);
                if(candidate > 1200) candidate = correctVal - randInt(4, 30);
                if(candidate > 0) opts.add(candidate);
                if(opts.size < 3) {
                    let extra = correctVal + randInt(-Math.floor(correctVal*0.5), Math.floor(correctVal*0.6));
                    if(extra > 0 && extra !== correctVal) opts.add(extra);
                }
            }
            let arr = Array.from(opts);
            for(let i=arr.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function loadNewChallenge() {
            if(nextTimer) clearTimeout(nextTimer);
            waitForAnswer = false;
            currentProblem = generateElectricProblem();
            optionsArray = generateOptions(currentProblem.correctAnswer, currentProblem.unit);
            
            eqDisplay.innerHTML = `⚡ ${currentProblem.title} ⚡<br>${currentProblem.equation}`;
            questionDisplay.innerHTML = currentProblem.question;
            renderAnswerButtons();
            messageDiv.innerHTML = `🌩️ ПОДСКАЗКА: ${currentProblem.hint} | Стабилизируйте разряд! 🌩️`;
            drawPowerGridWithLightnings(); // отрисовка с молниями
        }
        
        function renderAnswerButtons() {
            answersContainer.innerHTML = '';
            optionsArray.forEach((val) => {
                const btn = document.createElement('div');
                btn.className = 'answer-btn';
                let suffix = (currentProblem.unit === "Вт") ? " Вт" : ((currentProblem.unit === "Ω") ? " Ω" : " ед");
                btn.innerText = `${val} ${suffix}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(!waitForAnswer) handleAnswer(val);
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(!waitForAnswer) handleAnswer(val);
                });
                answersContainer.appendChild(btn);
            });
        }
        
        function handleAnswer(selected) {
            if(waitForAnswer) return;
            const isCorrect = (selected === currentProblem.correctAnswer);
            if(isCorrect) {
                let points = 15 * level;
                score += points;
                scoreSpan.innerText = score;
                messageDiv.innerHTML = `✅ ГРОЗА ПРИРУЧЕНА! +${points} МВт. ${currentProblem.hint} = ${currentProblem.correctAnswer} ✅`;
                drawLightningFlash(true);
                if(score >= level * 70 && level < 20) {
                    level++;
                    levelSpan.innerText = level;
                    messageDiv.innerHTML += `<br>🎆 НАПРЯЖЕНИЕ ВОЗРАСТАЕТ! УРОВЕНЬ ${level} 🎆`;
                }
            } else {
                stability--;
                livesSpan.innerText = stability;
                messageDiv.innerHTML = `❌ ПРОБОЙ ИЗОЛЯЦИИ! Правильно: ${currentProblem.correctAnswer} ${currentProblem.unit}. ${currentProblem.hint} ❌`;
                drawLightningFlash(false);
                if(stability <= 0) {
                    gameDefeat();
                    return;
                }
            }
            waitForAnswer = true;
            nextTimer = setTimeout(() => {
                if(stability > 0) loadNewChallenge();
                nextTimer = null;
            }, 1400);
            drawPowerGridWithLightnings();
        }
        
        function gameDefeat() {
            waitForAnswer = true;
            messageDiv.innerHTML = `💀⚡ КОРОТКОЕ ЗАМЫКАНИЕ! Энергосистема разрушена. Ваш счёт: ${score} МВт. Перезапустите подстанцию. ⚡💀`;
            drawGameOverScene();
        }
        
        function restartGame() {
            if(nextTimer) clearTimeout(nextTimer);
            score = 0;
            stability = 3;
            level = 1;
            scoreSpan.innerText = "0";
            livesSpan.innerText = "3";
            levelSpan.innerText = "1";
            waitForAnswer = false;
            loadNewChallenge();
        }
        
        // =============== ОТРИСОВКА С МОЛНИЯМИ, ЭЛЕКТРИЧЕСКИМИ ДУГАМИ ===============
        function drawPowerGridWithLightnings() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            // тёмный фон с искрами
            const grad = ctx.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
            grad.addColorStop(0, "#021007");
            grad.addColorStop(1, "#091a14");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            
            // рисуем линии электропередач с "искрящими" точками
            ctx.beginPath();
            ctx.moveTo(70, 180);
            ctx.lineTo(250, 150);
            ctx.lineTo(420, 210);
            ctx.lineTo(580, 140);
            ctx.lineTo(720, 190);
            ctx.strokeStyle = "#ffbb55";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.setLineDash([8, 12]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Молнии по краям (декоративные)
            for(let i=0;i<3;i++) {
                ctx.beginPath();
                let startX = 30 + i*200;
                let startY = 40;
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX+25, startY+45);
                ctx.lineTo(startX+5, startY+70);
                ctx.lineTo(startX+38, startY+115);
                ctx.strokeStyle = `rgba(255, 200, 70, ${0.5 + Math.sin(Date.now()*0.008)*0.2})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            // Трансформаторная подстанция слева
            ctx.fillStyle = "#6a5a3e";
            ctx.fillRect(45, 260, 65, 80);
            ctx.fillStyle = "#d9b34c";
            ctx.font = "bold 16px monospace";
            ctx.fillText("⚡", 68, 305);
            ctx.fillText("HV", 65, 335);
            
            // Электрический щит / батарея справа
            ctx.fillStyle = "#89652b";
            ctx.fillRect(690, 270, 70, 90);
            ctx.fillStyle = "#ffdd77";
            ctx.font = "20px monospace";
            ctx.fillText("⚡⚡", 705, 315);
            
            // Анимация искр – случайные точки
            for(let s=0; s<12; s++) {
                if(Math.random() > 0.7) {
                    ctx.fillStyle = `rgba(255, 180, 40, ${Math.random()*0.8})`;
                    ctx.beginPath();
                    ctx.arc(150 + Math.random() * 600, 80 + Math.random() * 300, Math.random() * 4 + 1, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // Отображение текущего уровня стабильности в виде "искровых индикаторов"
            for(let s=0; s<stability; s++) {
                ctx.fillStyle = "#ffaa44";
                ctx.shadowBlur = 8;
                ctx.fillRect(30 + s*45, 410, 28, 12);
                ctx.fillStyle = "yellow";
                ctx.fillRect(31 + s*45, 411, 26, 4);
            }
            ctx.shadowBlur = 0;
            
            // Текст задания на канвасе для пущей атмосферы
            if(currentProblem) {
                ctx.font = "bold 12px monospace";
                ctx.fillStyle = "#ffea99";
                ctx.fillText(`⚡ ЗАДАНИЕ: ${currentProblem.question.substring(0, 28)}`, 30, 390);
            }
            
            if(stability <= 0) {
                ctx.fillStyle = "#ff6666aa";
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                ctx.fillStyle = "#ffaa33";
                ctx.font = "bold 30px monospace";
                ctx.fillText("⚡ СИСТЕМА РАЗРУШЕНА ⚡", CANVAS_W/2-180, CANVAS_H/2);
            }
        }
        
        function drawLightningFlash(isCorrect) {
            ctx.fillStyle = isCorrect ? "#ffff99cc" : "#ff6644cc";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            // дополнительные молнии
            for(let i=0;i<6;i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*CANVAS_W, 0);
                ctx.lineTo(Math.random()*CANVAS_W, CANVAS_H);
                ctx.strokeStyle = isCorrect ? "#ffff00" : "#ff3300";
                ctx.lineWidth = 5;
                ctx.stroke();
            }
            setTimeout(()=>drawPowerGridWithLightnings(), 130);
        }
        
        function drawGameOverScene() {
            drawPowerGridWithLightnings();
            ctx.fillStyle = "#aa2222bb";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = "#ffaa55";
            ctx.font = "bold 26px monospace";
            ctx.fillText("⚡ OVERLOAD ⚡", CANVAS_W/2-100, CANVAS_H/2);
        }
        
        // Кнопка перезапуска
        document.getElementById('restartGame').addEventListener('click', () => restartGame());
        document.getElementById('restartGame').addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); });
        
        // анимация молний на канвасе (лёгкое мерцание)
        let animFrame;
        function animateLightning() {
            if(!waitForAnswer || stability>0) {
                drawPowerGridWithLightnings();
            }
            animFrame = requestAnimationFrame(animateLightning);
        }
        animateLightning();
        
        function init() {
            restartGame();
        }
        init();
    })();
</script>
</body>
</html>
